<script id="article-data" type="application/json">[{"num":"01","title":"自分のからだのことを、ちゃんと考え始めた話","category":"セルフケア","isHub":false,"wordCount":1978,"pccCount":0,"hashtags":["#体験談","#女性のからだ","#セルフケア","#フェムケア","#婦人科","#エッセイ","#自分と向き合う","#生理","#知らなかったを知る","#からだのこと"],"body":"はじめまして。\n\nこのnoteは、自分のからだのことをずっと後回しにしてきた私が、あることをきっかけに、避妊のこと、婦人科のこと、生理やピルのことを、少しずつ調べて、考えて、記録していく場所です。\n\n私も、少し前まで本当に何も知りませんでした。だから「知らないのが恥ずかしい」なんて思わなくて大丈夫です。最初の記事なので、なんでこれを書き始めたのかを、少しだけ話させてください。\n\n## きっかけは、ある夜の「もしかして」でした\n\nきっかけは、うまく言葉にできない「もしかして」でした。\n\n詳しいことはまた別の記事に書きますが、そのときの私は本当に何もわかっていませんでした。頭が真っ白になって、布団の中でスマホだけ握りしめて、同じような言葉を何度も検索していました。\n\n「避妊 失敗 どうすれば」\n「アフターピル とは」\n\n検索しても、不安は減るどころか増えていくばかり。サイトによって書いてあることが違うし、どれを信じていいのかもわからない。誰かに聞きたいのに、こんなこと聞ける相手が思いつきませんでした。友達にも、家族にも、言える気がしませんでした。\n\n**あの夜のこころ細さは、今でもはっきり覚えています。**\n\n## それまでの私は、からだのことを全部あとまわしにしていた\n\nあの夜に気づいたのは、不安の大きさだけではありませんでした。\n\n私、自分のからだのこと、何も知らない。そのことに、はじめて気づいたんです。\n\n生理痛は「がまんするもの」だと思っていました。おなかが痛くても、授業中は机につっぷして耐えて、部活も「休んだら迷惑かな」と無理して出ていました。生理前にイライラしたり落ちこんだりするのも、「そういう性格だから」で片づけていました。\n\n婦人科には一度も行ったことがなくて、正直「大きな病気の人が行く場所」くらいのイメージでした。避妊についても、保健の授業でなんとなく習った記憶があるだけで、自分ごととして考えたことはありませんでした。\n\nテストや部活、友達との予定はスマホのカレンダーにちゃんと入れるのに、自分のからだのことだけは、いつも優先順位のいちばん後ろ。今ふり返ると、そういう毎日でした。\n\n## 調べはじめて、知らないことの多さにおどろいた\n\nあの出来事のあと、私は少しずつ調べるようになりました。そして、知らないことの多さにおどろきました。\n\nアフターピルという選択肢があること。スマホで診察を受けられる仕組みがあること。低用量ピルは避妊だけじゃなくて、生理の悩みで飲んでいる人も多いらしいこと。婦人科は「病気になってから行く場所」ではなくて、相談のために行っていい場所だということ。\n\n知っている人にとっては当たり前のことなのかもしれません。でも当時の私は、本当に何も知りませんでした。そして、たぶん私だけじゃないと思うんです。**知らなかったのは、知る機会がなかっただけ。** 誰のせいでもないと、今は思っています。\n\n## 「知っておく」だけで、不安は少し小さくなる\n\n調べていくなかで気づいたことがあります。\n\n知識があっても、不安がゼロになるわけではありません。でも、「いざというとき、こういう選択肢がある」と知っているだけで、不安は少し小さくなるんです。\n\nあの夜の私がいちばんつらかったのは、「どうすればいいのか、何もわからない」という状態でした。選択肢を知らないと、人は動けなくなる。動けない時間が、いちばん不安を大きくする気がします。\n\nそれに、いざとなったときに頼れる相手を知っておくことも、同じくらい大事だと思うようになりました。保健室の先生や、婦人科のお医者さん。ふだんは遠く感じるけれど、こういう相談を毎日受けているおとながちゃんといる。そう知っているだけでも、心の中の「もしも」が少し軽くなる気がします。\n\n## このnoteで書いていきたいこと\n\nこのnoteでは、こんなことを書いていく予定です。\n\n- アフターピルを飲んだときの体験談と、当時の不安のこと\n- 彼氏に伝えるかどうか、迷った夜のこと\n- 婦人科やオンライン診療、保健室など、からだの相談先について調べたこと\n- 生理、PMS、低用量ピルのこと\n\n偉そうなことは書けません。私は専門家ではないし、今も迷いながら過ごしています。それでも、ひとつだけ伝えておきたいことがあります。\n\n不安なとき、ひとりで全部かかえこまなくていいということ。保健室の先生や、婦人科のお医者さんのように、こういう話を毎日聞いているおとなが、ちゃんといます。「相談してみようかな」と少しでも思えたら、それだけでこのnoteを書いた意味があります。\n\n同じように不安な人に、少しでも届いたらうれしいです。よかったらフォローして、たまにのぞきにきてください。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"02","title":"アフターピルを飲むまでに、私が不安だったこと【体験談】","category":"アフターピル","isHub":false,"wordCount":1989,"pccCount":0,"hashtags":["#アフターピル","#緊急避妊薬","#体験談","#女性のからだ","#不安との向き合い方","#避妊","#婦人科","#エッセイ","#ひとりで抱えない","#からだのこと"],"body":"このページを開いている人は、もしかしたら今、不安のまっただ中にいるのかもしれません。学校の休み時間に、こっそりスマホで開いている人もいるかもしれない。\n\n最初にお伝えしておくと、この記事は医療情報ではなく、私個人の体験談です。それでも、当時の私は「専門的な説明」より「同じ立場の人の正直な話」がいちばん読みたかったので、書いてみようと思います。\n\n避妊がうまくいかなかったかもしれない、と気づいた私が、**アフターピル（緊急避妊薬）を飲むと決めるまでに何が不安だったのか、そして実際はどうだったのか**の記録です。\n\n## あの日の私は、検索ばかりしていた\n\n「もしかして」に気づいたのは夜でした。\n\nその日は次の日も学校で、課題の提出も部活もあって、頭の片すみでは「明日どうしよう」と考えていました。なのに手はスマホから離れなくて、検索履歴は「アフターピル」だらけ。読んでも読んでも安心できなくて、同じページを何度も開き直していました。\n\n今思えば、あのとき本当に知りたかったのは、薬の細かい説明ではなくて、「私と同じ状況になった人が、どう感じて、どうしたのか」だったんだと思います。私の不安は、大きく4つありました。\n\n## 不安だったこと①：時間に間に合うのか\n\nいちばん最初に焦ったのは、時間のことでした。\n\n調べてみると、アフターピルは性行為のあと、できるだけ早く飲んだほうが避妊効果が高いと言われているようでした。「◯時間以内」という数字がいろんなところに書いてあって、時計とにらめっこしては焦りが増していきました。\n\nでも、今ふり返って思うのは、**素人の私が数字だけ見て「間に合う・間に合わない」を自分で判断しようとしたのが、いちばん良くなかった**ということです。条件は人それぞれちがうはずなので、時間が経ったと思っても、まず病院やオンライン診療に相談して確かめるのが確実だと思います。私も結局、電話で聞いてしまうのがいちばん早くて、いちばん安心できました。\n\n## 不安だったこと②：副作用がこわかった\n\n次にこわかったのが、副作用でした。\n\n検索すると、吐き気や頭痛、眠気といった言葉が出てきて、「飲んだあと動けなくなったら、明日の学校どうしよう」と、飲む前から気が重くなっていました。\n\n私の場合は、飲んだあとに少し眠気とだるさを感じたくらいで、寝て起きたら落ち着いていました。ただ、これは本当に人によってちがうようです。処方してもらうとき、お医者さんに「副作用が出たらどうすればいいか」を先に聞いておいたことで、気持ちがかなり楽になりました。**「もし◯◯になったら、こうすればいい」を先に知っておく。** 不安対策として、これがいちばん効いた気がします。\n\n## 不安だったこと③：お金がいくらかかるのか\n\nお金の不安も、正直大きかったです。\n\nアフターピルは保険がきかないことが多く、私が調べた時点では、受ける場所によって金額にけっこう幅がありました。「私のお小遣いで足りるのかな」と、本気で心配していました。\n\n私の場合は、事前に電話で「全部でいくらくらいかかりますか」と確認してから行きました。金額を先に知っているだけで、当日の不安がひとつ減ります。聞くのは全然はずかしいことじゃなかったです。お金のことは別の記事でもう少し書こうと思います。\n\n## 不安だったこと④：誰かに知られないか\n\nそして、いちばん人に言いづらい不安。「誰かにバレたらどうしよう」でした。\n\n受付で大きな声で用件を言わされたら。待合室で学校の知り合いに会ったら。家族に知られたら。そんな想像ばかりしていました。\n\n実際は、拍子ぬけするくらい淡々と終わりました。受付の人も看護師さんも、特別な目で見てくることはなくて、「よくあることのひとつ」として接してくれた感じがしました。あの淡々とした空気に、私はむしろ救われました。人目が気になる人には、スマホで受けられるオンライン診療という選択肢もあるようです。\n\n## 同じように不安な人へ\n\nこうして書き出してみると、私の不安は「時間・副作用・お金・人目」の4つでした。\n\nそして、そのどれもが、**調べたり聞いたりすれば見通しが立つもの**でした。いちばんつらかったのは、不安なまま何も決められずに検索し続けていた時間だったと思います。\n\nもし今、あの夜の私と同じ状況の人がいたら。不安を全部ひとりで解決しようとしなくていいです。病院やオンライン診療の先にいるのは、こういう相談を毎日受けているおとなです。それでも動けないときは、保健室の先生や学校医など、身近な大人に「どこに相談すればいいか」を聞くところから始めてもいいと思います。\n\n同じように不安な人に、この記事が少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"03","title":"彼氏に言うか迷った夜。アフターピルのことをどう伝えるか考えた","category":"避妊・恋愛","isHub":false,"wordCount":2056,"pccCount":0,"hashtags":["#体験談","#アフターピル","#恋愛","#カップル","#避妊","#伝え方","#エッセイ","#女性のからだ","#ひとりで抱えない","#対話"],"body":"アフターピル（緊急避妊薬）が必要かもしれない、とわかった夜。\n\n私が最初に悩んだのは、薬のことでも病院のことでもなく、「**彼に言うべきか、言わないでおくか**」でした。\n\n先に言っておくと、この記事は「彼氏には絶対言うべき」と説教する記事ではありません。言うか言わないかに正解はないと、今でも思っています。ただ、あの夜さんざん迷った私が、何を考えて、どうしたのかを書いておきたいと思いました。同じ夜を過ごしている人が、きっといると思うから。\n\n## 言いたくなかった理由\n\n正直に書きます。私は最初、言いたくありませんでした。\n\nまず、気まずさ。ついさっきまで普通にLINEしていた相手に、こんな重い話を切り出す勇気が出ませんでした。\n\n次に、こわさ。「え、大丈夫でしょ」と軽く流されたらどうしよう。逆に、責めるようなことを言われたらどうしよう。どっちの反応を想像しても、傷つく未来しか見えませんでした。\n\nそして、「重い子」だと思われたくない気持ち。付き合ってまだそんなに長くなかったこともあって、この話をしたら関係が変わってしまうんじゃないか、という不安がありました。今ふり返ると、**私はからだの心配と同じくらい、関係がこわれる心配をしていた**んだと思います。\n\n## それでも伝えようと思った理由\n\nひと晩考えて、私は伝えることにしました。決め手は、シンプルな違和感でした。\n\nこれって、ふたりのことなのに、なんで私だけが夜中にひとりで検索して、ひとりで病院を調べて、ひとりでこわがってるんだろう。\n\nアフターピルを飲むのは私です。副作用が出るかもしれないのも、病院に行くのも私。それは変えられません。でも、「知らないところで全部終わっていた」という状態にするのは、彼にとってもフェアじゃない気がしました。\n\nあとは単純に、ひとりでかかえているのが限界だった、というのもあります。誰かに「大丈夫?」と言ってほしかった。それが本音でした。\n\n## 私がどう伝えたか\n\nかっこいい伝え方は、できませんでした。\n\n顔を見て話す自信がなかったので、私はLINEを選びました。長文を打っては消してをくり返して、最終的に送ったのは、たしかこんな感じの短い文でした。\n\n「昨日のことなんだけど、避妊うまくいってなかったかもしれない。病院に行って、アフターピルをもらおうと思ってる」\n\nポイントがあったとすれば、「どうしよう」ではなく「こうしようと思ってる」まで書いたことです。狙ったわけではなくて、彼の返事を待ってから動くのがこわかったから。でも結果的に、話が「やるかやらないか」ではなく「どう一緒に対応するか」から始まったのは、良かったのかもしれません。\n\n## お金の話は、思ったより大事だった\n\n伝えるとき、いちばん切り出しにくかったのがお金の話でした。\n\nアフターピルは保険がきかないことが多く、お小遣いで考えると決して軽い金額ではありませんでした。でも「お金出して」と言うのは、なんだかすごく生々しい気がして、最初のLINEには書けませんでした。\n\n結局、彼のほうから「お金どうする?」と聞いてくれて、私たちの場合は折半にしました。どっちが払うべき、という正解はないと思います。ただ、**お金の話をあいまいにしたまま終わらせなかったこと**は、あとからモヤモヤを残さないという意味で大事だったなと感じています。\n\n## 伝えてみて、感じたこと\n\n彼の第一声は、「ごめん。ありがとう、言ってくれて」でした。\n\n正直、ほっとしました。責められなかったこと以上に、「言ってくれてありがとう」と言われたことで、この話をふたりの問題としてあつかってもらえた気がしたからです。\n\nそのあと、病院の情報を一緒に調べてくれたり、「終わった?体調大丈夫?」と連絡をくれたりしました。劇的なドラマは何もない、淡々としたやりとりです。でも、あのこころ細い数日間、「ひとりじゃない」と思えたことに、どれだけ助けられたか。そしてこの出来事のあと、私たちは避妊についてちゃんと話すようになりました。\n\n## 言えない場合も、あると思う\n\nここまで読んで、「うちは言える関係じゃない」と感じた人もいるかもしれません。\n\n伝えたら怒られそう。もう連絡を取りたくない相手。そういう状況は、現実にあると思います。その場合は、**無理に伝えなくていい**と私は思います。いちばん優先すべきなのは、あなたの安全とからだです。\n\nそして、彼に言えないとしても、あなたひとりで全部かかえる必要はありません。話せる相手は、パートナー以外にもいます。保健室の先生や学校医、産婦人科のお医者さんは、こういう相談を毎日受けているおとなです。「誰にどう話せばいいか」からでも、頼っていいんだと私は思います。\n\nこれは私の場合の話で、関係性の数だけ答えがあると思います。それでも、あの夜の私と同じように迷っている人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"04","title":"アフターピルのあと、「からだの相談先」がないことに気づいた話","category":"相談先","isHub":false,"wordCount":2031,"pccCount":0,"hashtags":["#体験談","#相談先","#婦人科","#フェムケア","#女性のからだ","#セルフケア","#エッセイ","#ひとりで抱えない","#相談していい","#からだのこと"],"body":"アフターピル（緊急避妊薬）を飲んで、次の生理が来て、私の「緊急事態」はいったん終わりました。\n\nでも、こころのどこかがずっと落ち着かないままでした。安心したはずなのに、なんだろう、このモヤモヤ。しばらくして、その正体に気づきました。\n\n**私、また何かあったら、どこに相談すればいいんだろう。**\n\n今回はそんな、「緊急のときが終わったあと」の話です。婦人科に行きづらいと感じている人や、からだのちょっとした悩みをどこに相談すればいいかわからない人に、読んでもらえたらうれしいです。\n\n## 「また何かあったら」が、ずっと頭に残っていた\n\nアフターピルのとき、私は深夜に検索しまくって、あわてて病院を探しました。\n\nつまり、緊急事態になってから、ゼロから相談先を探したわけです。あれは本当にこころ細かった。時間に追われながら、口コミを読みあさって、電話をかける勇気をふりしぼって。\n\nそして緊急事態が終わった今も、私には「いつでも相談できる場所」のようなものがありません。生理不順が続いたら? なんとなく調子が悪い日が続いたら? そのたびにまた、ゼロから探すの? **「何かあってから探す」のは、いちばんこころ細いタイミングで、いちばん大変な作業をすることなんだ**と、あのとき身にしみてわかりました。\n\n## 婦人科に行きづらかった理由を、言葉にしてみた\n\nじゃあ相談できる婦人科を見つけておけばいい。頭ではわかっているのに、なかなか動けませんでした。\n\nなんでだろう、と思って、行きづらさの理由を書き出してみました。\n\n- 「病気じゃないのに行っていいのかな」という遠慮\n- 内診されるかもしれない、という緊張\n- 待合室で学校の知り合いに会ったら、という気まずさ\n- 「こんなことで来たの?」と思われたらどうしよう、という不安\n\n書き出してみて気づいたのは、どれも「行ってはいけない理由」ではなく「気持ちのハードル」だということでした。そして、このハードルを感じているのは、たぶん私だけじゃないと思います。\n\n## 意外と近くにあった「保健室」という入り口\n\n相談先を考えるなかで、私がいちばん見落としていたのが、保健室でした。\n\n病院というと身がまえてしまうけれど、保健室の先生は、からだやこころの相談を毎日受けているおとなです。生理の悩みや、なんとなく不安なことを話したときに、「それなら一度、婦人科で相談してみるといいよ」と、次の一歩を一緒に考えてくれる存在なんだと、あとから気づきました。\n\nもちろん、話しにくい内容もあると思います。それでも、「どこに相談すればいいかわからない」というときに、まず身近なおとなに聞いてみるだけでも、道が少し見えてくる。私にとって保健室は、そういう「入り口」でした。\n\n## 私なりの「相談先リスト」を作ってみた\n\nそれで私は、スマホのメモに小さなリストを作りました。名づけて「からだの相談先リスト」です。\n\n- **保健室・学校医**：まず身近なおとなに話を聞いてほしいとき。次にどこへ行けばいいか迷うとき\n- **婦人科・産婦人科**：しっかり診てもらいたいとき。検査が必要かもしれないとき\n- **オンライン診療**：外出しづらいとき。まず話だけ聞いてほしいとき\n- **自治体や公的機関の相談窓口**：お金のことや、誰にも言えないことで困ったとき\n\n内容は人によってちがっていいと思います。ポイントは、**元気なうちに、落ち着いた頭で作っておく**こと。緊急のときの私に、いちばん足りなかったものでした。\n\nこのリストを作ってから、「何かあったらどうしよう」の「どうしよう」の部分が、少しだけ具体的になりました。\n\n## 「相談できる場所がある」という安心感\n\nリストを作ったあと、私は一度、緊急でも何でもないタイミングで、生理の相談のために婦人科に行ってみました。以前の私なら「このくらいで行っていいのかな」と迷ったレベルの用件です。\n\n結果、あっさり終わりました。そして帰り道、「これで次に何かあっても、ここに相談すればいい」と思えたことが、想像以上に心強かったです。\n\n自分のからだの相談先を持っておくこと。それは、緊急事態のための備えというだけじゃなくて、「自分のからだを後回しにしない」というセルフケアそのものなんだと思います。\n\n## 相談先はひとつじゃなくていい\n\nもし今、婦人科に行きづらいと感じている人がいたら。相談先はいくつもあります。\n\nいきなり病院はハードルが高いなら、まず保健室や学校医に話してみる。外に出づらいならオンライン診療という手もある。お金や、家の事情でこまっているなら、自治体の相談窓口もあります。自分に合いそうなところを、信頼できるおとなと一緒にさがしてみてもいいと思います。\n\n急がなくて大丈夫です。元気な今のうちに、ゆっくり。同じように迷っている人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"05","title":"アフターピルはどこでもらえる？病院に行くのが怖かった私が調べたこと","category":"アフターピル","isHub":false,"wordCount":2135,"pccCount":0,"hashtags":["#アフターピル","#緊急避妊薬","#体験談","#婦人科","#オンライン診療","#避妊","#調べてみた","#女性のからだ","#ひとりで抱えない","#からだのこと"],"body":"避妊がうまくいかなかったかもしれない。アフターピル（緊急避妊薬）が必要かもしれない。\n\nそう思ったとき、当時の私の前に立ちはだかったのは、意外なハードルでした。\n\n**「病院に行くのが、こわい」**\n\nこの記事では、そんな私が当時調べた「アフターピルをもらえる場所の選択肢」を、体験談として整理してみます。最初にお伝えしておくと、この記事は医療情報ではなく、私が調べた時点での個人の記録です。制度や費用は変わることがあるので、最新の情報は必ず病院や公的機関で確認してください。\n\n## 前提：だからこそ、選択肢を先に知っておく\n\n調べてわかったのは、アフターピルはできるだけ早く飲んだほうが避妊効果が高いと言われている、ということでした。\n\nつまり、時間が大事。なのに私は、「病院こわい」「どこに行けばいいかわからない」で、まる1日以上動けずにいました。いま振り返って言えるのは、**迷って止まっていた時間がいちばんもったいなかった**ということです。選択肢さえ知っていれば、あの1日はもっと短くできた。だからこの記事を書いています。\n\n私が調べた限り、選択肢は大きく2つありました。\n\n## 選択肢①：婦人科・産婦人科で処方してもらう\n\nいちばん基本の選択肢が、婦人科・産婦人科の受診です。\n\n一般的には、お医者さんの診察を受けて、その場で処方してもらう流れのようです。私の場合は電話で「緊急避妊の相談です」と伝えたら、当日の枠を案内してもらえました。行く前にこわかったこと(受付で大声で用件を言わされる、責められる)は、実際にはほぼ起こりませんでした。\n\n対面で「その後の生理がこうだったら、また来てくださいね」と直接説明してもらえたのは、対面ならではの安心感でした。費用は保険がきかないことが多く、私が調べた時点では場所によって幅があったので、**事前に電話で総額を確認してから行く**のがおすすめです。\n\n## 選択肢②：オンライン診療で処方してもらう\n\n次に、オンライン診療。スマホのビデオ通話などでお医者さんの診察を受けて、薬を処方してもらう方法です。\n\n私が調べた時点では、薬を近くの薬局で受け取る形や、家に配送してもらう形があるようでした。夜や早朝に対応しているサービスもあるようで、「深夜に不安でねむれない時間」に相談できる窓口があるのは、あの夜の私からするとかなり心強い選択肢だと思います。\n\n近くに婦人科がない人、外に出づらい人、対面がこわい人には、特に現実的な選択肢かもしれません。一方で、配送だと受け取りまで時間がかかることがあったり、体調によっては受診をすすめられる場合があったりと、注意点もあるようです。ここは各サービスの案内をよく読んで、診察のときにお医者さんに確認するのが確実だと思います。\n\n## 未成年でも受診できるの？と不安だった話\n\n私が当時いちばん気になっていたのが、「学生でも、ひとりで受診していいのかな」ということでした。\n\n調べてみると、未成年でも相談・受診できるところはあるようでした。ただし、保護者の同意が必要かどうか、身分証や保険証がいるかどうかは、病院やサービスによってあつかいがちがうようです。だからこそ、私は**行く前に電話やサイトで「未成年でも受けられますか」「必要なものは何ですか」を確認する**ことをおすすめします。聞くのは全然はずかしいことじゃないし、確認できるだけで当日の不安がぐっと減ります。\n\nそして、もし「自分ひとりで調べて動くのが不安」だと感じたら、それは弱さじゃありません。保健室の先生や学校医は、こういう相談を受けたときに、どこへ行けばいいかを一緒に考えてくれるおとなです。まず身近な大人に「どこに相談すればいい?」と聞くところから始めても、全然いいと思います。\n\n## 私が比べたのは「時間・お金・気持ちのハードル」\n\n選択肢を並べたあと、私は3つの軸で考えました。\n\n- **時間**：今日中に相談できるか。薬を受け取るまでどれくらいかかるか\n- **お金**：総額いくらか。事前に確認できるか\n- **気持ちのハードル**：対面か非対面か。人目が気になる度合い\n\nどの選択肢が上、というものではないと思います。近くの婦人科が今日診てくれるならそれが早いこともあるし、外に出られない状況ならオンラインが現実的なこともある。**状況によって「自分にとっての最適」が変わる**というのが、調べてみての実感でした。\n\n## 迷っている時間が、いちばんもったいなかった\n\n最後に、あの日の私に言いたいことを書いて終わります。\n\nこわくて動けない気持ちは、痛いほどわかる。でも、選択肢はひとつじゃないし、どの窓口の先にいるのも「こういう相談を毎日受けているプロ」です。責められることは、少なくとも私の場合はありませんでした。\n\n完璧な選択をしようとしなくていいから、まずどこかに相談だけしてみてほしい。それも不安なら、身近な信頼できる大人に「どうすればいい?」と聞くだけでもいい。ひとりでかかえこまなくていいんです。\n\n同じように不安な人に、この記事が少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"06","title":"はじめての婦人科。行く前の私が知りたかった10のこと","category":"婦人科・検査","isHub":false,"wordCount":2070,"pccCount":0,"hashtags":["#婦人科","#はじめての婦人科","#体験談","#女性のからだ","#フェムケア","#セルフケア","#エッセイ","#知らなかったを知る","#10代","#からだのこと"],"body":"婦人科の予約の電話をかける前、私はスマホを握ったまま、自分の部屋で10分くらい固まっていました。\n\n何て言えばいいんだろう。制服のまま行っていいの？保険証っている？お金は？親についてきてもらわなきゃダメなの？\n\nネットで調べても、病院の公式ページの説明ばかりで、「行ったことある人の本音」がなかなか見つからない。だからこの記事では、はじめて婦人科に行った当時の私が「先に知っておきたかったこと」を10個、書いておきます。\n\nこれから初めて行くかもしれない人の、深呼吸の回数が少しでも減りますように。\n\n## 「相談だけ」で行っていいと知るまで\n\nそもそも私は、婦人科は「はっきりした病気の人が行くところ」だと思い込んでいました。生理のことでモヤモヤしているくらいで行っていいのか、ずっと自信が持てなかったんです。\n\nでも調べていくうちに、生理のこと、からだの不安、なんとなくの相談でも受け付けてくれる場所なんだと知りました。この「相談だけでもいいらしい」が、私が予約の電話をかける最後のひと押しになりました。\n\n## 行く前に知りたかったこと（前半）\n\n**1. 予約の電話は、一言で通じた**\n\n「生理のことで相談したいんですけど」。私が絞り出したのはこれだけでしたが、あとは受付の人が全部聞いてくれました。うまく説明できなくて焦っても、大丈夫でした。向こうは毎日こういう電話を受けているプロなんだと、あとで気づきました。\n\n**2. 服装は「着替えやすさ」だけ考えればよかった**\n\n私は放課後に行ったので制服でしたが、特に何も言われませんでした。診察で下だけ脱ぐことがあると聞いていたので、スカートは少し楽だったかもしれません。気合いを入れる必要も、逆に構える必要もなかったです。\n\n**3. 保険証と、あれば生理管理アプリ**\n\n保険証（マイナンバーカード）と、生理日を記録していたアプリ。このアプリが地味にいちばん役立ちました。「最終月経はいつ？」に即答できたのはアプリのおかげです。学生証は、私の場合は特に使いませんでした。\n\n**4. 「最終月経日」はほぼ確実に聞かれた**\n\n問診票にも書く欄がありました。これを事前に知っていたおかげで、待合室でアプリをあわてて遡る、をやらずに済みました。覚えていない人は、だいたいでも聞かれると思っておくといいかもしれません。\n\n**5. 内診は「必ずある」わけじゃなかった**\n\n私がいちばん怖かったのはこれでした。でも私の場合、初回は問診と説明が中心でした。そして知ったのは、**「内診が怖いです」と正直に言っていい**ということ。伝えたら、進め方をていねいに説明してもらえました。怖さを我慢して黙っている必要はなかったです。\n\n## 行く前に知りたかったこと（後半）\n\n**6. 親に付き添ってもらうかは、人によるみたいだった**\n\nこれは気になる人が多いと思います。私が調べた時点では、年齢や内容によって保護者の同伴や同意を確認される場合があるようでした。ここは病院によって対応が違うようなので、**予約の電話のときに「未成年なんですけど、親は一緒じゃなくても大丈夫ですか」と聞くのがいちばん確実**でした。不安なら、事前に聞いておくと当日あわてずに済みます。\n\n**7. 費用は電話で聞いておけた**\n\n「初診でだいたいいくらくらいかかりますか」と予約のときに聞きました。相談内容で変わるようですが、目安を知っているだけで、お財布の中身を数えながら行く不安がひとつ減りました。\n\n**8. 先生との相性は、正直ある**\n\nこれはあると思います。合わないなと感じたら、別のところに変えていい。1回で「婦人科ぜんぶ無理」と決めなくていいんだと、あとから思いました。\n\n**9. 聞きたいことはスマホにメモして行った**\n\n診察室に入ると、緊張で頭が真っ白になります。私はメモに質問を3つ書いて行って、最後に画面を見ながら聞きました。変な顔はされませんでした。\n\n**10. 「こんなことで来たの？」とは言われなかった**\n\nいちばん恐れていたこの言葉は、最後まで出てきませんでした。むしろ「気になることがあったら、またいつでも来てね」で終わりました。病気じゃなくても、相談だけでも来ていい場所なんだと思えた瞬間でした。\n\n## 行ってみて、いちばん変わったこと\n\n10個書きましたが、いちばん大きかった変化は知識ではありません。\n\n**「何かあったら、あそこに行けばいい」と思える場所ができたこと**でした。\n\n行く前の婦人科は、得体の知れない怖い場所でした。一度行ったあとは、「知っている場所」に変わりました。この差は、想像していたよりずっと大きかったです。\n\nもし予約の電話の前で固まっている人がいたら、伝えたいです。深呼吸したら、あとは受付の人がなんとかしてくれます。そして未成年で不安なところは、ひとりで悩まずに、保健室の先生やおうちの人など、頼れる大人に一度聞いてみるのもいいと思います。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"07","title":"PMSを「わがまま」って言われてきた私へ。気づくまでの話","category":"生理・PMS","isHub":false,"wordCount":1932,"pccCount":0,"hashtags":["#PMS","#月経前症候群","#生理","#体験談","#女性のからだ","#エッセイ","#こころとからだ","#セルフケア","#ひとりで抱えない","#からだのこと"],"body":"毎月、決まって「嫌な自分」になる時期がありました。\n\n友だちの何気ない一言にイラッとして、そのあとひとりで猛烈に落ち込む。部活でちょっと注意されただけで、この世の終わりみたいに感じる。夜、理由もなく涙が出る。\n\nそして数日たつと、うそみたいに元に戻る。\n\n当時の私は、これをぜんぶ「わがままな性格」のせいだと思っていました。今日はその話を書きます。\n\n## 「なんで私はこうなんだろう」のループ\n\nその時期の私は、いつも自分を責めていました。\n\nイライラするのは心が狭いから。すぐ落ち込むのはメンタルが弱いから。友だちにきつく当たっちゃったのは、私の性格が悪いから。\n\n謝って、自己嫌悪して、「次はちゃんとしよう」と決意して。でも次の月、また同じことが起きる。**直そうとしても直らないものを、性格のせいにして責め続ける。** 今思えば、けっこうしんどいループの中にいました。\n\n## 「わがまま」って言われた日のこと\n\n決定的だったのは、生理前のある日でした。\n\n部活で私がピリピリしていたとき、悪気なくだと思うけど、「今日ちょっとわがままじゃない？」と言われました。自分でもそう思っていたぶん、その言葉はぐさっと刺さりました。\n\n家に帰って、また泣きました。わがままな自分が嫌で、でも直せなくて。あのころの私は、自分のことをかなり持て余していたと思います。\n\n## アプリの記録が教えてくれた「周期」\n\nきっかけは、なんとなく入れていた生理管理アプリでした。\n\nもともとは生理日を記録するためだけに使っていたのですが、あるとき、気分のメモも一緒につけるようになりました。「今日はダメな日」「イライラした」くらいの、雑なメモです。\n\n数ヶ月分たまったころ、ふと気づきました。\n\n**「ダメな日」、毎回だいたい同じタイミングに並んでる。**\n\n生理の少し前のところに、私の「嫌な自分」がきれいに集中していました。鳥肌が立ったのを覚えています。性格のせいなら、毎日そうなるはずなのに。\n\n## 名前を知って、変わったこと\n\nそこから調べて、PMS（月経前症候群）という言葉にたどり着きました。生理前の時期に、気分の落ち込みやイライラ、からだの不調が出る人がいる、というものです。程度も症状も、人によってかなり違うようです。\n\n私のあれがPMSなのかどうか、自分で決めつけることはできません。でも、「わがままな性格じゃなくて、周期に関係する不調かもしれない」と考えられるようになっただけで、世界が変わりました。\n\n責める対象がなくなったんです。「私が悪い」ではなく「今はそういう時期」。この言い換えができるようになってから、自己嫌悪のループが少しゆるみました。\n\n不思議なもので、「わがままな性格」だと思っていたときは、どう頑張っても直しようがなくて苦しかった。でも「周期に関係するのかも」と思えたら、対策を考えるモードに切り替わりました。責めるのをやめた分のエネルギーが、少しだけ前向きなほうに回った感じです。\n\n## 私がやっている、小さな工夫\n\nそれから私がやるようになったことを、いくつか書いておきます。効果を保証するものではなくて、あくまで私の場合です。\n\n- **記録を続ける**：「そろそろ来るな」と予測できるだけで、心の構えが全然違います\n- **大事な予定をその時期に入れない**：できる範囲でですが、大きなテストや、言いにくい話し合いは避けるようにしています\n- **仲のいい友だちに先に言っておく**：「この時期ちょっとイライラしやすいかも、ごめん」と伝えたら、あとの気まずさが減りました\n- **「今日はそういう日」と声に出す**：ばかみたいですが、意外と効きます\n\n## つらいときは、相談していいらしい\n\nもうひとつ知ったのは、PMSは我慢するしかないものではなくて、婦人科で相談できる不調でもあるということです。\n\nつらい場合の選択肢もいろいろあると言われているようですが、このあたりは人によって違うので、私が書くべきことではないと思います。ただ、「この程度で相談していいのかな」と思っている人にこそ、伝えたいです。毎月しんどいなら、それは相談していい理由になると、私は思います。\n\nもし学校生活に支障が出るくらいつらいなら、保健室の先生や、おうちの人、婦人科など、頼れる大人に一度話してみてほしいです。\n\n## あの頃の私へ\n\nあなたの性格は、わがままじゃない。心も狭くない。\n\nただ、からだの周期のことを、誰もちゃんと教えてくれなかっただけ。\n\n同じループの中にいる人に、この記事が届いたらうれしいです。まずはアプリのメモからでも、始めてみてください。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"08","title":"アフターピル代、彼とどう分けた？お小遣いでのお金の話","category":"アフターピル","isHub":false,"wordCount":1931,"pccCount":0,"hashtags":["#アフターピル","#体験談","#お金のはなし","#カップル","#避妊","#学生","#エッセイ","#女性のからだ","#対話","#ひとりで抱えない"],"body":"アフターピル（緊急避妊薬）が必要になったとき、彼に伝えること自体もすごく迷いましたが、実はもうひとつ、最後まで言い出しにくい話がありました。\n\nお金の話です。\n\n学生の私にとって、これはただの割り勘の相談じゃありませんでした。お小遣いとバイト代でやりくりしている身に、その金額はけっこう重かったんです。今日は、当時の私がそのお金をどうしたか、なぜ曖昧にしたくなかったのかを書きます。\n\n先に言っておくと、これは「こう分けるべき」という記事ではありません。私たちの場合の記録です。費用は場所や時期で変わるので、正確な金額は病院に確認してください。\n\n## 正直、お小遣いには痛い金額だった\n\nアフターピルは基本的に保険がきかないので、私が調べた時点では、受ける場所によって金額に幅がありました。\n\n当時の私にとって、それは「気にならない」と言える金額ではありませんでした。毎月のお小遣いから、あるいは貯めていたバイト代から、急に消えると考えると、なおさらです。\n\nそして気づきました。この出費、黙っていたら私が全部かぶることになる。でも「お金出して」と言い出すのは、なんだかすごく生々しい。\n\n## 「お金の話は言いにくい」と思っていた私\n\n彼に状況を伝えるメッセージを打ちながら、お金のことをどう書くか、ずっと迷っていました。\n\n「お金出してほしい」と書くのは、なんだか取引みたいで嫌でした。かといって何も書かなければ、たぶんこのままなし崩しに私が払う。それはそれで、あとからモヤモヤする予感がありました。\n\n当時の私が怖かったのは、金額そのものより、**お金の話をした瞬間に、ふたりの空気が変わること**だったんだと思います。\n\n学生同士だと、お金の話ってなんとなくタブーな空気があります。ご飯代を割り勘するくらいならいいけど、こういう場面でお金を切り出すのは、急に生々しくて大人っぽい話に感じてしまう。そのハードルの高さが、余計に私を黙らせていました。\n\n## 私たちの場合：彼のほうから聞いてくれた\n\n結局、私は最初のメッセージにお金のことを書けませんでした。\n\nでも、彼のほうから聞いてくれました。「お金どうする？俺のバイト代から出そうか」と。\n\n正直、ほっとしました。そして少し考えて、私はこう返しました。「ふたりのことだから、半分ずつにしたい」。\n\n彼が全部出すという選択肢もあったし、それを受けてもよかったのかもしれません。でも当時の私は、全額出してもらうと「彼のミスを彼が精算した」みたいな形になる気がして、それが嫌でした。ふたりのことだから、ふたりで持つ。私の場合は、折半がいちばん気持ちに合っていました。\n\n## 分け方は、人それぞれみたいだった\n\nあとから調べたり、友だちと話したりすると、分け方は本当にいろいろでした。\n\n彼が全額出す派。「原因を作った側が払うのが当然」という考え方。折半派。「ふたりの問題だから」という考え方。自分で払う派。「自分のからだのことだから」あるいは「彼に知られたくなかったから」。\n\nどれが正解、というものではないと思います。関係も、状況も、お財布事情も、人それぞれなので。\n\nただひとつ、経験から言えるのは、**曖昧なまま終わらせると、お金のモヤモヤが関係のモヤモヤに変わる**ということです。金額の問題じゃなくて、「私だけが背負った」という感覚が残るかどうかの問題でした。\n\n## お金の話ができる相手とは、避妊の話もできた\n\nこの出来事のあと、気づいたことがあります。\n\n一度お金の話を乗り越えた相手とは、避妊の話もしやすくなっていました。考えてみれば当然で、どちらも「気まずいけど、ふたりに関わる現実的な話」だからです。\n\n避妊のことについて、私たちはその後、前よりずっと普通に話せるようになりました。あの気まずいやりとりは、無駄じゃなかったと思っています。\n\n## 言い出せない状況の人へ\n\nここまで読んで、「うちは言える関係じゃない」と感じた人もいると思います。\n\n繰り返しになりますが、最優先はあなたの安全とからだです。費用の話ができない相手なら、まず自分を守ることを先にしてください。お金の話は、あとからでも、しなくてもいい。\n\nそして、もし費用そのものがハードルで動けずにいるなら、ひとりで抱え込まないでほしいです。おうちの人や保健室の先生など、頼れる大人に事情を相談すると、思っていなかった道が見つかることもあります。相談できる窓口が地域にある場合もあるようです。\n\nお小遣いの範囲で悩んで、ひとりでぐるぐるしていたあの頃の私に、「ちゃんと誰かに言っていいんだよ」と伝えたいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"09","title":"婦人科の待合室で知り合いに会いたくない。地元で通うのが怖かった私が調べた選択肢","category":"婦人科・検査","isHub":false,"wordCount":1922,"pccCount":0,"hashtags":["#婦人科","#オンライン診療","#体験談","#エッセイ","#女性のからだ","#フェムケア","#人目が気になる","#地元","#ひとりで抱えない","#からだのこと"],"body":"婦人科に行こうと決めた日の朝、私は玄関で足が止まりました。\n\n頭に浮かんでいたのは、診察のことではありません。**待合室で学校の知り合いに会ったらどうしよう**、でした。\n\n地元の病院で、受付で名前を呼ばれるところをクラスの子に見られたら。近所のおばさんとすれ違ったら。そんな想像ばかりがふくらんで、「今日じゃなくてもいいか」と引き返しそうになりました。\n\n今日は、人目が怖くて婦人科になかなか行けなかった私が、やってみた工夫と、調べて知った選択肢の話です。\n\n## 「気にしすぎ」と言われても、怖いものは怖い\n\n先に言わせてください。この怖さを「自意識過剰だよ」と流されるのが、私はいちばんつらかったです。\n\n婦人科に行くこと自体は、やましいことでも何でもありません。頭ではわかっています。でも、生理でもピルでも避妊でも、「何で来てるんだろう」と想像される可能性があるだけで、行くハードルは上がる。学校も家も近い狭い地域なら、なおさらです。\n\n実際に会うかどうかじゃなくて、「会うかもしれない」だけで足が止まる。この感覚、わかる人にはわかると思います。\n\n特に、学校も家も近い範囲でぜんぶ完結している10代のうちは、行動範囲が狭いぶん、知っている人とばったり会う確率も高い気がしていました。バイト先の人、塾の子、部活の先輩。頭の中で「会いたくない人リスト」がどんどん長くなって、余計に動けなくなっていました。\n\n## 私がやっていた、小さな工夫\n\nそれでも行く必要があったとき、私がやっていた工夫です。\n\n- **平日の朝いちばんか、放課後すぐを狙う**：私の場合、いちばん人が少ない時間帯でした\n- **電車で少し離れた街の病院を選ぶ**：数駅ぶんの安心感は、交通費に代えられませんでした\n- **予約制のところを選ぶ**：待合室にいる時間そのものが短くなります\n\nどれも根本解決ではありません。でも、「工夫すれば行ける」と思えることが、当時の私には大事でした。\n\n## オンライン診療という選択肢を知った\n\nそして調べる中で知ったのが、オンライン診療でした。\n\nスマホのビデオ通話などで医師の診察を受けて、薬は配送や近くの薬局で受け取る、というものです。私が調べた時点では、ピルの相談や生理の相談に対応しているサービスがあるようでした。\n\n最初に思ったのは、「これ、待合室がそもそも存在しない」ということでした。\n\n知り合いに会う可能性を工夫で減らすんじゃなくて、ゼロにできる選択肢がある。人目にずっと悩んできた身としては、けっこう衝撃でした。放課後、自分の部屋から受けられるというのも、学校がある身には現実的でした。\n\nただ、オンラインにも限界はあると思います。検査が必要な場合は結局対面になるようですし、直接診てもらう安心感はオンラインでは代えがたい。それに、未成年の場合はサービスによって保護者の同意が必要なこともあるようです。このあたりは各サービスの案内や、頼れる大人に確認するのがよさそうです。\n\n## 私なりの使い分け\n\n今の私は、こんなふうに考えています。\n\n**じっくり診てほしいときや、検査が必要そうなときは対面。相談が中心のときは、オンラインも選択肢。**\n\nこれはあくまで私の使い分けで、正解ではありません。ただ、「対面かオンラインか選べる」と知っただけで、行くハードルがすごく下がりました。選択肢があると、人は動きやすくなります。\n\nそれまでの私は、「近所の病院に行く」の一択しか頭になくて、その一択が怖いから動けない、という状態でした。選択肢が増えたら、怖い一択に無理やり突っ込まなくてよくなった。それだけのことなのに、気持ちはずいぶん軽くなりました。\n\n## 人目を気にする自分を、責めなくていい\n\n最後に、あの日の玄関で足が止まっていた私に、言いたいことを書きます。\n\n人目が気になるのは、あなたが弱いからじゃない。近い環境の問題です。そして環境の問題は、環境側の工夫と選択肢で対処すればいい。気にしないように頑張る必要はありません。\n\n**「気にせず済む方法を選ぶ」のも、立派な自分の守り方**だと、今の私は思っています。無理して平気なふりをするより、怖くない道を選んだほうが、結局ちゃんと行けました。\n\nそして、どの選択肢がいいか迷ったときは、ひとりで抱え込まずに、保健室の先生やおうちの人など、頼れる大人に相談してみるのもいいと思います。相談先はいくつかあるので、自分に合いそうなところを、大人と一緒に探してみてもいいと思います。\n\n同じように、玄関で足が止まっている人に届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"10","title":"アフターピルと低用量ピル、私がずっと混同していたこと","category":"低用量ピル","isHub":false,"wordCount":2013,"pccCount":0,"hashtags":["#アフターピル","#低用量ピル","#ピル","#避妊","#体験談","#女性のからだ","#フェムケア","#知らなかったを知る","#婦人科","#からだのこと"],"body":"ちょっと恥ずかしい告白から始めます。\n\nアフターピル（緊急避妊薬）が必要になったあの夜まで、私は「ピル」と名のつくものを、ぜんぶ同じようなものだと思っていました。\n\nアフターピルも低用量ピルも、なんとなく「避妊の薬」というひとつの箱に入っていて、違いを考えたことすらなかった。学校の保健の授業でも、そこまで細かくは習わなかった気がします。同じように混同している人、実はけっこう多いんじゃないかと思います。\n\n今日は、当時の私が混同していたことを3つ、整理して書きます。先に言っておくと、これは医療情報ではなく、私が調べたり医師に聞いたりした範囲の個人の記録です。正確なことは、必ず医師・薬剤師に確認してください。\n\n## 混同していたこと①：役割がぜんぜん違った\n\nいちばん大きな勘違いはこれでした。\n\n**アフターピルは、避妊がうまくいかなかったときに、できるだけ早く飲む「緊急用」の薬**と言われているようです。一方、**低用量ピルは、毎日続けて飲むことで避妊の効果を保つ「日常用」の薬**なのだそうです。低用量ピルは避妊だけでなく、生理痛やPMSがつらくて飲んでいる人も多いようです。\n\nたとえるなら、消火器と、毎日の火の用心くらい役割が違う。「どっちも火事に関係あるやつでしょ」と思っていた私は、あの夜、検索結果の海でかなり混乱しました。\n\n同じ「ピル」という言葉が使われているせいで、勝手に近い仲間だと思い込んでいたんです。でも、飲むタイミングも、目的も、続け方も、まるで別もの。この一点を知っただけで、頭の中のごちゃごちゃが、かなりすっきりしました。\n\n役割が違うということは、「アフターピルがあるから普段は大丈夫」でもなければ、「低用量ピルを飲んでいれば緊急時の知識はいらない」でもない、ということです。このあたりの細かいことは人によって違うので、医師に聞くのが確実だと思います。\n\n## 混同していたこと②：もらい方\n\nふたつめは、もらい方です。\n\nどちらも基本的には医師の診察・処方を通じてもらうもの、という点は共通のようです。ただ、アフターピルは時間との勝負になる緊急の場面で、低用量ピルは続けることが前提で、相談しながら、という違いがあるようでした。\n\nここで大事だと思うのは、**どちらも自分の判断でネットで気軽に買う、という類のものではない**ということです。私も最初は「どこかで簡単に手に入らないかな」と思ってしまいましたが、調べてみて、まずは病院やオンライン診療などで医師に相談するものなんだと知りました。未成年だと、保護者の同意が関わる場面もあるようです。\n\n## 混同していたこと③：費用感\n\nみっつめはお金の話です。\n\nアフターピルは1回分の費用がかかり、私が調べた時点では場所によって幅がありました。低用量ピルは毎月続けるものなので、月ごとの費用として考える必要があるようです。目的によっては保険が関わる場合もあるようで、このあたりは私には正確に書けません。\n\n学生の私が言えるのは、**どちらも「事前に、だいたいの総額を確認してから決める」のが安心**だったということだけです。聞くのは恥ずかしいことではありませんでした。\n\n## 処方のとき、思い切って医師に聞いてみた\n\nアフターピルを処方してもらったとき、私は勇気を出して医師に聞きました。「低用量ピルって、私みたいな学生も飲むものなんですか」と。\n\n先生は嫌な顔ひとつせず、低用量ピルがどういう薬なのか、始めるならどういう流れになるのかを説明してくれました。内容の細かいところは、私の記憶で書くべきではないので割愛しますが、覚えているのは、**「気になるなら、落ち着いてからゆっくり相談に来ればいいよ」**と言われたことです。\n\n緊急の日に、日常の選択肢の入口を教えてもらった。あの一言は、その後の私が婦人科を「相談していい場所」だと思えるようになった理由のひとつです。\n\n## 「緊急の知識」と「日常の選択肢」、両方持っておく\n\n整理すると、当時の私に必要だったのはこの2つでした。\n\n- **緊急の知識**：もしものとき、アフターピルという選択肢がある。時間が大事。相談先は病院やオンライン診療\n- **日常の選択肢**：避妊や生理の悩みには、低用量ピルを含めた続けられる選択肢がある。落ち着いてから相談できる\n\n緊急の知識だけだと、毎回「もしも」に怯えることになる。日常の選択肢だけだと、いざというとき動けない。両方をなんとなくでも知っておくことが、自分のからだを守る装備になると、今は思っています。\n\nもし今、検索結果の海で混乱している人がいたら。ひとりで正解を出そうとしなくて大丈夫です。わからないことは、産婦人科医や、保健室の先生など、頼れる大人に聞いてみてください。それがいちばん確実でした。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"11","title":"アフターピルを飲んだあと、生理が来るまでの3週間の記録","category":"アフターピル","isHub":false,"wordCount":1814,"pccCount":0,"hashtags":["#アフターピル","#緊急避妊薬","#体験談","#女性のからだ","#不安との向き合い方","#生理","#エッセイ","#記録","#ひとりで抱えない","#からだのこと"],"body":"アフターピル（緊急避妊薬）って、飲んだらそれで終わり。当時の私は、なんとなくそう思っていました。\n\nでも実際は違いました。**本当に落ち着かない時間は、飲んだあとに始まった**んです。\n\nこの記事は、飲んでから生理が来るまでの約3週間、学校に通いながら私がどんな気持ちで過ごしたかの記録です。先にお伝えしておくと、これは医療情報ではなく、私ひとりの体験談です。からだの反応や生理のタイミングは人によって違います。飲んだあとの体調や生理のことで不安があるときは、処方を受けた病院や医師・薬剤師に相談してください。\n\n今まさに「待っている」誰かに、少しでも届いたらうれしいです。\n\n## 1週目：授業中もずっと検索していた\n\n飲んだ直後は、正直ほっとしていました。「やることはやった」という感覚です。\n\nでも数日経つと、別の不安が始まりました。本当に効いてるのかな、という不安です。\n\nこの時期の私は、自分のからだのちょっとした変化に、ものすごく敏感になっていました。少しお腹が張れば検索、眠ければ検索、何ともなくても「何ともないのは大丈夫なの?」で検索。授業中にノートを取りながら、頭の片隅でずっと検索結果のことを考えていました。読めば読むほど、安心する話と怖い話が同じ顔で並んでいて、わけがわからなくなっていきました。\n\n今振り返って思うのは、**この時期の検索は、不安を減らすためじゃなくて、不安を確かめるためのものになっていた**ということです。やめられないのは仕方ない。でも検索が答えをくれることは、最後までありませんでした。\n\n## 2週目：友達と笑ってる時間だけ、忘れられた\n\n2週目に入ると、学校のことに気持ちが戻る時間が少しずつ増えました。\n\n休み時間に友達としゃべっているときや、部活で体を動かしているときは、忘れていられる。でも、夜ベッドに入った瞬間や、ふとカレンダーを見た瞬間に、すっと不安が戻ってくる。その繰り返しでした。\n\nこの時期にやってよかったのは、夜にスマホを手放す口実を作ることでした。長めにお風呂に入る、次の休みの予定を入れる、机まわりを片づける。どれも気休めですが、「検索できない時間」を無理やり作ることには意味があった気がします。\n\n## 3週目：生理が来た日のこと\n\n私の場合は、3週目に生理が来ました。\n\n学校のトイレで気づいた瞬間のことは、今でも覚えています。安心で力が抜けるってこういうことか、と思いました。個室の中で、小さく「よかった」ってつぶやいていました。\n\nただ、これはあくまで私の場合です。生理のタイミングやからだの反応は人によって違うと聞いていましたし、いつもと違う出血に「これって生理なの?」と戸惑う人もいるようです。だからこそ、次に書くことがいちばん大事だと思っています。\n\n## 私を支えたのは「先生と決めた目安」だった\n\n3週間を振り返って、私をいちばん支えてくれたものは何だったか。\n\n検索でも気休めでもなく、**処方のときにお医者さんと決めた「目安」**でした。\n\n私は処方を受けたとき、「この先どうなったら、もう一回来ればいいですか」と聞きました。先生は、生理が来ない場合や気になる症状が出た場合の、受診の目安を教えてくれました。\n\nつまり私は、「いつまで待つか」「どうなったら病院に行くか」の線を、最初から持っていたんです。この線があるのとないのとでは、不安の質が全然違いました。線がないと、不安は底なしになる。線があると、「今日はまだ待っていい日」と自分に言えます。もしこれから処方を受ける人がいたら、この質問だけはしてきてほしいです。もう飲んでいて目安を持っていない人は、処方してくれた病院に問い合わせれば教えてもらえるはずです。自己判断で「もう大丈夫」「もうだめだ」と決めてしまわないでください。\n\n## 今まさに、待っている人へ\n\nこの記事を読んでいる人の中には、今日が「何日目」かをぴったり言える人がいると思います。私もそうだったから、わかります。\n\nあなたの不安は、大げさでも考えすぎでもありません。そして、その不安を検索だけで解消しようとしなくていい。病院は、飲んだあとの相談も受けてくれる場所です。\n\n学校の日常に戻れる時間が、少しずつ増えていきますように。ひとりで抱え込まなくていいよ、と伝えたいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"12","title":"性感染症の検査、受けてみたら気持ちが軽くなった話","category":"婦人科・検査","isHub":false,"wordCount":1720,"pccCount":0,"hashtags":["#性感染症","#性病検査","#体験談","#女性のからだ","#婦人科","#セルフケア","#検査","#エッセイ","#ひとりで抱えない","#からだのこと"],"body":"「検査、受けたほうがいいんだろうな」\n\nそう思ってから実際に受けるまで、私は何ヶ月もかかりました。\n\n今日は、性感染症（STI）の検査を先延ばしにし続けた私が、やっと受けて、拍子抜けするほど気持ちが軽くなった話を書きます。これは医療情報ではなく、私ひとりの体験談です。検査を迷っている人の、最初の一歩のハードルが少しでも下がったらうれしいです。\n\n## 先延ばしにしていた理由\n\n受けようと思ったきっかけは、避妊がうまくいかなかった経験でした。うまくいかなかったということは、考えたくないけれど、他のことも気にしたほうがいいのかもしれない、と思ったんです。\n\nなのに、何ヶ月も動けませんでした。理由を正直に並べます。\n\n**結果を知るのが怖かった。** もし何か見つかったらどうしよう、という気持ち。知らなければ「何もない」ことにしておける気がしていました。\n\n**どこで受けられるのか知らなかった。** 婦人科?保健所?そもそも何科に行けばいいのかすら、ぼんやりしていました。\n\n**恥ずかしかった。** 受付で「検査を」と言う場面を想像するだけで、気が重くなりました。もし同じ制服の子と会ったら、なんて考えると、余計に足が止まりました。\n\nたぶん、この3つのどれかで止まっている人、多いんじゃないかと思います。\n\n## 調べてわかった、受けられる場所\n\n重い腰を上げて調べてみると、選択肢は思ったより多くありました。私が調べた時点でのメモです。\n\n- **婦人科・レディースクリニック**：からだの相談と一緒にできる\n- **保健所**：自治体によっては、無料・匿名で受けられる検査があるようです。項目や日程は地域によって違うようなので、住んでいる自治体の案内を確認してみてください\n- **検査キット**：自宅でできるものもあるようですが、私は結果の受け止め方に自信がなくて、対面を選びました\n\n**「どこでもいい、自分がいちばん行きやすいところでいい」**とわかったことが、私にとっては大きな前進でした。年齢のことで不安なら、受けられるかどうかを電話で先に聞いてみるのもいいと思います。\n\n## 当日は、淡々と終わった\n\n私は婦人科で受けました。\n\n受付では「検査の相談で」とだけ言えば通じました。想像していた「気まずい説明タイム」はありませんでした。先生には正直に状況を話しました。どの検査を受けるかは、話を聞いた上で提案してもらえたので、私が事前に完璧に調べておく必要はなかったんです。\n\n検査そのものについて詳しくは書きませんが、私の感想をひとことで言うと「え、もう終わり?」でした。何ヶ月も悩んでいた時間のほうが、よっぽど長くて重かったです。\n\n## 結果を待つ間と、受け取った日\n\n結果が出るまでの数日間は、正直そわそわしました。授業を受けていても、ふと思い出してしまう感じです。\n\n私の場合は、幸い問題ありませんでした。結果を聞いた帰り道の、あの足取りの軽さは忘れられません。何ヶ月も背負っていた「わからない」という荷物を、やっと下ろせた感覚でした。\n\nもし何か見つかっていたとしても、それは「早く見つかってよかった」なんだと、検査を終えた今なら思えます。見つかることと、知らずにいること。私にとって怖かったのは、後者のほうでした。\n\n## 怖かったのは検査じゃなく、「知らないままでいること」だった\n\n何ヶ月も先延ばしにしてわかったのは、これです。\n\n検査が怖いんじゃない。**「知らないまま、うっすら不安な状態」が、いちばん心を削る。**\n\n知らない間、私はその不安を毎日少しずつ引きずっていました。検査は、その引きずりを止めるための手段でした。安心を「取り戻す」という感覚が、いちばん実感に近いです。\n\n## 迷っている人へ\n\nもし今、あの頃の私みたいに「受けたほうがいいんだろうな」と思いながら止まっている人がいたら。\n\n完璧に調べてから、と思わなくて大丈夫です。行きやすそうな場所に「検査の相談がしたい」と連絡する。それだけで、あとは向こうが案内してくれます。\n\nひとりで抱え込まなくていいよ、と伝えたいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"13","title":"避妊の話を、付き合う前にできますか？できなかった私の話","category":"避妊・恋愛","isHub":false,"wordCount":1669,"pccCount":0,"hashtags":["#避妊","#恋愛","#カップル","#パートナーシップ","#対話","#体験談","#エッセイ","#女性のからだ","#自分を守る","#ひとりで抱えない"],"body":"「避妊の話は、ちゃんとしたほうがいい」\n\n正論です。反論のしようもありません。でも、昔の私はできませんでした。\n\n今日は「話し合いましょう」と呼びかける記事ではなくて、**できなかった私が、なぜできなかったのか。そして今はどう考えているのか**の話です。今まさに言えずにいる人を、責めない記事にしたいと思っています。\n\n## 言えなかった理由を、今なら言葉にできる\n\n当時の私が避妊の話をできなかった理由は、整理するとこの3つでした。\n\n**雰囲気を壊すのが怖かった。** いい感じの空気の中で、急に現実的な話を持ち出す勇気がなかった。「そういう話をする子」だと思われたくない、という気持ちもありました。\n\n**「慣れてる」と思われたくなかった。** 避妊についてちゃんと知っていて、ちゃんとお願いできることが、なぜか「経験豊富の証」みたいに見られる気がして怖かった。今思えば完全に逆で、知っていることは自分を守れることなのに。\n\n**そもそも、言葉を持っていなかった。** 「避妊してほしい」を、気まずくならずに言うための言い回しを、私はひとつも知りませんでした。学校の授業でも、誰も具体的な言い方までは教えてくれなかった。\n\nどれも、今振り返れば「そんなことで」と思えます。でも当時の私には、どれも本物の壁でした。\n\n## 気づいてしまったこと\n\n私が変わったきっかけは、避妊のことで不安な夜を過ごした経験でした。\n\n深夜に検索し続けた時間、お金の心配、生理が来るまでの落ち着かない数週間。あれを経験して、はっきりわかったんです。\n\n**「言えない」ことでしんどい思いをするのは、私なんだ**と。\n\n雰囲気を壊す気まずさは、数分で終わります。でも、言えなかった場合に起こりうることは、数週間、場合によってはもっと長く、私のからだと心に乗ってくる。この重さの違いに気づいてから、私の中で優先順位が変わりました。\n\n## 今の私が意識していること\n\n偉そうに言える立場ではないのですが、今の私が意識していることを書きます。正解ではなく、一例として読んでください。\n\n**タイミングは「その場」より前。** 私はその場で言うのがいちばん苦手だったので、もっと手前の、ふつうに向かい合って話している段階で伝えるようになりました。「そういう関係になる前に、ひとつだけ話しておきたいんだけど」という感じです。\n\n**言い回しは「私の決めごと」として。** 「あなたは避妊してくれる人?」と相手を試す形ではなく、「私は避妊しないのは無しって決めてる」と、自分のルールとして伝える。相手を責める形にならないぶん、私はこちらのほうが言いやすかったです。\n\n**一度言えば、次から言いやすくなる。** これは本当でした。最初の一回がいちばん重くて、二回目からは普通の会話に近づいていきます。\n\n## 相手の反応は「相手を知る情報」\n\nそして、伝えるようになって気づいたことがあります。\n\n避妊の話をしたときの相手の反応は、**その人がどういう人なのかの、けっこう正確な情報**だということです。\n\n真剣に受け止めてくれる人もいれば、茶化す人も、面倒くさそうにする人もいました。当時は茶化されると「言わなきゃよかった」と思っていたけれど、今は違う受け止め方をしています。私のからだに関わる話を茶化す人だと、早い段階でわかってよかった、と。\n\n相手を悪者にしたいわけではありません。ただ、この話ができるかどうかは、この先いっしょに困ったときに一緒に考えられるかどうかと、たぶんつながっている気がします。\n\n## 言えなかった頃の私へ\n\n最後に、言えなかった頃の自分に向けて書きます。\n\n言えなかったのは、あなたが弱いからでも、だらしないからでもない。言葉を教わる機会がなくて、言える空気が周りになかっただけ。だから、責めなくていい。\n\nそして、これから言えるようになるのに、遅すぎることはないです。ひとりで抱え込まなくていいよ、と伝えたいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"14","title":"低用量ピルを始めて3ヶ月。学校生活で変わったこと、戸惑ったこと","category":"低用量ピル","isHub":false,"wordCount":1866,"pccCount":0,"hashtags":["#低用量ピル","#ピル","#体験談","#女性のからだ","#生理","#フェムケア","#学校生活","#エッセイ","#婦人科","#からだのこと"],"body":"からだのことをいろいろ考えるようになってしばらく経って、私は低用量ピルを飲み始めました。きっかけは、婦人科で「気になるなら、落ち着いてから相談に来ればいいよ」と言われていたこと。その言葉を、数ヶ月越しに実行した形です。\n\nこの記事は、飲み始めて3ヶ月の記録です。先にお断りしておくと、これは医療情報ではなく、私ひとりの体験談です。低用量ピルの効果や合う合わないは人によって大きく違うようです。始めるかどうか、続けるかどうかは、必ず医師と相談して決めてください。「良かったよ」とおすすめする記事ではなく、「私の場合はこうだった」の記録として読んでもらえたらうれしいです。\n\n## 戸惑ったこと①：「毎日同じ時間に飲む」が意外とできない\n\n始める前の私は、正直なめていました。1日1錠飲むだけでしょ、と。\n\nできませんでした。最初の2週間で何回か、飲む時間がずれました。\n\n平日は学校のリズムがあるから決まった時間に飲めるのに、休日はリズムが崩れる。部活の大会がある日や、朝が早い日、逆にお昼まで寝ちゃう日。「毎日決まった時間」は、生活が毎日同じ人向けの言葉で、私の生活は思ったより毎日違いました。\n\n私が今やっている工夫です。\n\n- **歯磨きとセットにする**：「夜の歯磨きのあとに飲む」と行動に紐づけたら、忘れにくくなりました\n- **リマインダーを使う**：生理管理アプリの通知機能で、毎日同じ時間に鳴らしています\n- **飲んだらチェックする**：飲んだか飲んでないか記憶が曖昧になる日があったので、記録をつけています\n\n飲み忘れたときにどうするかは、状況によって対応が違うようなので、私は処方のときに医師に確認して、メモに残してあります。これから始める人は、最初に聞いておくのがおすすめです。\n\n## 戸惑ったこと②：飲み始めの時期の体調\n\n飲み始めの時期、私の場合は、なんとなく調子が定まらない日がありました。\n\n具体的な症状は個人差が大きいようなので詳しく書きませんが、書きたいのは、そのとき私がやったことのほうです。**自己判断でやめたり我慢したりせず、処方してもらった婦人科に連絡した**、ということです。\n\n「この程度で連絡していいのかな」と迷いましたが、連絡してよかったです。様子を見ていい範囲と、受診したほうがいいサインを教えてもらえて、それだけで安心して続けられました。処方して終わりじゃなくて、続けている間も相談していいんだと知ったのは、この時期の収穫でした。\n\n## 変わったこと：学校生活のなかで\n\n3ヶ月経って、学校生活のなかで変わったことを書きます。\n\n**予定が立てやすくなりました。** 私にとってはこれがいちばん大きい変化でした。「その日」がいつ来るか分からない状態と、だいたい見通しが立つ状態では、部活の試合や旅行の予定の立てやすさが全然違います。テスト期間とかぶるかどうかを、前もって気にできるのも助かりました。\n\n**「自分のからだを気にかけている」という感覚が生まれました。** うまく言えないのですが、毎日1錠飲むという行為そのものが、「私は自分のからだを放置してない」という小さな証明になっている気がします。\n\nからだの変化については、あえてここには書きません。人によって本当に違うようですし、私の例が誰かの期待や不安になるのは違うと思うからです。気になる人は、医師に聞いてください。\n\n## 続けるためにやっていること\n\n- **定期受診をサボらない**：受診のタイミングで体調の変化を話すようにしています\n- **お金のことを家族と相談した**：毎月かかるものなので、私はここは正直に大人に話しました\n- **記録を続ける**：アプリに体調メモを残しておくと、受診のとき話が早いです\n\n費用のことや通いやすさは、続けるうえで大事な要素です。学生のうちは自分ひとりで抱えきれないこともあるので、私は頼れる大人と一緒に考えるようにしました。\n\n## 迷っている人へ\n\n3ヶ月飲んでみての正直な感想は、「劇的な魔法ではなくて、じわじわ効いてくる生活の道具」です。\n\nそして道具だからこそ、合う人と合わない人がいる。私に合っているからあなたに合うとは限らないし、その逆もそうです。\n\n迷っているなら、飲むかどうかを今決める必要はなくて、「相談に行くかどうか」だけ決めればいい。始めるかどうかは、医師と話してから考えられます。ひとりで抱え込まなくていいよ、と伝えたいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"15","title":"「自分のからだを後回しにしない」って、具体的にどういうこと？私の7つの習慣","category":"セルフケア","isHub":false,"wordCount":1713,"pccCount":0,"hashtags":["#セルフケア","#フェムケア","#エッセイ","#体験談","#女性のからだ","#自分と向き合う","#習慣","#暮らし","#知らなかったを知る","#からだのこと"],"body":"からだのことを考えるようになってから、私がずっと大事にしている「自分のからだを後回しにしない」という言葉。\n\n実は最初、自分でもよくわかっていませんでした。そう思った夜のことは覚えているのに、じゃあ具体的に何をするの?と聞かれたら、答えられなかったと思います。\n\nあれから時間が経って、少しずつ「これのことだったのか」と思える習慣が増えてきました。今日はそれを7つ、書き出してみます。10代の私でもできる、大げさなことはひとつもない習慣です。\n\n## 私の7つの習慣\n\n**①記録する**\n\n生理、気分、体調のメモ。私のセルフケアはぜんぶここから始まりました。記録があると、不調に「周期」や「パターン」が見えてきます。「生理前になると落ち込みやすい」と気づけたのも、婦人科で話が早いのも、記録のおかげです。1日10秒のアプリ入力から始めました。\n\n**②痛みを「いつもの」と呼ばない**\n\n生理痛がひどい日、以前の私は「いつものやつ」と呼んで、我慢して授業を受けていました。今は「毎月来る、相談していい不調」と呼び直しています。呼び方を変えただけで、我慢が当たり前ではなくなりました。つらい日は保健室に行っていい、と思えるようになりました。\n\n**③相談できる場所を知っておく**\n\n保健室の先生、かかりつけになりそうな婦人科、自治体の相談窓口。「何かあったらどこに行けばいいか」を元気なうちにスマホにメモしてあります。困ったときにゼロから探す心細さは、一度経験すれば十分です。\n\n**④気になることは、大人に一回話してみる**\n\nひとりで抱えていた不安を、信頼できる大人に一回話すだけで、驚くほど軽くなることがありました。親に言いにくければ保健室の先生でもいい。話す相手は、自分が話しやすい人でいいんだと思います。\n\n**⑤ケアにかかるお金を「必要なお金」と呼ぶ**\n\n受診費、薬代、ナプキンやケア用品。以前は「余計な出費」の顔をしていたこれらを、「自分に必要なお金」と呼ぶようにしました。学生でお小遣いが限られているぶん、大事なことにちゃんと使いたい、と思えるようになりました。\n\n**⑥予定を断る練習**\n\n体調が悪い日に、無理して行った予定でいいことがあった記憶がありません。「ごめん、今日は体調優先で」と言う練習を、小さい約束から始めました。断れた日は、ちゃんと自分をほめます。\n\n**⑦「あとで調べよう」を、今調べる**\n\n気になる症状、避妊のこと、制度のこと。「あとで」と思ったものは、その場で3分だけ調べるようにしています。知識は、困ったそのときじゃなくて、落ち着いているときにしか蓄えられないと思い知ったからです。\n\n## できない日があっていい\n\n7つ書きましたが、全部できている週なんてありません。\n\n記録は三日坊主を何周もしているし、断れずに無理した日もふつうにあります。それでいいと思っています。\n\n**「後回しにしない」は、完璧にやることじゃなくて、後回しにした自分に気づいて、また戻ってくること。** 戻ってくる場所として、この7つがある感じです。\n\n## 「後回しにしない」は、自分への態度の話\n\n結局この言葉は、何かのタスクの話ではなくて、**自分を自分の予定に入れるかどうか**という態度の話なんだと思います。\n\nテストの締切、友達との約束、部活の予定。ほかの予定はちゃんと気にするのに、自分のからだのことだけは、いつも空いた時間の残り物でやろうとする。それをやめる、ということ。\n\n以前の私は、自分の予定に自分がいない生活をしていました。今は、月に数個ですが「自分のからだ」の予定が入っています。それだけで、毎日の安心感がちょっと変わりました。\n\n## 読んでくれているあなたへ\n\n7つのうち、どれかひとつでも「これならできそう」と思えるものがあったら、それだけ持ち帰ってください。全部やる必要はありません。私のおすすめは①の記録です。10秒でできて、あとから全部の土台になるので。\n\n同じように自分のからだと向き合おうとしている人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"16","title":"オンライン診療、初めて使ってみた。学校がある日の流れと正直な感想","category":"婦人科・検査","isHub":false,"wordCount":1957,"pccCount":0,"hashtags":["#オンライン診療","#婦人科","#体験談","#低用量ピル","#フェムケア","#女性のからだ","#エッセイ","#学生","#知らなかったを知る","#からだのこと"],"body":"このnoteで前に「オンライン診療っていう仕組みもあるみたいです」と書いたことがあります。でも正直に言うと、書いた当時の私は一度も使ったことがありませんでした。名前を知っているだけの状態でした。\n\nこの前、初めて使ってみました。低用量ピルのことで相談したいことがあったのに、平日は授業と部活で、土曜も予定が詰まっていて、どうしても病院に行く時間がとれなかったからです。\n\n今日はその体験の記録です。先に言っておくと、オンライン診療の流れや対応してもらえる内容は、サービスやクリニックによってけっこう違うみたいです。これはあくまで「私が使ったひとつの例」として読んでください。特定のサービスをおすすめする記事ではありません。\n\n## そもそも、なんで使ってみようと思ったか\n\nきっかけは、時間のなさでした。\n\n放課後は部活があって、終わるころには病院の受付時間はとっくに過ぎている。休みの日に行こうと思っても、模試や課題や友だちとの約束が入ってしまう。「来月でいいや」を何回くり返したか、自分でも数えられなくなっていました。\n\nそんなとき、スマホで診察を受けられる仕組みがあることを思い出しました。「家から出なくていいなら、放課後でもいけるかも」。そう思えたのが、動き出せた理由でした。\n\n## 私の場合の、当日までの流れ\n\n私が使ったときの流れは、ざっくりこんな感じでした。\n\n**予約**：スマホでサイトから日時を選びました。夜、布団の中で予約操作ができたのが、まずありがたかったです。思い立ったその場で動けるので。\n\n**事前の問診フォーム**：予約のあと、体調や気になっていることをフォームに入力しました。病院で紙に書く問診票と同じような内容を、自分の部屋で落ち着いて書けた感覚でした。\n\n**ビデオでの診察**：予約した時間になると連絡が来て、画面ごしにお医者さんと話しました。私の場合は、これまでの様子の確認が中心で、時間は短めでした。「対面より雑」という感じはなく、聞きたかったこともちゃんと聞けました。\n\n家から一歩も出ないうちに診察が終わって、なんだか不思議な気持ちになりました。\n\n## 学校がある日でも、これならいけると思った\n\n使ってみていちばん実感したのは、**時間のハードルがぐっと下がる**ことでした。\n\n病院に行くとなると、移動して、待合室で待って、で半日つぶれることもあります。それがオンラインだと、予約した短い時間だけで済みました。放課後の少しの時間でも収まったのは、私にとって大きかったです。\n\n待合室そのものが存在しないのも、地味だけど大事なポイントでした。「知っている人に会ったらどうしよう」という不安が、そもそも発生しないからです。人目が理由でためらってきた人には、それだけで安心材料になると思います。\n\n## 正直、戸惑ったこと・限界だと感じたこと\n\nいいことばかり書くのはフェアじゃないので、正直な部分も書きます。\n\n**画面ごしの緊張は、対面とはまた違う。** 通信が途切れたらどうしようというそわそわが、最初はありました。たぶん次からは慣れると思います。\n\n**からだを直接診てもらうことはできない。** 当たり前ですが、画面ごしでは検査や触診はできません。私のときも「こういう症状のときは対面で受診してください」という案内がありました。オンラインは万能ではなくて、対面のほうがいい場面もちゃんとあるようです。\n\n**未成年だと、対応がサービスによって違うこともある。** 私が調べた時点では、年齢や状況によって受けられる範囲が変わることもあるようでした。気になる人は、予約の前に「未成年でも利用できますか」と確認しておくと安心だと思います。\n\n## 私なりの、今の使い分け\n\n今の私の整理は、こんな感じです。\n\n- **オンライン**：継続の相談や、話が中心のとき。時間がどうしてもとれないとき\n- **対面**：初めての相談や、じっくり診てほしいとき、検査が必要かもしれないとき\n\nどちらが上、という話ではなくて、用途がちがう道具なんだな、と思いました。\n\n## 気になっている人へ\n\nオンライン診療、使う前の私は「なんとなく不安」のかたまりでした。使ってみた今は、「対面の下位版」じゃなくて「別の入口」なんだと感じています。\n\n時間がなくて後回しにしていること、人目が気になって行けずにいること。もしそれがあるなら、選択肢のひとつとして調べてみてもいいかもしれません。もちろん、どのやり方が自分に合うかは人それぞれなので、迷ったら学校の先生や、頼れる大人に一緒に考えてもらうのもいいと思います。\n\n同じように迷っている人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"17","title":"生理痛で保健室に行くのを、「サボりだと思われそう」でためらっていた話","category":"生理・PMS","isHub":false,"wordCount":1760,"pccCount":0,"hashtags":["#生理痛","#生理","#保健室","#体験談","#学校生活","#女性のからだ","#フェムケア","#エッセイ","#ひとりで抱えない","#からだのこと"],"body":"生理痛がつらい日、保健室に行けばいいのは、頭ではわかっていました。\n\nでも私は、なかなか行けませんでした。授業を抜けて保健室に行くことが、「サボりだと思われそう」で、こわかったからです。\n\n今日は、その「思われそう」でずっとためらっていた私が、やっと保健室のドアを開けられるようになるまでの話です。\n\n## なんで、あんなに行けなかったんだろう\n\n今ふり返ると、行けなかった理由は、いくつも重なっていました。\n\n**「このくらいで」と思っていた。** クラスにはもっと元気そうに過ごしている子もいる。私だけ抜けるのは大げさなんじゃないか。そう思うと、手を挙げられませんでした。\n\n**先生や友だちの目が気になった。** 授業中に「気分が悪いので」と言って出ていくとき、みんなの視線が集まる気がして。生理だと言うのも恥ずかしくて、うまく説明できる自信もありませんでした。\n\n**「サボりだと思われそう」がいちばん強かった。** 本当につらいのに、ラクをしていると思われるのがいやで。まじめに見られたい気持ちが、からだのつらさより前に出ていました。\n\nどれも、今見るとぜんぶ「がまんを続けるための理由」でした。「がまんすべき理由」ではなかったんです。\n\n## がまんして受けた授業は、結局あたまに入っていなかった\n\nある日、いつものように痛みをこらえて席にすわっていて、気づいたことがありました。\n\n痛みをこらえることに必死で、**先生の話がまったくあたまに入っていなかった**んです。ノートは取っているのに、内容は何も残っていない。それに気づいたとき、「これ、教室にいる意味あるのかな」と思いました。\n\nがまんして教室にいることが、まじめなことだと思っていました。でも実際は、痛みで集中できていないだけ。だったら、少し休んで立て直したほうが、よっぽど授業のためにもなるんじゃないか。そう思えたのが、考え方が変わったきっかけでした。\n\n## 思いきって保健室に行った日のこと\n\n次に強い痛みが来た日、私は思いきって手を挙げました。「すみません、少し体調が悪くて、保健室に行ってもいいですか」。生理とはっきり言えなくて、そこは「体調が悪くて」でごまかしました。それでも大丈夫でした。\n\n保健室の先生の対応は、拍子抜けするくらい、あっさりしていました。「横になって休んでいいよ」「あたためる?」。責めることも、根ほり葉ほり聞くこともなく、ただ休ませてくれました。\n\nベッドで横になりながら、なんだか涙が出そうになりました。ずっと「大げさだ」と自分を責めてきたのに、ここではそれが当たり前に受け入れてもらえたからです。\n\n## 保健室の先生は、こういう相談を毎日受けている人だった\n\nあとから知ったのですが、保健室の先生は、生理の相談を受けるのに慣れているようでした。\n\n考えてみれば当然で、学校には毎日たくさんの生徒がいて、そのうちの何人かは毎月生理と向き合っている。「生理痛で来ました」は、先生にとって特別なことでもなんでもなかったんです。\n\nそれに、保健室の先生は、必要なら「一度婦人科で相談してみたら」とつないでくれる立場でもあるようでした。ひとりで「病院に行くほどかな」と悩むより、まず身近なところで相談できる大人がいる。それを知れたのは大きかったです。\n\n## 「サボりだと思われそう」で迷っている人へ\n\nもし今、生理痛がつらいのに保健室に行くのをためらっている人がいたら、伝えたいことがあります。\n\n痛みでまともに授業を受けられていないなら、それはサボりではありません。少し休んで立て直すことは、ズルでもなんでもないと思います。周りがどう思うかより、あなたのからだのほうが先です。\n\nそれでも「行きづらい」と感じるなら、休み時間に先に保健室に顔を出して、「生理痛がつらいとき休ませてもらえますか」と聞いておくのも手だと思います。一度話しておくと、次から行きやすくなりました。\n\n保健室の先生でも、婦人科のお医者さんでも、こういう相談を毎日聞いている大人はちゃんといます。あなたの毎月のつらさが、「仕方ない」で終わらされませんように。\n\n同じように迷っている人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"18","title":"親にバレたくない。実家暮らしでアフターピルが必要になった私が考えたこと","category":"アフターピル","isHub":false,"wordCount":1912,"pccCount":0,"hashtags":["#アフターピル","#緊急避妊薬","#体験談","#実家暮らし","#女性のからだ","#エッセイ","#相談していい","#信頼できる大人","#ひとりで抱えない","#からだのこと"],"body":"アフターピル（緊急避妊薬）が必要かもしれない、と思ったとき、当時の私にはふたつの不安がありました。\n\nひとつは、妊娠の可能性そのもの。もうひとつは、**家族に知られること**でした。当時の私は実家暮らしで、親と毎日顔を合わせていたからです。\n\n正直に言うと、行動を止めていたのは、後者の不安のほうでした。今日はその話を書きます。先に言っておくと、これは「バレずに何とかする方法」の記事ではありません。むしろ、私が最終的に「ひとりで抱えるのをやめた」話です。\n\n## なんで、あんなに知られたくなかったのか\n\n冷静に考えれば、私は悪いことをしたわけでもないし、自分のからだのことを大事にしようとしていただけです。それでも「絶対に知られたくない」と思った理由を、今なら言葉にできます。\n\n**心配をかけたくなかった。** 親が悲しんだり心配したりする顔を想像するだけで、つらかった。\n\n**怒られるのがこわかった。** 性に関わることで親に何か言われるのが、ただただこわい。「そういうこと」を知られること自体がこわい、という感覚でした。\n\n**うちには、その手の話をする空気がなかった。** 生理の話すら遠回しにしか出ない家で、緊急避妊の話なんてできるわけがない、と思い込んでいました。\n\n同じ気持ちの人、きっと少なくないと思います。そして先に伝えておきたいのは、**親に言えない気持ちは、悪いものではない**ということ。家庭の空気はそれぞれで、話しにくいのはあなたのせいではないからです。\n\n## でも、「まず大人に相談する」ことだけは、飛ばせなかった\n\n秘密にしたい気持ちは、否定しません。ただ、ひとつだけ、私がどうしても飛ばせなかったことがあります。\n\nそれは、**アフターピルは、お医者さんの処方が必要な薬だ**ということです。自分の判断でどこかから手に入れたり、飲む量を勝手に決めたりできるものではありません。だから「誰にも言わずに何とかする」という道は、そもそも存在しませんでした。\n\nしかも、時間が関係する薬でもあるようです。悩んでいる時間が長くなるほど、選択肢は狭まってしまう。だからこそ、「親に言うかどうか」で立ち止まる前に、**まず医療につながること**が先だと、私は考えを切りかえました。\n\n## 「親に言えない」と「誰にも言えない」は、ちがう\n\nこれが、この記事でいちばん書きたかったことです。\n\n親に言えないのは、仕方ない。でも、そのまま**「誰にも言えない」を選ばないでほしい**んです。\n\n私が当時いちばん誤解していたのは、「大人に相談する＝親に伝わる」だと思い込んでいたことでした。でも、そうではありませんでした。お医者さんや薬剤師さんには守秘義務があって、診察室で話したことが、あなたの同意なく家族に伝わることは基本的にないそうです。私はそれを知らなくて、ひとりで抱え込んでいました。\n\n親のほかにも、あなたの味方になってくれる大人はいます。保健室の先生、学校医の先生、産婦人科のお医者さん、それから地域には、若い人のからだや性の相談を受けている窓口もあるようです。親に言えないことを話せる大人は、ちゃんと存在します。\n\n## 未成年こそ、行く前に電話で聞いてほしい\n\nもしこれを読んでいるあなたが未成年なら、ひとつだけ大事なことがあります。\n\n未成年の場合、保護者の同意や同伴が必要かどうかは、病院やクリニックによって対応がちがうようです。だからこそ、行く前に電話で「未成年ですが、相談できますか」と聞いてみてほしいんです。\n\n聞くのは勇気がいると思います。でも、電話の向こうにいるのは、こういう相談を毎日受けているプロです。あなたを叱る人ではありません。私も一度電話で聞いてみたら、変な対応はされませんでした。それだけで、少し息がしやすくなりました。\n\n## あの頃の私と同じ状況の人へ\n\n家族が寝しずまった家で、音を立てないようにスマホで検索しているあなたへ。\n\n親に言えないことに、罪悪感を持たなくていいです。ただ、ひとりで全部を抱えることだけは、やめてほしい。話す相手は、親じゃなくてもいい。保健室の先生でも、産婦人科でも、相談窓口でも、あなたが少しでも話せそうな大人からで大丈夫です。\n\n「言うかどうか」は、そのあとゆっくり考えればいいこと。私自身も、いろいろあった末に、最終的に信頼できる大人に相談してよかったと思っています。あなたの味方になる大人は、家の外にもちゃんといます。\n\n同じように、真夜中にひとりで抱えている人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"19","title":"「婦人科以外の相談先」ってあるの？気になって調べてみた","category":"相談先","isHub":true,"wordCount":2346,"pccCount":3,"hashtags":["#相談先","#婦人科","#オンライン診療","#保健室","#フェムケア","#女性のからだ","#調べてみた","#体験談","#相談していい","#ひとりで抱えない"],"body":"からだのことで不安になったとき、「婦人科に行けばいい」とはよく聞きます。\n\nでも、正直に言うと、当時の私にとって婦人科はハードルが高い場所でした。「いきなり病院はおおげさかも」「予約とか、行き方とか、よくわからない」。そう思って、結局どこにも相談できずにいました。\n\nそんなとき、ふと思ったんです。「婦人科以外に、相談できるところってないのかな?」。気になって調べてみたので、今日はその調べメモを書きます。特定のどこかをおすすめする記事ではなく、「こういう入口があるらしい」という私の整理です。\n\n## そもそも、なんで婦人科以外を探したのか\n\n理由は、シンプルに「最初の一歩が重かった」からです。\n\n婦人科は、行けばちゃんと診てもらえる場所だとわかっています。でも私にとっては、その手前の「予約する」「初めての場所に行く」がすでに大きな壁でした。壁が高すぎると、人は動けなくなる。動けないまま、悩みだけがふくらんでいきました。\n\nだから私は、「もう少しハードルの低い入口はないか」を探しました。婦人科の代わりを探したというより、**そこにたどり着くまでの、途中の相談先**を探したイメージです。\n\n## 調べて見つかった、いくつかの入口\n\n調べてみると、思っていたより相談できる場所はありました。私が見つけたのは、こんなところです。\n\n**保健室の先生（養護教諭）。** いちばん身近な入口でした。生理のこと、からだのこと、なんとなくの不安。学校にいる間に相談できて、必要なら「婦人科で相談してみたら」とつないでくれる立場でもあるようです。\n\n**学校医の先生。** 学校によっては、健康に関する相談ができる先生がいるようです。保健室の先生に「学校のお医者さんに相談できますか」と聞いてみるのが早そうでした。\n\n**オンライン診療。** スマホで診察を受けられる仕組みです。移動しなくていいし、待合室で人に会うこともない。私のように「初めての場所に行くのがこわい」タイプには、入口として合っているかもと思いました。\n\n**地域の相談窓口。** 自治体などが、若い人のからだや性の相談を受けている窓口を用意していることがあるようです。「住んでいる地域名＋思春期 相談」などで調べると出てくることがありました。\n\n## 「パーソナルケアクリニック」というものも知った\n\n調べている途中で、「パーソナルケアクリニック」という名前も見かけました。\n\n私の理解では、生理の悩みやデリケートゾーンのケアなど、「病院に行くほどかわからない」ようなことを相談しやすい雰囲気で扱っているクリニックのことです。オンラインに対応しているところもあるようでした。\n\n正直、最初は「病院なのに、こんな感じでいいんだ」と思いました。婦人科・オンライン診療・保健室と並ぶ、**選択肢のひとつ**という距離感で、私は受け止めています。「ここが一番」ということではなく、合う・合わないは人それぞれだと思います。\n\nひとつだけ、後から知って大事だと思ったことがあります。**未成年のうちは、費用や予約の面で保護者に相談してからのほうが安心**だということです。私自身、お金のことや行き方のことは、ひとりだと判断しきれない場面がありました。気になる人は、大人になってからの選択肢のひとつとして、頭の片隅に置いておくくらいでいいと思います。\n\n（参考）調べていて見つけたパーソナルケアクリニックのページです。\nhttps://personalcareclinic.jp/\n※紹介料などは受け取っていません。受診をすすめるものではなく、選択肢のひとつとしての情報です。\n\n## それぞれ、向いている場面がちがうみたいだった\n\n調べていて思ったのは、「どれがいちばんいい」という話ではないということでした。それぞれ、向いている場面がちがうんです。\n\n- **とにかくまず誰かに話したい**：保健室の先生や相談窓口\n- **人目が気になる、時間がとれない**：オンライン診療\n- **検査や治療が必要かもしれない**：やっぱり婦人科\n\n私の受け取り方では、保健室や相談窓口は「話を聞いてもらう入口」、婦人科は「ちゃんと診てもらう場所」。**入口はいくつもあって、そこから必要な場所につながっていく**、というイメージがいちばんしっくりきました。\n\n## 相談先を選ぶとき、私が気をつけたいこと\n\nもし実際に選ぶとしたら、私はこういうことを気をつけたいと思いました。\n\nひとつは、**「ここだけが正解」と思い込まないこと**。相談先はいくつもあるので、合わなければ別のところを試していい。ひとつ行ってみて「なんか違った」でも、それは失敗ではないと思います。\n\nもうひとつは、**迷ったら、信頼できる大人と一緒に探すこと**。特に未成年のうちは、費用のことや、行き方のことで、ひとりだと判断しきれない場面もあります。保健室の先生や、話せそうな大人と一緒に考えると、安心して選べる気がします。\n\n## 「どこに相談すればいいかわからない」人へ\n\n調べてみて、いちばん強く思ったこと。\n\n**大事なのは、どの入口を選ぶかより、悩みを放置しないことのほう**でした。\n\n婦人科がハードル高く感じるなら、まずは保健室でもいい。人目が気になるなら、オンラインという手もある。話を聞いてほしいだけなら、相談窓口でもいい。入口はひとつじゃないから、自分が少しでも入りやすいところから始めていいと思います。\n\nかつての私みたいに「婦人科は重いから、どこにも相談できない」と止まってしまう人が、ひとつでも入口を見つけられたらうれしいです。ひとりで抱え込まなくて、大丈夫です。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"20","title":"「大丈夫だよ」と言われた夜、私が返した言葉。避妊をお願いする勇気について","category":"避妊・恋愛","isHub":false,"wordCount":1891,"pccCount":0,"hashtags":["#恋愛","#カップル","#避妊","#パートナーシップ","#対話","#体験談","#エッセイ","#女性のからだ","#自分を守る","#勇気"],"body":"「大丈夫だよ」\n\nこの5文字を、私は今でもはっきり覚えています。避妊をためらう空気の中で、当時の彼が言った言葉です。\n\nやわらかくて、優しい声で、でも私の不安を何ひとつ解決しない5文字でした。今日は、あの夜のことと、私がそれにどう返したかの話です。先に言っておくと、これは彼を責める記事ではありません。ただ、同じ5文字の前で言葉に詰まっている人が、きっと今もどこかにいると思うので。\n\n## 「大丈夫」って、誰が大丈夫なんだろう\n\nあとから冷静になって、考えたことがあります。\n\nあの「大丈夫だよ」の根拠って、何だったんだろう。\n\nたぶん、根拠なんてなかったんだと思います。「たぶん平気」「今まで平気だったから」「面倒だから大丈夫ってことにしたい」。そのどれかで、そのどれもが、私のからだの外側にある理屈でした。\n\nもし大丈夫じゃなかったとき、検索するのは私。不安な夜を過ごすのも私。病院のことを調べるのも私。**「大丈夫」と言う人と、「大丈夫じゃなかった」を引き受ける人が、ちがう。** この非対称さに気づいてから、あの5文字の軽さの正体がわかった気がしました。\n\n彼が悪い人だったとは思いません。たぶん、引き受ける側を想像したことが、一度もなかっただけ。でも、想像したことがないこと自体が、この問題の根っこなのかもしれません。\n\n## 言えなかった頃の私\n\n正直に言うと、昔の私は、避妊の話がまったくできない人間でした。\n\n雰囲気を壊したくない。重い子だと思われたくない。嫌われたくない。だから「大丈夫だよ」と言われたら、不安なまま流されていました。心の中では全然大丈夫じゃないのに、口では「……うん」と言ってしまう。\n\n学校で好きな人の話をするときは、あんなに気持ちを言えるのに。いざ自分のからだを守る場面になると、言葉が出てこない。あの「うん」の夜のことを、私は今も少し悔やんでいます。悔やんでいるからこそ、変われたあとの話を書きます。\n\n## 私が返した言葉\n\nいろいろあった経験のあと、私は決めていたことがありました。次に「大丈夫だよ」と言われたら、返す言葉です。\n\n実際にその場面が来たとき、私はこう言いました。\n\n**「私が大丈夫じゃないから、ちゃんとしてほしい」**\n\n説得でも、言い合いでも、確率の話でもありません。主語を「私」にした、それだけの一言です。\n\nこれを選んだのには理由があります。「大丈夫だよ」に「大丈夫じゃないかもよ」と返すと、「たぶん平気だって」と確率の言い合いになってしまう。言い合いになると、雰囲気に負ける。でも「私が大丈夫じゃない」は、誰にも反論できない事実なんです。私の不安は、私だけが知っているものだから。\n\n彼は少し黙って、「そっか、ごめん」と言いました。それで終わりでした。あんなにこわかった一言は、言ってしまえば数秒のことでした。\n\n## それでも、聞いてくれない相手だったら\n\n「そう言っても、聞いてくれなかったら?」と思った人へ。\n\nその可能性は、あります。茶化す人も、不機嫌になる人も、「信用してないの?」と逆に責めてくる人も、現実にいると思います。\n\nそのときは、どうか思い出してください。**あなたの「大丈夫じゃない」を軽く扱う人だとわかったことは、傷つくけれど、大事な情報です。** 自分の気持ちを守ることは、わがままではありません。あなたの線を尊重できない関係のほうが、すでにあやういのだと、今の私は思います。\n\nそして何より、その場のあなたの安全がいちばん大事です。うまく言葉にできなかったとしても、自分を責めないでください。もしうまくいかなかったかもしれないと思ったら、そのあとにできること――たとえば早めに医療につながって相談すること――があります。ひとりで抱え込まず、頼れる大人や専門家に相談してほしいです。\n\n## 「お願いする勇気」という言葉への、ちょっとした違和感\n\n最後に、タイトルに自分で入れておいてなんですが、「避妊をお願いする勇気」という言葉に、私はずっと少し違和感があります。\n\n本当は、これは「お願い」ですらないはずです。ふたりのことなのだから。勇気がいること自体が、どこかおかしい。\n\nでも現実には、勇気がいる。その理不尽さの中で、今も言葉を探している人がいる。だからせめて、私の一言を置いておきます。使えそうなら、そのまま持っていってください。\n\n「私が大丈夫じゃないから、お願い」\n\nあなたの不安は、あなたのものです。誰かの「大丈夫」で上書きされていいものではありません。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"21","title":"アフターピルの副作用、私の場合はこうだった【体験談】","category":"アフターピル","isHub":false,"wordCount":2201,"pccCount":0,"hashtags":["#アフターピル","#緊急避妊薬","#副作用","#体験談","#女性のからだ","#エッセイ","#フェムケア","#避妊","#不安との向き合い方","#からだのこと"],"body":"アフターピル（緊急避妊薬）を飲む前、私がスマホでいちばん検索していた言葉は「アフターピル 副作用」でした。\n\n授業中も、部活のあいだも、頭の片隅ではずっとそのことを考えていた気がします。だから今日は、あの頃の私みたいに検索している誰かに向けて書きます。\n\n先に、いちばん伝えたいことを書いておきます。**副作用の出方は、人によってかなり違うようです。** これは医療情報ではなく、「私ひとりの場合」の記録です。読んで安心するためというより、「じゃあ自分はどうなんだろう、ちゃんと専門家に聞いてみよう」と思うきっかけにしてもらえたらうれしいです。\n\n## 飲む前に想像していた怖さ\n\n検索結果には、いろんな症状の名前が並んでいました。吐き気、頭痛、眠気、だるさ、不正出血……。\n\n文字を見ているうちに、私の頭の中では、それが「全部いっぺんに来る」ことになっていました。飲んだら動けなくなるんじゃないか。明日は学校があるのに。家にいて様子がおかしくなったら、家族になんて言えばいいんだろう。\n\n授業のノートは取っているのに内容が頭に入ってこなくて、休み時間のたびにトイレでスマホを開いて、また同じような記事を読んでいました。読めば読むほど不安になるのに、やめられなかったです。\n\n今振り返ると、**飲む前がいちばん、副作用が重かった**気がします。実際のからだより先に、想像のほうがぐったりしていました。\n\n## 私の場合に起きたこと\n\n実際はどうだったか。\n\n飲んだあと、私の場合は眠気とだるさがありました。からだが重くて、その日は早めに横になりました。そして、寝て起きたら、だいぶ落ち着いていたんです。\n\n私の場合は、それでほぼ終わりでした。翌日はちょっとぼんやりしながらも、いつもどおりに過ごせました。想像していた「嵐」は、私には来ませんでした。\n\nただ、これを読んで「じゃあ大丈夫なんだ」とは思わないでほしいんです。しっかり症状が出た人の話も見聞きしますし、逆にほとんど何もなかったという人もいるようです。**私の「軽かった」は、あなたの「軽い」を約束しません。** それが個人差ということだと思います。\n\n## 学校を休むか、正直すごく迷った\n\n飲む前にいちばん現実的に悩んだのが、これでした。**次の日、学校をどうするか。**\n\nもし副作用が重かったら、授業なんて受けられないかもしれない。でも休むと、親に理由を聞かれるかもしれないし、部活のメンバーにも心配される。かといって無理して行って、教室で気分が悪くなったら余計に困る。\n\n私の場合は、飲むタイミングを「翌日に少し余裕がある日」に寄せられたので、結果的には普通に登校できました。でもこれは、あくまで私のスケジュールと体調がそうだった、というだけの話です。**いつ飲むかは自分の都合だけで決められることではなく、時間との兼ね合いがある**ので、そこは自己判断せず、処方のときに医師に確認するのがいちばんだと思います。\n\n「もし体調が悪かったら休んでいい」と自分に許可を出しておくだけでも、気持ちは少し軽くなりました。\n\n## 「出たらどうするか」を先に聞いておいた\n\nやってよかったと思うのは、これに尽きます。\n\n処方してもらうとき、私は医師と薬剤師さんに聞きました。「副作用が出たら、どうすればいいですか」「もし吐いてしまったら、どうなりますか」。\n\n答えの中身はここには書きません。状況によって対応が違うようですし、専門家から直接聞くべきことだからです。書きたいのは、**「もしものときの動き方」を先に知っていると、待っている時間の不安が全然違う**、ということです。\n\n知らない症状に怯えるのと、「これが起きたらこうする」と決まっているのとでは、夜の長さがまるで違いました。聞くのはほんの数分でしたが、その数分が、そのあとの何時間分もの不安を減らしてくれた気がします。\n\n聞くのが恥ずかしいと感じる人もいるかもしれません。でも、副作用について質問するのは、患者としてごく当たり前のことでした。実際、私が聞いたとき、医師も薬剤師さんも「よく聞かれることですよ」という感じで、あっさり答えてくれました。\n\n## 副作用より、私を消耗させたもの\n\n正直に言うと、あとから振り返って私をいちばん疲れさせたのは、副作用そのものではなく「検索のしすぎ」でした。\n\nからだの小さな変化を検索して、こわい情報に当たって、また検索して。その繰り返しで、症状よりも「症状をさがす行為」のほうが私を削っていた気がします。\n\nもし今、飲んだあとの不安のなかにいる人がいたら。検索の代わりに、処方してくれたところへ電話していいんです。「こういう症状があるんですが」と聞くのは、ちゃんとした相談です。検索結果は私の体調を知りませんが、処方してくれた医療機関は私のことを知っています。\n\n## 同じように怖い人へ\n\n副作用がこわくてためらっている人へ。こわいと思う気持ちは、おかしくありません。\n\nただ、そのこわさへの対処は「検索を重ねること」ではなくて、「専門家に事前に聞いておくこと」だったなと、私は思っています。少なくとも私の場合は、そうでした。\n\nひとりで抱え込まなくていいよ、と伝えたいです。同じように悩んでいる誰かに、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"22","title":"2回目のアフターピル。自分を責めた私が考えたこと","category":"アフターピル","isHub":false,"wordCount":1994,"pccCount":0,"hashtags":["#アフターピル","#緊急避妊薬","#体験談","#自分を責めない","#女性のからだ","#エッセイ","#避妊","#低用量ピル","#ひとりで抱えない","#からだのこと"],"body":"この記事を書くかどうか、正直、少し迷いました。\n\n私はアフターピル（緊急避妊薬）を、一度だけでなく、二度飲んだことがあります。最初の経験から少し時間が経った頃に、二度目がありました。\n\n書くのをためらったのは、かっこ悪いと思ったからです。でも、「アフターピル 2回目」「何度も」で検索して、誰よりも自分を責めながらこのページにたどり着く人がいることも、私は知っています。あの夜の私が、まさにそうだったので。\n\nだから書きます。これはあなたを甘やかす記事ではなくて、責める声の正体を一緒に見てみる記事です。\n\n## 1回目より、ずっと自分を責めた\n\n1回目のとき、私は不安でいっぱいでしたが、自分を責める気持ちは実はそこまで強くありませんでした。「起きてしまったことは仕方ない」と思えていた気がします。\n\n2回目は、違いました。\n\n「1回目で学んだんじゃなかったの?」\n「また同じことしてる」\n「私って、だらしないのかな」\n\n不安に加えて、この声がずっと頭の中で鳴っていました。学校にいても、家に帰っても、ふとした瞬間に響いてくる。授業を受けながら、隣の席の友だちはこんなこと一度も経験してないんだろうな、と勝手に比べて落ち込んだりもしました。1回目より落ち着いて動けているのに、心は1回目より重かったです。\n\n## 責める声の正体\n\nあとになって、あの声の正体を考えました。\n\nあの声はつまり、**「ちゃんとしていれば、失敗は完全に防げるはずだ」という思い込み**でした。防げるはずのものを防げなかったから、私はだらしない、という理屈です。\n\nでも、調べたり医師と話したりするなかで知ったのは、**どんな避妊方法も100%ではないと言われている**、ということでした。確率を下げることはできても、ゼロにはできない。つまり、気をつけていても「もしも」は起こりうるんです。\n\nもちろん、私の2回はどちらも反省点のある出来事でした。それは認めます。でも、「反省点がある」と「私に価値がない」は、まったく別の話でした。当時の私は、それを混ぜて自分を殴っていました。\n\nテストで一度ミスした問題を、二度目も間違えたとき。「わたしってダメだ」と全部否定するのと、「ここが弱点だな、次はここを見直そう」と考えるのとでは、その後がまったく違います。からだのことも、たぶん同じでした。自分を全否定しても、次につながるものは何も残らないんです。\n\n## 2回目の私が、1回目と違ったこと\n\n責める声に飲まれながらも、2回目の私は、1回目と決定的に違う点がありました。\n\n**迷わなかったんです。**\n\nどこに相談すればいいか知っていた。だいたいの費用も、何を聞けばいいかも分かっていた。1回目に丸一日かかった「こわくて動けない時間」が、2回目はほとんどありませんでした。\n\nつまり、1回目の経験はムダになっていなかった。「学ばなかったの?」という声への答えは、「ちゃんと学んでいたよ」でした。学びは「二度と起こさない」という形ではなく、「起きたときに正しく動ける」という形で残っていたんです。\n\n## 自分を責める前に、動く\n\n2回目のとき、私が自分に言い聞かせたのはこれでした。\n\n今やるべきなのは、自分を裁くことじゃなくて、からだを守るために動くこと。責める時間は、あとでいくらでも取れる。そして動き終わった頃には、たぶんそんなに要らなくなっている、と。\n\n実際、そのとおりでした。相談先に連絡して、必要なことを済ませて、ひと息ついた頃には、あんなに大きかった責める声が、少し小さくなっていました。\n\n## そのあと、私が考えたこと\n\n2回目のあと、私はこう考えました。「もしも」への対応は上手くなった。じゃあ次は、「もしも」の回数そのものを減らす番だな、と。\n\nそれが、低用量ピルについて婦人科で相談してみようと思ったきっかけでした。緊急のときの知識だけに頼る状態から、日常のなかで選べる状態へ。私の場合は、そういう順番でたどり着きました。\n\n何を選ぶかは人それぞれですが、こういう相談は婦人科やオンライン診療でもできるようです。学生の私にとっては、まず「相談していいんだ」と思えたことが大きかったです。\n\nずっと「こういうことは自分ひとりで何とかするもの」だと思い込んでいました。でも、それは思い込みでした。分からないことを分からないまま抱えているより、専門家に聞いたほうがずっと早かったし、こわくなかったです。\n\n## 回数で、あなたの価値は変わらない\n\n最後に、これだけ言わせてください。\n\n1回だろうと2回だろうと、あなたの価値は変わりません。今できることを、ひとつずつやればいい。\n\nひとりで抱え込まなくていいよ、と伝えたいです。同じように自分を責めている誰かに、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"23","title":"「婦人科行ってくる」を彼に言えるようになった日","category":"避妊・恋愛","isHub":false,"wordCount":1968,"pccCount":0,"hashtags":["#カップル","#パートナーシップ","#婦人科","#生理","#対話","#体験談","#エッセイ","#女性のからだ","#恋愛","#フェムケア"],"body":"前の私は、婦人科に行く日、彼にちょっとした嘘をついていました。\n\n「その日は友だちと約束があって」「ちょっと用事があるから」。嘘というより、本当のことを言わない、という感じです。通院はやましいことじゃないのに、なぜか言えませんでした。\n\n今日は、「婦人科行ってくる」を普通に言えるようになるまでの話です。同じ年頃の彼との、小さなコミュニケーションの記録です。\n\n## 言えなかった理由\n\nなんで言えなかったんだろう、と考えると、理由はいくつかありました。\n\n**心配をかけたくなかった。** 「婦人科」と聞いた彼が、何か重い病気を想像して心配するんじゃないかと思っていました。説明するのも大変そうで、だったら言わないほうが楽だと。\n\n**重いと思われたくなかった。** からだの事情を共有するのは、なんだか関係を一段深くするような気がして、それを自分から切り出すのがこわかったです。\n\n**単純に、恥ずかしかった。** 生理もピルも、私のなかで「彼の前で口にしない言葉」になっていました。誰に決められたわけでもないのに。\n\n思えば、学校でも同じでした。生理でしんどい日も、男子には気づかれないようにこっそりしていたし、友だち同士でも小声で話す話題でした。その「言っちゃいけない空気」を、そのまま彼との関係にも持ち込んでいたんだと思います。\n\n## 初めて言った日\n\nきっかけは、通院がだんだん定期的になったことでした。婦人科が「たまに行く場所」から「ときどき通う場所」になると、毎回予定をごまかすのが現実的にしんどくなってきたんです。\n\nそれである日、思いきって言いました。「明日、婦人科行ってくるね」。\n\n言った瞬間、心臓はけっこう鳴っていました。で、彼の反応はというと。\n\n「そうなんだ。混むの?」\n\n……それだけでした。あんなに悩んだのに、拍子抜けするくらい普通の返事でした。ドラマみたいな「受け止めシーン」も、気まずい沈黙もなし。ただの予定の共有として、会話は流れていきました。\n\n## 言えるようになって、変わったこと\n\nその日を境に、少しずつ変わったことがあります。\n\n生理や体調の話が、日常会話に混ざるようになりました。「今週はしんどい週だから、出かけるのは来週がいいな」が言えるようになった。前は体調が悪くても「なんでもない」とごまかして、無理して出かけていたので、これは私にとって大きな変化でした。\n\n**体調をごまかさなくていい相手がいる**、というのは、思っていた以上に楽です。学校でも、しんどい日を無理に隠さなくなった気がします。\n\n前は、デートの約束をした日に体調が最悪でも、「せっかく決めたし」と無理して出かけて、帰り道でぐったり、なんてことがよくありました。今は「ごめん、今日はしんどいから家でゆっくりしたい」と正直に言えます。無理をしなくなったぶん、会えたときの時間が前より楽しくなった気もします。\n\n## 彼のほうの本音\n\nあとになって、彼に聞いてみたことがあります。「前から気づいてた?」って。\n\n彼の答えはこうでした。「なんとなく体調悪い日があるのは分かってたけど、**聞いていいのか分からなかった**」。\n\nこれは発見でした。私が「言えない」と思っていたあいだ、彼は「聞けない」と思っていたんです。生理や婦人科の話題は、相手のほうにも入口がない。踏み込んだら失礼なのか、心配したら大げさなのか、分からないまま黙っていた、と。\n\nお互いが相手への気づかいのつもりで黙っていて、結果、何も共有されない。私たちはそういう感じでした。だから、どちらかが最初の一言を出せば、案外あっさり崩れる壁だったんだと思います。\n\n## 全部話す必要は、ない\n\n念のため書いておくと、これは「パートナーにからだのことを全部話そう」という話ではありません。\n\n何をどこまで話すかは、あなたが決めていいことです。話したくないことは話さなくていいし、関係によっては言わない選択がしっくりくることもあると思います。**開示は義務じゃなくて、自分のペースでいいもの**です。\n\nただ、もし「本当は言えたら楽なのに」と思いながら隠しているなら。最初の一言は、想像の10分の1くらいの軽さで着地するかもしれません。私の場合は、そうでした。\n\nそれと、婦人科に行くこと自体を「特別なこと」だと思わなくていいんだな、とも思いました。歯医者に行く、みたいな感覚で「明日、婦人科ね」と言えるようになったら、それはきっと自分にとっても楽な状態です。そこにたどり着くまで、私は少し時間がかかりましたが、焦らなくていいと思います。\n\nひとりで抱え込まなくていいよ、と伝えたいです。同じことで迷っている誰かに、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"24","title":"避妊の選択肢、ふたりで調べてみた日のこと","category":"避妊・恋愛","isHub":false,"wordCount":1971,"pccCount":0,"hashtags":["#避妊","#カップル","#パートナーシップ","#対話","#体験談","#エッセイ","#女性のからだ","#ふたりで決める","#知らなかったを知る","#フェムケア"],"body":"アフターピルの経験や、そのあとのいろんなやりとりを経て、私たちはある日、ちょっと変わった過ごし方をしました。\n\n**ふたりで、避妊についてちゃんと調べる**という時間です。\n\nきっかけは私の一言でした。「私たち、いつも『そのときどうするか』しか話してなくない?」。考えてみれば、ふたりとも学校の保健の授業のうろ覚えの知識のまま、なんとなくここまで来ていました。\n\n## それまでの構造\n\n調べる前の私たちは、こういう感じでした。\n\n彼が対処する。私は祈る。\n\n書いてみると極端ですが、実態はこうだったと思います。方法を選ぶのも実行するのも彼まかせで、私は「ちゃんとしてくれますように」と願うだけ。うまくいかなかったときのからだの負担は私が引き受けるのに、決めるところには参加していない。\n\nこのいびつさに、アフターピルの夜に気づきました。**いちばん負担を引き受ける側が、いちばん情報を持っていない。** よく考えると、おかしな話です。\n\nテスト勉強でたとえるなら、点数がつくのは私なのに、範囲も出題傾向も彼しか知らない、みたいな状態です。それで良い結果を「祈る」しかないのは、当たり前だけどしんどい。そのことに、あの夜まで気づいていませんでした。\n\n## ふたりで調べた日\n\nその日は、お互いのスマホで公的機関や医療機関のサイトを開いて、並んで読みました。\n\n詳しい中身をここに書くことはしませんが、分かったことをひとことで言うと、**避妊にはいろいろな方法があって、それぞれ確実さも、使い方も、向き不向きも違うようだ**、ということでした。ふたりとも「こんなに選択肢があるの?」と驚いたのを覚えています。\n\n学校で習ったのは、ほんの入口だけだったんだな、と思いました。知らなかったのは、私だけじゃなかった。彼も同じくらい知らなかったんです。\n\n保健の授業で「なんとなく聞いたことがある」単語はあっても、その中身までは知らない。テスト範囲じゃなかったから、と言えばそれまでですが、いちばん自分たちの生活に関わることを、いちばんふわっとしたまま過ごしてきたんだな、と少し驚きました。\n\nそして、どの方法も100%ではないと言われていることも、あらためて確認しました。だからこそ「もしものときにどうするか」まで含めて話しておく意味があるんだと、ふたりで納得しました。\n\n## 変わったこと\n\n調べたあと、私たちの会話は変わりました。\n\nいちばん大きいのは、**「まかせる/まかされる」が「一緒に決める」になった**ことです。言葉を知らないと、そもそも会話ができません。共通の言葉ができたことで、避妊の話が「気まずい相談」から「普通の話題」になりました。\n\n彼のほうにも変化がありました。あとから「正直、全部おれの責任って言われてるみたいで、ちょっと重かった」と言われたんです。まかせていたつもりが、押しつけてもいた。この構造は、どちらか一方だけを楽にしていたわけじゃなかったようです。\n\n## 私たちが何を選んだかは、書きません\n\nで、結局どうしたの?と思われそうですが、私たちが選んだ中身はここには書きません。\n\n理由は2つあります。ひとつは、からだの状態も生活も人それぞれで、私たちの答えが誰かの答えにはならないから。もうひとつは、具体的な方法の選択は、ネットの体験談ではなく医師と相談して決めるべきことだと思うからです。\n\n避妊やピルの相談は、婦人科やオンライン診療でできるようです。私たちの年頃だと費用や受診のハードルも気になりますが、そこも含めて相談できる場所を、大人と一緒に探してみてもいいと思います。相談先はひとつだけじゃないので、自分たちに合いそうなところを、あせらずに探せばいいと思います。\n\n私が伝えたいのは、「ネットで完結させないでね」ということでもあります。ふたりで調べたのはあくまで“共通の言葉を持つため”で、最終的に何をどうするかは、専門家に相談して決めるのがいちばん安心でした。\n\nこの記事から持ち帰ってほしいのは選択の中身ではなく、**「ふたりで調べて、ふたりで決める」という形そのもの**です。\n\n## 調べる時間そのものが、対話だった\n\n振り返って思うのは、あの日得たものは知識だけじゃなかった、ということです。\n\n隣に座って、同じ画面を見て、「これ知ってた?」「知らなかった」と言い合う時間。あれは避妊の勉強であると同時に、「私たちはこの話題を一緒に扱えるふたりだ」という確認でもありました。\n\n雰囲気は、壊れませんでした。むしろ少しだけ、話しやすくなった気がします。\n\nひとりで抱え込まなくていいよ、と伝えたいです。同じように「その場しのぎ」で不安な誰かに、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"25","title":"学生だった私に、アフターピル代は重かった。お小遣いで迷った夜のこと","category":"アフターピル","isHub":false,"wordCount":2017,"pccCount":0,"hashtags":["#アフターピル","#緊急避妊薬","#学生","#お金のはなし","#体験談","#エッセイ","#女性のからだ","#避妊","#ひとりで抱えない","#からだのこと"],"body":"アフターピル（緊急避妊薬）が必要になった夜、私を止めたハードルはいくつもありました。こわさ、恥ずかしさ、知られたくない気持ち。\n\nでも、いちばん現実的で、いちばん誰にも言いにくかったハードルの話を、まだ書いていませんでした。\n\n**お金です。**\n\n当時の私は学生で、使えるお金はお小遣いとバイト代くらいでした。この記事は、費用の前で固まってしまった私の記録と、同じ状況の人に伝えたいことです。最初にお断りしておくと、費用は医療機関や時期によって変わるようなので、具体的な金額は必ず受診先に確認してください。\n\n## 金額を見て、固まった夜\n\n深夜、スマホでアフターピルの費用を調べた私は、画面の前で固まりました。\n\n私が調べた時点では、決して「学生がぽんと出せる」金額ではありませんでした。バイト代の大部分が飛ぶ。今月のお小遣いだけじゃ足りないかもしれない。頭のなかで財布の中身と口座残高を、何度も数えました。\n\nずっと欲しかった服や、友だちとの遊びの予定。そういう「楽しみのために貯めていたお金」が、一瞬で別の意味を持つ数字に変わっていくのを、画面を見ながら感じていました。同世代でこの金額を急に用意するのは、けっこう大ごとです。\n\nそして、いちばん良くない考えが浮かびました。\n\n「……様子を見ようかな」。\n\nお金を理由に、時間との勝負の薬を先のばしにしようとしたんです。今思い出しても、あれがあの夜いちばん危ない瞬間でした。\n\n## 「お金で迷う」ことの危うさ\n\n冷静になれば分かることですが、あのとき天秤にかけていたものは、そもそも釣り合っていません。\n\n片方には、数千円から数万円。もう片方には、私のからだと、これからの選択肢。\n\nでも、不安でいっぱいの深夜には、この天秤がまともに見えなくなります。目の前の「払えるかどうか」だけが大きく見えて、動けなくなる。**お金の不安は、緊急のときの判断力を確実に削ってきます。** だからこそ、先に書いておきたいんです。お金で迷ったら、あきらめる前にやることがある、と。\n\n## 私がやったこと\n\n結局、私がやったのは2つでした。\n\n**電話で総額を聞いた。** 「学生なんですが、全部でいくらかかりますか」と、予約の電話で正直に聞きました。声は震えましたが、事務的に、ていねいに教えてもらえました。金額がはっきりしただけで、「いくらかかるか分からない出費」が「準備できる出費」に変わりました。\n\n**彼に相談した。** 費用のことを彼に切り出して、私たちの場合は半分ずつにしました。この経緯は別のことなので詳しくは書きませんが、学生同士でも、お金の話はしていいし、するべきだったと思っています。ふたりのことだから。\n\nお金の話を切り出すのは、正直いちばん気が重かったです。「ケチだと思われたら」「気まずくなったら」と、いろいろ考えました。でも、言ってみたら彼も「当然だよ」という感じで、拍子抜けするくらいでした。ひとりで全部背負おうとしていたのは、私のほうだったのかもしれません。\n\n## お金が本当に足りない人へ\n\nここからは、当時の私よりさらに苦しい状況の人に向けて書きます。\n\nもし手持ちでは本当に払えそうにないなら、**それでも、まずは相談してみてほしい**んです。私が調べたり見聞きした範囲では、支払いについて相談に応じてもらえる場合もあるようですし、お金や性のことで困ったときに相談できる窓口を、自治体などが設けている場合もあるようです。\n\nそして、これがいちばん伝えたいことなのですが。お金の問題を、ひとりで抱え込まないでほしいんです。言い出しにくくても、**保健室の先生や、信頼できる大人に「お金のことで困っている」と話すこと**は、はずかしいことじゃありません。私も当時は「大人に言うなんて」と思っていましたが、あとから振り返ると、頼れる人に相談してよかったと思っています。\n\n大人に言うと、なんでも大ごとにされそうで身構えてしまう気持ちも分かります。でも、実際に相談してみると、責められるどころか、いっしょに現実的な方法を考えてくれることのほうが多かったです。「困っている」と言葉にするだけで、ひとりで抱えていた重さが、少し分けられた気がしました。\n\n「お金がない」は、あなたが思っているより、相談していい事情です。\n\n## あの夜の私へ\n\n財布を数えて固まっていた私に言いたいのは、これだけです。\n\nその数千円、数万円は、たしかに大金だ。でも、あなたが守ろうとしているものの値段ではない。まず相談しよう。話はそれからでも間に合う。\n\nいちばん選んでほしくないのは、「お金がないから、なかったことにする」です。それだけは、どうか。\n\nひとりで抱え込まなくていいよ、と伝えたいです。同じようにお金の前で固まっている誰かに、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"26","title":"婦人科の初診、いくらかかった？行く前に知りたかったお金の話","category":"婦人科・検査","isHub":false,"wordCount":1984,"pccCount":0,"hashtags":["#婦人科","#初診","#費用","#はじめての婦人科","#体験談","#エッセイ","#女性のからだ","#お金のはなし","#知らなかったを知る","#からだのこと"],"body":"はじめて婦人科に行こうか迷っていたとき、私の不安リストのいちばん上にあったのは、じつは「お金」でした。\n\n痛いのが怖い、とか、内診が不安、とか、そういうのももちろんあったんです。でも、それ以前に「いくらかかるのか、まったく想像がつかない」という壁があって、そこで止まっていました。予約の画面を開いては閉じる、を何回繰り返したかわかりません。\n\n今日は、そんな婦人科とお金の話です。先に言っておくと、費用は相談する内容やクリニックによって変わります。これはあくまで私の場合の記録なので、正確な金額は受診先に確認してくださいね。\n\n## お小遣いとバイト代で暮らす私にとって\n\n学生の私にとって、数千円か数万円かの差は、けっこう大きな問題でした。\n\nお小遣いと、たまに入るバイト代でやりくりしている身です。友達と遊ぶお金も、参考書も、そこからやりくりしている中で、「気づいたら想定外の金額になっていたらどうしよう」という不安は、大人が思うよりずっと現実的でした。財布に何円入れていけばいいのかもわからない。カードも持っていない。\n\nいま振り返ると、**金額そのものより「いくらかわからない」という状態が、いちばんのハードルだった**気がします。上限がわからない不安って、際限なく大きくなるんですよね。「5千円かもしれないし、3万円かもしれない」の幅の中で、いちばん高い数字を勝手に信じ込んでいました。\n\n## 私の場合の実際\n\n私の初診は、生理の相談が中心でした。\n\n結果から言うと、私の場合は数千円くらいで収まりました。「え、そのくらいなんだ」というのが正直な感想でした。頭の中で勝手に一万円札を何枚も想像して身構えていたので、拍子抜けしたくらいです。あんなに何日も悩んでいた金額の不安が、会計の一瞬で消えました。\n\nもちろん、これは私のケースです。検査をするかどうか、相談する内容によって変わりますし、同じ相談でもクリニックによって違うと思います。ここで伝えたいのは金額そのものより、「勝手に想像していた額と、現実には差があった」という体験のほうです。想像の中の金額は、たいてい現実より大きく育ちます。\n\n## 保険がきくときと、きかないときがあるらしい\n\n調べたり受診したりする中で知ったのは、婦人科の費用には大きく2種類あるらしい、ということでした。\n\n症状があって診てもらう場合は保険がきくことが多く、目的によっては自費になるものもあるようです。同じ「婦人科に行く」でも、内容によって会計の仕組みが違うみたいです。学校の授業でも教わらなかったことなので、私は行ってみるまでまったく知りませんでした。\n\nこのあたりの線引きを私が正確に説明できるわけではないので、断定はしません。ただ実用的な結論としては、**「今日の内容は保険がききますか？」と会計の前に聞いていい**、ということです。私は聞くようになってから、会計のときのドキドキがなくなりました。聞くのは失礼でもなんでもなくて、みんなふつうに確認していることみたいです。\n\n## 私がやっている、お金まわりの小さな工夫\n\n- **予約の電話で聞いてみる**：「初診で、こういう相談なんですが、だいたいいくらくらいですか」。目安でいいので聞いておくと、当日の心の準備が全然違いました\n- **現金を少し多めに持っていく**：カードが使えないクリニックもあったので、念のため。当日に「足りなかったらどうしよう」と焦らずにすみます\n- **領収書を取っておく**：あとで見返せますし、なんとなく安心します。自分がいくら払ったのかの記録にもなります\n\nどれも小さなことですが、「お金の見えなさ」を減らすと、行くハードルは確実に下がりました。見えない不安を、ひとつずつ見える数字に変えていく作業だったと思います。おまじないみたいに効いたのは、やっぱり事前に電話で聞くことでした。当日いきなり金額と向き合うより、心の準備ができた状態で行けるだけで、緊張がずいぶん違いました。\n\n## お金の心配で、後回しにしないでほしい\n\n婦人科に行けない理由が「なんとなく怖い」ではなく「お金がわからないから」なら、その不安は電話一本でかなり減らせます。\n\n金額を聞くのは、恥ずかしいことでも失礼なことでもありません。むしろ、ちゃんと準備して来る人だと思います。私も最初は聞くのが気まずかったけれど、聞いてみたら受付の人はふつうに教えてくれました。身構えていた自分が少し笑えるくらい、あっさりした対応でした。\n\nそれでも費用が心配なときは、ひとりで抱え込まずに、頼れる大人に相談してみるのもいいと思います。同じように「お金が見えないから動けない」と止まっている人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"27","title":"内診が怖かった私が、婦人科で伝えた一言","category":"婦人科・検査","isHub":false,"wordCount":1939,"pccCount":0,"hashtags":["#婦人科","#内診","#はじめての婦人科","#体験談","#エッセイ","#女性のからだ","#フェムケア","#不安との向き合い方","#ひとりで抱えない","#からだのこと"],"body":"婦人科をずっと避けてきた理由を、正直に言います。\n\n内診が怖かったからです。\n\n生理の悩みも、「婦人科に行けばいいのはわかってる」と頭では思っていました。でも予約ボタンの手前でいつも、内診台のイメージが浮かんで手が止まる。あの独特な形の椅子の写真を一度見てしまってから、余計に怖くなりました。同じ人、きっと多いと思います。\n\n今日は、その怖さとどう付き合ったかの話です。\n\n## 怖さの中身を分けてみたら\n\n私の「内診が怖い」を分解すると、こうなりました。\n\n- **痛そう**。ネットで「痛かった」という体験談ばかり目に入っていた\n- **無防備になるのが怖い**。あの体勢で、自分からは何も見えない\n- **何をされるのかわからない**。知識がないから、想像だけが悪いほうに膨らむ\n- **声を出していいのかわからない**。痛くても「我慢するのがマナー」な気がしていた\n\n書き出してみて気づいたんですが、ぜんぶ「わからない」が土台になっているんです。わからないから、想像が最悪の方向に育っていく。逆に言えば、わかってしまえば怖さは小さくなる、ということでもありました。当時の私は、そこに気づいていませんでした。\n\n## 私が診察室で伝えた一言\n\n初めての受診の日、診察室に入った私は、思い切って最初に言いました。\n\n**「内診が怖いです。初めてなんです」**\n\n語尾は情けないくらい震えていました。心臓もばくばくしていて、声を出すだけで精一杯でした。でも、この一言が、あの日の私のいちばんのファインプレーだったと思っています。言えたことが、その日いちばんの勇気でした。\n\n## 伝えたあとに、変わったこと\n\n先生の対応が、目に見えて変わったんです。\n\nまず、今日の診察で何をするのか、内診が必要かどうかを、先に説明してもらえました。私の場合、その日は問診と説明が中心で、**そもそも内診は必須ではありませんでした**。あんなに何日も怯えていたのに、拍子抜けするくらいでした。想像の中だけで、勝手に怖い一日を作り上げていたんです。\n\nそして「もし内診をするときも、声をかけながら進めますね」「痛かったら我慢しないで言ってください」と言ってもらえました。「我慢するのがマナー」だと思い込んでいた私には、これが衝撃でした。痛いと言っていい場所だったんです。どこかで、診察は黙って耐えるものだと刷り込まれていたのかもしれません。\n\n怖さの土台が「わからない」だったので、説明してもらえた時点で、怖さは半分以下になっていました。\n\n## 「怖い」は、わがままじゃなかった\n\nこの経験でわかったことがあります。\n\n「怖いです」と伝えるのは、わがままでも迷惑でもなく、**先生にとっても必要な情報**だということです。\n\n緊張しているかどうかで、診察の進め方は変わるようです。黙って我慢されるより、怖いと言ってもらったほうが、向こうも対応しやすい。つまり「怖い」と伝えるのは、診察をスムーズにする協力でもあったんです。私が勝手に「迷惑をかけてはいけない」と思い込んでいただけでした。\n\nひとりで我慢していたことは、結局、誰のためにもなっていませんでした。むしろ、素直に言ったほうが、私にとっても先生にとっても楽だったんです。\n\n## まだ行けずにいる人へ\n\n内診が怖くて婦人科に行けずにいる人に、私から3つだけ。\n\n1. **怖いと伝えていい。** 診察室でも、なんなら予約の電話の段階で「内診が怖いのですが」と言っていい。対応を考えてもらえます\n2. **内診が毎回あるとは限らない。** 私の初回は問診が中心でした。相談内容によるみたいです\n3. **「怖いから行かない」の先延ばしが、いちばんからだに優しくない。** 怖がりのまま行っていいんです。私も、怖がりのまま行きました\n4. **知ることで、怖さは小さくなる。** 何をするのか先に聞くだけでも、想像だけがふくらむのを止められました\n\n怖い気持ちを消してから行こうとすると、たぶん一生行けません。怖さは、行ってみて初めて小さくなるものでした。私は、怖いまま行って正解でした。\n\nもしどうしても一人で予約する勇気が出ないなら、保健室の先生や信頼できる大人に、まず「怖いんだけど」と話してみるのもいいと思います。私は結局ひとりで予約しましたが、誰かに「怖いよね」と言ってもらえるだけで、一歩が軽くなることもあるはずです。\n\nあなたの「怖い」は、隠さなくていい怖さです。むしろ、口に出したほうが軽くなる種類の怖さでした。あなたの「怖い」が、受付で言えるくらいの大きさになりますように。同じように迷っている人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"28","title":"生理不順を「そのうち来るし」で放置していた私が、婦人科に行った理由","category":"生理・PMS","isHub":false,"wordCount":1958,"pccCount":0,"hashtags":["#生理不順","#生理","#婦人科","#体験談","#エッセイ","#女性のからだ","#フェムケア","#セルフケア","#知らなかったを知る","#からだのこと"],"body":"「あれ、今月まだ来てないな」\n\nそう気づいてから、私はいつも同じ言葉で片付けていました。「まあ、そのうち来るし」。\n\n実際、そのうち来るんです。数日遅れか、数週間遅れかはわからないけど、来る。だから毎回「ほら来た」で終わって、次の月もまた「そのうち来るし」。そのループを、私はずっと続けていました。\n\n今日は、そのループを抜けたときの話です。\n\n## 放置していた理由\n\n私が不調を後回しにするときのパターンは、だいたい決まっています。生理不順の場合はこうでした。\n\n**痛くなかったから。** 生理痛と違って、周期の乱れはその瞬間の苦痛がありません。痛みのない不調は、後回しリストの最下位に沈んでいきます。目の前で困っていないと、人はなかなか動けないんですよね。\n\n**部活と勉強で忙しかったから。** テスト期間や大会前は、自分のからだのことなんて後回しでした。「落ち着いたら考えよう」と思っているうちに、次の生理が来てリセットされる。落ち着く日なんて、待っていてもなかなか来ませんでした。\n\n**どのくらいで行くべきかの基準を知らなかったから。** どれくらい乱れたら「行ったほうがいい」のか、誰にも教わったことがありませんでした。保健体育でも、そこまで細かくは習わなかった気がします。基準がないと、何もかもが「病院に行くほどじゃない」に分類されてしまうんですよね。\n\n## 記録が突きつけてきたこと\n\n転機は、生理管理アプリでした。\n\n使い始めて一年近く経った頃、ふと周期の一覧を眺めたんです。そこには、自分の記憶よりずっとバラバラな数字が並んでいました。\n\n記憶の中の私の生理は「たまに遅れるくらい」でした。でも記録の中の私の生理は、そうではなかった。**人の記憶って「まあ大丈夫」の方向に勝手に加工されるんだな**、と自分のデータで思い知りました。数字は、私の「たぶん大丈夫」を静かに否定してきました。都合よく忘れていたのは、私のほうでした。\n\n## 私を動かしたのは、症状じゃなくて「常にある不安」だった\n\nそれでも、痛みがないので急いでいる感覚はありませんでした。私を最終的に婦人科に向かわせたのは、症状ではなく、気持ちのほうでした。\n\n生理が遅れている期間、頭の片隅に、小さな不安がずっと住んでいるんです。「大丈夫かな」「なにか悪いのかな」。検索しては閉じ、閉じてはまた検索する、あのやつです。授業中にふと思い出して、集中できなくなることもありました。\n\nあるとき気づきました。この不安、毎月ずっと払い続けてる。だったら一度ちゃんと診てもらって、この頭の中の常駐アプリを終了させたほうが、気持ちがずっと楽になるんじゃないか、と。受診の理由なんて、それでいいと思ったんです。立派な症状がなくても、不安があるだけで十分でした。\n\n## 行ってみて\n\n診察で言われた内容の細かいところは、人によって違う話なので書きません。書けるのは、行ってよかったという結論と、その理由です。\n\nいちばん大きかったのは、**「どのくらいの乱れなら様子見でいいか」の目安を、私の場合に合わせて教えてもらえた**ことでした。\n\nそれまでの私は、基準がないまま自己判断で「大丈夫」を繰り返していました。今は、「ここまでは気にしなくていい、こうなったら来てください」という線を持っています。頭の片隅の常駐アプリは、この線をもらった日に、ようやく終了しました。自己判断の「大丈夫」と、誰かに引いてもらった「大丈夫」は、安心感がまったく違いました。\n\n## 「生活への影響」には、不安も入る\n\n生理痛のことを考えるとき、「我慢できるかどうか」ではなく「生活に影響しているかどうか」で見る、という話をよく聞きます。\n\n生理不順で私が学んだのは、その「影響」には、**痛みだけじゃなく不安も含まれる**ということでした。毎月何日も「大丈夫かな」を抱えて過ごしているなら、それはもう立派な生活への影響です。痛くなくても、相談する理由として十分でした。心のほうがすり減っているのも、ちゃんとした不調のうちだったんです。目に見える症状だけが「行っていい理由」だと思い込んでいた自分に、今なら「それだけじゃないよ」と言ってあげたいです。\n\n「そのうち来るし」と今月も唱えている人へ。その言葉、私は何年分も唱えました。唱えている時間で解決したことは、ひとつもなかったです。もし自分ひとりで判断に迷うなら、保健室の先生や産婦人科など、頼れる大人に一度きいてみるのもいいと思います。基準を持っているのと持っていないのとでは、毎月の心の重さがまったく違いました。同じように放置している人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"29","title":"デリケートゾーンのこと、誰にも聞けなかった。私が相談できるようになるまで","category":"セルフケア","isHub":false,"wordCount":1986,"pccCount":0,"hashtags":["#デリケートゾーン","#フェムケア","#体験談","#婦人科","#女性のからだ","#セルフケア","#エッセイ","#ひとりで抱えない","#知らなかったを知る","#からだのこと"],"body":"このnoteでいろいろな「言えなかったこと」を書いてきましたが、今日の話題は、その中でも最上級です。\n\nデリケートゾーンのこと。\n\n少し前までの私は、この話題を友達にも、母にも、検索窓にすら、まともに出せませんでした。検索履歴に残るのすら嫌で、調べては履歴を消していたくらいです。誰かにスマホを見られたらどうしよう、という不安まで抱えていました。\n\n今日は、この「いちばん聞けない話題」を相談できるようになるまでの話です。ケアの具体的なやり方の話ではないので、その点は先にお断りしておきます。\n\n## 聞けなかった理由\n\n生理の話は、仲のいい女友達となら少しはできました。修学旅行のときにナプキンを貸し借りするくらいのことは、できるようになっていました。\n\nでもデリケートゾーンの話題だけは、別格でした。\n\n**話題にすること自体が、はしたない気がしていた。** 誰に言われたわけでもないのに、この部分の話は「口にしちゃいけないこと」に分類されていました。悩みがあっても、悩みがあること自体を隠す。二重の蓋です。蓋をしていることにも、だんだん気づかなくなっていきました。\n\n**聞ける相手が思いつかなかった。** 友達に聞くのは恥ずかしいし、下手したら「え、なにそれ」って空気になりそうで怖い。母には余計に言えない。じゃあ誰に、の答えが見つかりませんでした。相談先が思いつかないと、悩みはただ心の中に溜まっていくだけでした。\n\n**ネットの情報は、何が正しいのかわからなかった。** 勇気を出して検索しても、出てくるのは広告なのか情報なのかわからないページばかり。判断できなくて、結局そっとタブを閉じる。調べれば調べるほど不安になる、ということもありました。\n\n結果どうなるか。**いちばん聞きにくい話題は、いちばん放置される。** 私の場合、小さな違和感や疑問を、何年も「なかったこと」にしていました。\n\n## 転機は、通える場所ができたこと\n\n転機は、劇的な何かではありませんでした。\n\n生理のことで婦人科に通うようになって、先生の顔にちょっと見覚えができてきた頃。ある日の診察の終わりに、「あの、ついでに聞いてもいいですか」と切り出せたんです。\n\nポイントは「ついで」でした。デリケートゾーンの相談のためだけに予約を取るのは、当時の私にはハードルが高すぎました。でも、別の用事のついでなら、言えた。**通える場所があるということは、「ついで」が使えるということ**なんだと、このとき知りました。ゼロから予約するより、ずっと軽い一歩でした。\n\n## 聞いてみたら\n\n相談の中身とその答えを、ここに書くことはしません。ケアの方法は人によって違うようですし、私のうろ覚えの情報より、専門家に直接聞いてほしいからです。\n\nただ、ひとつだけ書かせてください。私が自己流でやっていたこと、良かれと思ってやっていたことの中に、見直したほうがいいものがありました。**「誰にも聞けないから自己流」は、けっこう危ういルートだった**んです。よかれと思ってやっていたことが、実は逆効果ということもあるみたいでした。\n\n先生は、まったく嫌な顔をしませんでした。考えてみれば当たり前で、婦人科にとってこの部分はど真ん中の専門分野です。私が「はしたない話題」だと思い込んでいたものは、診察室ではただの健康の話でした。恥ずかしがっていたのは、私だけだったんです。\n\n## 「聞いていい話題」に変わった日\n\n一度聞けてしまうと、この話題は私の中で「聞いていい話題」に分類が変わりました。\n\n恥ずかしさが消えたわけではありません。今でも切り出すときは、少しもぞもぞします。でも、「恥ずかしいから放置する」から「恥ずかしいけど聞く」に、優先順位が入れ替わりました。恥ずかしさより、自分を大事にすることを上に置けるようになった、という感じです。\n\nからだの一部について、一生誰にも相談できないままでいるのと、もぞもぞしながらでも聞ける場所があるのと。どちらが自分を大事にしているかは、比べるまでもありませんでした。\n\n## 同じように黙っている人へ\n\nもし今、誰にも言えない小さな違和感や疑問を抱えている人がいたら。\n\nそれを聞くための専門の場所は、ちゃんとあります。あなたが「はしたない」と思っているその話題は、診察室ではただの健康の話です。そして「ついで」に聞くのは、ずるくもなんともない、立派な相談のコツだと思います。\n\n私も、聞けるようになるまで何年もかかりました。だから、今すぐじゃなくていい。いつか誰かに聞けたらいいな、と心の隅に置いておくだけで、十分だと思います。ひとりで抱え込まなくていいよ、と伝えたいです。同じように黙っている人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"30","title":"「病院に行くほどじゃない悩み」はどこに相談する？私の相談先マップ完全版","category":"相談先","isHub":true,"wordCount":2037,"pccCount":1,"hashtags":["#相談先","#婦人科","#オンライン診療","#保健室","#フェムケア","#女性のからだ","#セルフケア","#体験談","#相談していい","#ひとりで抱えない"],"body":"このnoteを書き始めてから、私がいちばん繰り返し悩んできたことは、たぶんこれです。\n\n**「この悩み、どこに相談すればいいんだろう」**\n\n生理のとき、周期の乱れのとき、デリケートゾーンのとき。毎回かたちを変えて、同じ壁にぶつかってきました。今日はその総まとめとして、私の「相談先マップ」の完全版を書きます。\n\n## 「病院に行くほどじゃない」の正体\n\nまず、この言葉の話をさせてください。私たちが悩みを放置するときの決まり文句、「病院に行くほどじゃないから」。\n\nいろいろな不調で散々これを使ってきた私の結論はこうです。**この言葉の正体は、症状の軽さではなく「基準を知らないこと」でした。**\n\nどのくらいなら相談していいのか、誰も教えてくれない。だから、生理痛も、周期の乱れも、デリケートゾーンの違和感も、ぜんぶ「行くほどじゃない」の箱に入る。箱は無限に入ります。そして箱の中身は、勝手には解決しません。\n\n## 私の相談先マップ\n\nそこで、私が今知っている相談先を一覧にします。用途別に並べますが、どれが上、という順位はありません。\n\n**保健室・学校の養護の先生**\nいちばん近くて、いちばん無料で頼れる場所でした。生理痛で動けないとき、「これって普通なのかな」と思ったとき。医療そのものではないけれど、「次にどこへ行けばいいか」を一緒に考えてくれる、最初の入口になります。\n\n**婦人科・レディースクリニック**\nしっかり診てもらいたいとき。検査が必要かもしれないとき。私の場合はここが「かかりつけ」で、たいていの相談の起点でした。顔なじみになると「ついで相談」ができるのが、大きな強みです。\n\n**オンライン診療**\n時間が取れないとき、人目や移動がハードルのとき。スマホから相談できる仕組みです。学校や部活で忙しい時期でも、後回しの言い訳が減るのが実感できました。\n\n**地域の相談窓口（保健所・自治体）**\n性感染症の検査（自治体によっては匿名・無料の場合もあるようです）や、お金や事情があって医療機関に行きづらいときの相談先。公的な窓口は、思っているより頼っていい場所でした。\n\n**パーソナルケアクリニック**\n「病気未満かも」という相談やケアの入口として、行きやすさを重視しているところもあるようです。生理やデリケートゾーンなど、「これって病院案件？」と迷うような悩みの相談先のひとつとして知りました。あくまで上に挙げた選択肢と並ぶ、ひとつの選択肢です。内容や料金はクリニックによって幅があるので、事前に確認するのがよさそうです。参考までに、例としてこういうところがあります → https://personalcareclinic.jp/\nなお、**未成年の場合は、保護者に相談してからのほうが安心だと思います。** 費用がかかったり、保護者の同意が必要になったりする場合があるからです。\n\n※紹介料などは受け取っていません。受診をすすめるものではなく、選択肢のひとつとしての情報です。\n\n## どう使い分けてきたか\n\nこのマップを、私は実際こう使ってきました。\n\n生理痛や周期の乱れは、まず保健室で相談してから、必要そうなら婦人科へ。デリケートゾーンの疑問は、婦人科の「ついで相談」で。時間が取れないときはオンライン診療。お金や事情で迷ったときは、地域の窓口を調べる。そんなふうに、そのときの状況で入口を変えてきました。\n\n見えてきたことがあります。**大事なのはどこを選ぶかより、「選べる状態」を先に作っておくこと**でした。いざというときにゼロから探すのと、マップから選ぶのとでは、動き出しの速さがまったく違います。\n\n## どれを選んでも正解、放置だけが不正解\n\nこのマップに優劣はありません。迷ったら保健室でいいし、婦人科でもいい。人目が気になればオンラインからでいい。お金が不安なら公的な窓口からでいい。\n\nどの入口から入っても、必要ならちゃんと次の場所につないでもらえます。相談の世界は、入口を間違えたら追い返される場所ではありませんでした。\n\n唯一の不正解は、「行くほどじゃない」の箱に入れて放置し続けることだけ。あの箱の中身は、勝手には減りませんでした。\n\n## あなたのマップを作ってみてください\n\n私のマップは、あくまで私の生活に合わせたものです。住んでいる場所、通っている学校、悩みの種類によって、あなたのマップは違う形になると思います。\n\n元気なうちに、スマホのメモに数行だけ書いておく。それだけで、いつかの夜のあなたが少し楽になります。そして、どこに相談するか迷ったときは、ひとりで決めずに、頼れる大人と一緒に選んでみてほしいです。\n\nこのnoteが、あなたのマップ作りの材料になれたら、これほどうれしいことはありません。同じように「どこに相談すればいいの」と迷っている人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"31","title":"低用量ピルの費用、1年続けてわかったこと","category":"低用量ピル","isHub":false,"wordCount":1936,"pccCount":0,"hashtags":["#低用量ピル","#ピル","#お金のはなし","#体験談","#女性のからだ","#フェムケア","#エッセイ","#婦人科","#学生","#からだのこと"],"body":"低用量ピルを飲み始めたばかりの頃の記録は、以前この場所に書きました。\n\nあれから時間が経って、気づけば1年が過ぎていました。飲み始めのころは「まずは続けられるかな」で頭がいっぱいだったのですが、1年という区切りを迎えて、あらためて気になってきたことがあります。\n\n**このまま続けるとしたら、お金はどうすればいいんだろう。**\n\n学生の私にとって、これはけっこう大きな問いでした。今日は、低用量ピルを1年続けてみて見えてきたお金の話を書きます。最初にお断りしておくと、金額はクリニックや処方の内容、時期によって変わるようですし、あくまで当時の私の場合の話です。正確な金額は、必ず受診先で確認してください。\n\n## 続けるかどうかに、お金の話がついてくる\n\n始める前の私は、費用のことをそこまで真剣に考えていませんでした。\n\n数か月くらいなら、少し高くてもバイト代でなんとかなる。そう思っていたんです。でも「これから続ける」となると話は別でした。低用量ピルは、私が調べた範囲では保険がきかない自由診療になることも多いようで、続ける限り、毎月どこかでお金が出ていきます。\n\n効果や体調の話とはまた別に、**「この金額を、学生の私がこれからも払い続けられるか」という現実的な問い**が、私の中で無視できないものになっていきました。\n\n## 1年間、実際にかかった費用感\n\n私の場合、はじめの数か月は毎月クリニックに通って、1か月分ずつ処方してもらっていました。診察料と薬代を合わせて、1回でだいたい数千円くらいだった記憶があります。\n\nバイト代から毎月それが出ていくのは、正直、軽い負担ではありませんでした。友だちと遊びに行くお金や、欲しかった服を、その月はちょっと我慢したこともあります。それでも、体調がラクになる感覚があったので、私にとっては「使いどころのあるお金」だと思えました。\n\nもちろんこれは私が通っていた場所と、処方されていた種類での話です。**銘柄やクリニックによって、金額の幅はけっこうあるようだ**、というのも同時に知ったことでした。\n\n## 通院のペースを変えたら、支出も変わった\n\nしばらく経ったころ、婦人科の先生に「まとめて処方することもできますよ」と教えてもらいました。\n\nそれから私は、1か月ごとの通院から、数か月分まとめて処方してもらう形に切り替えました。毎回かかっていた診察料が、通院の回数が減った分だけ少なくなったので、**トータルの支出は前より落ち着きました。**\n\n薬代そのものはほとんど変わらなくても、通院の回数で差が出るんだな、と知ったのは、私にとってちょっとした発見でした。バイトのシフトと通院の予定を合わせる負担も減って、この切り替えは費用以外の面でも助かりました。\n\n## お金と付き合うために、私がやったこと\n\n1年続ける中で、私なりにやってみたことがいくつかあります。\n\n- **通院のペースを聞いてみる**：まとめて処方できないか、通っている婦人科に相談してみたこと\n- **「毎月出ていくお金」として先に取り分ける**：バイト代が入ったら、遊ぶお金と分けて、先にピル代を別にしておいたこと\n- **オンライン診療も選択肢として調べておく**：私は基本は通院ですが、テスト期間などで忙しいときにオンライン診療を使うと通院の手間が減りました\n\nどれも派手な節約術ではありません。ただ、**「よくわからないまま毎月払う」のと「仕組みを知ったうえで払う」のとでは、同じ金額でも気持ちがだいぶ違いました。**\n\n## 続けるか迷っている人へ\n\n1年続けてみて思うのは、低用量ピルの費用は、我慢して払い続けるものというより、「知って、選んで、付き合っていくもの」だということです。\n\n金額そのものは、私が書いた数字がそのままあなたに当てはまるとは限りません。だからこそ、続けるかどうか迷っているなら、まずは通っている（あるいは通おうとしている）クリニックに、率直に金額のことを聞いてみてほしいです。まとめて処方できるかどうかも、聞いてみる価値があると私は感じています。\n\n学生だと、費用のことは特に相談しづらいかもしれません。でも、続けることそのものが正解というわけではなく、費用も体調も含めて、自分にとって無理のない形を選べたら、それでいいのだと私は思っています。未成年の場合は、保護者と一緒に考えたほうが安心できることも多いと思います。\n\n飲み始めたばかりの頃の記録は、また別の記事に書いています。よかったらそちらもあわせて読んでみてください。同じように悩んでいる人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"32","title":"「ピルは親の保険証でバレる？」当時の私が調べたこと","category":"低用量ピル","isHub":false,"wordCount":1836,"pccCount":0,"hashtags":["#低用量ピル","#保険証","#体験談","#女性のからだ","#実家暮らし","#エッセイ","#フェムケア","#相談していい","#婦人科","#ひとりで抱えない"],"body":"婦人科に行こうかどうか迷っていた頃、私がいちばん検索していたのは、たぶんこの言葉でした。\n\n「ピル 保険証 バレる」。\n\n学生の私は、健康保険が親の扶養に入ったままでした。だから、婦人科にかかること以上に、**「保険証を使ったら、家族に何か伝わるんじゃないか」**という不安のほうが、実は大きかったんです。今日は、当時の私が調べたことを書きます。\n\n## 保険証のことが、いちばん足を止めた\n\nからだのことで気になることがあって、婦人科に行ったほうがいいのかな、と思い始めたときのことです。\n\n行くこと自体も緊張したのですが、それ以上に頭に浮かんだのが保険証でした。親の扶養に入っている保険証を使って受診したら、その記録がどこかに残って、家族に知られてしまうんじゃないか。深夜に布団の中でスマホを握りしめて、検索しては、サイトによって書いてあることが少しずつ違うことにモヤモヤしていました。\n\n一回きりの受診なら、なんとかなる気もしていました。でも「これから続けて通うかもしれない」と考えると、記録も積み重なっていくはずだ、という当たり前のことに気づいて、余計に足がすくみました。\n\n## 「バレる」と思った理由\n\n私が特に気になっていたのは、**医療費のお知らせ**という書類の存在でした。\n\n親の保険に入っている場合、受診の記録は保険者の側にも残るようです。そして、世帯でかかった医療費をまとめて知らせる書類が、年に何回か家に送られてくる仕組みがあるらしい、と当時の私はネットで知りました。「そこに婦人科の名前が載っていたら」と考えると、それだけで受診をためらう気持ちになりました。\n\nもうひとつ気になったのが、**保険がきくのか、自費なのか**という区分です。同じ低用量ピルでも、目的によって扱いが変わることがあるらしい、というのも、このとき初めて知りました。ここも、想像だけではよくわからない部分でした。\n\n## 調べてわかったこと・わからなかったこと\n\nいろいろ調べましたが、正直に言うと、「絶対にバレない」とはっきり言える答えには行き着きませんでした。\n\n私が調べた範囲では、医療費のお知らせに載るのは医療機関の名前と金額が中心で、病名や薬の名前までは書かれないことが多い、という説明を目にしました。ただ、名前に「婦人科」と入っていれば、それだけで何科にかかったかは推測できてしまいます。載る項目や送られてくる頻度は、加入している保険によって違うようで、私が一律に説明できることではありませんでした。\n\nだからこそ私は、**想像だけで不安をふくらませるより、自分の場合はどうなのかを確かめること**を選びました。\n\n## 「バレたくない」気持ちのその先で、私が思ったこと\n\n正直に書くと、当時の私は「とにかく誰にも知られずに済ませたい」と思っていました。その気持ちを、今も否定するつもりはありません。誰だって、言いたくないことはあると思います。\n\nでも、あれこれ調べて疲れきったあとで、私はふと思ったんです。**「隠すための情報」を探し続けるより、一度ちゃんと確認したほうが、たぶん早いし、心もラクだ**、と。\n\n私の場合は、通う先の窓口に、私のケースが保険適用になるのか自費になるのかを聞いてみました。それから、勇気を出して、信頼できる大人にも少しだけ相談しました。未成年で親の保険に入っているうちは、受診に保護者の関わりが必要になる場面もあると知って、最初は身構えたのですが、話してみたら、思っていたより責められませんでした。全部を打ち明けなくても、「からだのことで婦人科に行きたい」とだけ伝えるやり方もあるんだ、と気づけたのも大きかったです。\n\n## あの頃の私と同じように調べている人へ\n\n保険証のことで足が止まっている人は、きっと少なくないと思います。\n\n「バレるかもしれない」という不安は、調べても完全にはゼロになりません。それでも、わからないまま我慢するより、加入している保険や通う先の窓口に直接確認するほうが、気持ちは少し軽くなる気がします。私はそうでした。\n\nそして、隠し通す方法をひとりで探すより、保健室の先生や産婦人科医のような、話しても大丈夫そうな大人を一人でも見つけておくことが、結局はいちばんの安心につながったと、私は感じています。ひとりで抱え込まなくていいよ、と当時の自分に伝えたいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"33","title":"あの経験から1年。私が変わったこと、変わらないこと","category":"セルフケア","isHub":false,"wordCount":1925,"pccCount":0,"hashtags":["#エッセイ","#体験談","#女性のからだ","#1年の振り返り","#自分と向き合う","#セルフケア","#婦人科","#フェムケア","#ひとりで抱えない","#からだのこと"],"body":"最初の記事を書いてから、気づけば1年が経っていました。\n\nちょうど、学年がひとつ上がって、まわりの環境も少し変わったタイミングでした。教室のメンバーが変わって、進路の話が現実味を帯びてきて。そういう節目に立つと、自然と「この1年、私はどう変わったんだろう」と振り返りたくなるものみたいです。\n\n「あの経験」と、私はこのnoteの中でそう呼んでいます。からだのことで頭が真っ白になって、暗い部屋でスマホだけを握りしめて、同じ検索ワードを何度も打ち込んでいた、あの頃のことです。詳しくは最初の記事に書いているので、まだ読んでいない人はよかったらそちらから読んでみてください。\n\n当時の記事を読み返すと、あの日の心細さがそのまま蘇ってきます。**あの頃の私は、自分のからだのことを、本当に何も知りませんでした。**\n\nきれいにまとめるつもりはありません。変わったことと、正直まだ変わっていないことを、両方ここに書いておこうと思います。\n\n## 変わったこと：相談できる場所ができた\n\nいちばん大きく変わったのは、ここだと思います。\n\nあの頃、私には相談できる場所も人も、正直ひとつも思いつきませんでした。検索結果だけを頼りに、暗い部屋でひとりで抱えるしかなかったんです。今は違います。かかりつけの婦人科があって、「ちょっと聞いていいですか」で済む関係ができました。\n\nきっかけは、勇気を出して保健室の先生に少しだけ話したことでした。あそこで一歩を踏み出せたから、次の一歩につながったんだと思います。**「何かあったら、ここに聞けばいい」という場所があること。それだけで気持ちがこんなに軽くなるとは、あの頃の私は想像もしていませんでした。**\n\n## 変わったこと：自分のからだを、少しは知ろうとするようになった\n\nあの経験のあと、私は自分のからだのことを、前より知ろうとするようになりました。\n\n生理の周期をアプリに記録したり、気になることをそのままにせず調べたり。以前の私は、からだのことは「そのうちなんとかなる」で通り過ぎていました。それが、「わからないなら、わかる人に聞けばいい」に変わったのは、地味だけど大きな変化だったと思います。\n\n毎日の中に、自分のからだのために何かをする、という小さな習慣ができたこと。それ自体が、私にとっては初めての感覚でした。\n\n## それでも、変わらないこと\n\nここまで読むと、私はすっかり変われた人みたいに見えるかもしれません。でも、正直に書きます。\n\n婦人科の予約を「今月はテストで忙しいから」と後回しにしてしまうことは、まだあります。検診や相談の前は、1年経った今でも少し緊張しますし、待合室で自分の名前を呼ばれる瞬間が、いまだにちょっと苦手です。\n\nからだのことを、勇気を出して人に話すのも、毎回スムーズにできるわけではありません。今も言い出せずに飲み込む言葉があるし、**「もう平気」とは、正直言えません。**\n\n進級して環境が変わっても、忙しさを理由に自分のことを後回しにしてしまう週は、普通にあります。このnoteのタイトルにしている言葉を、私自身がまだ完璧に実践できていないんです。\n\n## この1年でわかったこと\n\n変わったことと変わらないことを書き出してみて、ひとつ気づいたことがあります。私が本当に手に入れたのは、「完璧なからだ管理」ではなく、**「サボっても、また戻ってこられる場所」**だったということです。\n\n以前の私は、後回しにした自分を責めて終わっていました。今は、後回しにしたことに気づいた時点で、次の予約を入れたり、アプリのアラームを見直したりできます。責める代わりに、戻る場所へ戻る。この1年でできるようになったのは、たぶんそれくらいのことです。地味ですが、私にとっては大きな違いでした。\n\n## 読んでくれているあなたへ\n\nこのnoteを読んでくれている人の中には、私と同じように、まだ「あの経験」の途中にいる人もいるかもしれません。\n\n1年経って言えるのは、「不安がゼロになる日」は、たぶん来ないということです。それでも、相談できる場所を知っていることと、知らないことの間には、大きな差があると私は感じています。\n\n完璧に変わらなくていいと思っています。私も、完全には変われていません。それでも、迷ったときに向かえる場所が増えたことは、私にとって確かな1年分の変化でした。ひとりで抱え込まなくていいよ、と伝えたいです。\n\nこれからも、変わったことと変わらないことの両方を、正直に書いていくつもりです。よかったら、これからも覗きに来てください。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"34","title":"生理管理アプリを使い始めて、いちばん変わったこと","category":"生理・PMS","isHub":false,"wordCount":1930,"pccCount":0,"hashtags":["#生理管理アプリ","#生理","#セルフケア","#体験談","#女性のからだ","#エッセイ","#婦人科","#フェムケア","#記録","#からだのこと"],"body":"「生理管理アプリって、結局カレンダーに書くのと同じじゃないの？」\n\n使い始める前の私は、正直そう思っていました。周期なんてだいたい覚えているし、わざわざスマホに記録する意味がわからない。友だちで使っている子がいても、「几帳面な人がやることだよね」くらいの感覚でした。\n\nでも今は、もう手放せません。この記事では、まだ生理管理アプリを使ったことがない人に向けて、私が実際に使ってみて感じた変化を書いておきます。\n\n## きっかけは、問診票の前で固まったこと\n\n使い始めたきっかけは、婦人科での問診でした。\n\n受付や問診票では、必ずと言っていいほど聞かれる質問があります。\n\n「最終月経はいつですか」\n\nこれに、私はいつも「えっと……」と固まっていました。手帳をめくったり、スマホのカレンダーを見返したり、記憶をたどったり。正確に答えられたことは、たぶん一度もなかったと思います。\n\nまだ婦人科に慣れていなくて、聞かれたことにうまく答えられない自分を、診察のたびにちょっと情けなく思っていました。そんなとき、先生に「アプリで記録しておくと、次からラクですよ」と言われたのが、使い始めたきっかけでした。半信半疑でしたが、毎回問診票の前で固まるくらいなら、と思って入れてみました。\n\n## 最初は、ただの記録アプリだと思っていた\n\n正直に書くと、最初の数か月は惰性でした。\n\n生理が来たら開いて、ボタンを押す。それだけ。周期がどう変わるとか、体調との関係とか、そういうことをちゃんと見返す習慣は、なかなかつきませんでした。\n\n**変わったのは、婦人科の問診で「即答」できた日でした。**\n\n「最終月経日、えっと……」といつものように口ごもりかけて、その場でアプリを開いたら、一瞬で答えが出てきたんです。迷いなく日付を言えた瞬間、自分でも驚くくらいホッとしました。\n\nたったそれだけのことなのに、診察室での居心地が全然違いました。うまく話せない自分に焦らなくていい。それだけで、問診全体の緊張がひとつ減った気がします。\n\n## オンライン診療でも、記録があると心強かった\n\nオンライン診療を使うようになってからは、記録のありがたみをもっと感じました。画面越しの診察は、対面よりも自分の口で状況を説明する場面が多いように、私は感じています。\n\nそのときも、記録が手元にあるという安心感は大きかったです。「いつからいつまで、どんな感じだったか」を、記憶ではなくアプリの画面を見ながら話せる。うろ覚えで話すのと、記録を見ながら話すのとでは、自分の説明への自信がまったく違いました。\n\nこれは私の場合の感覚なので、記録がなくても問題なく診察が進む人もいると思います。ただ私自身は、答えに詰まらなくていいというだけで、受診へのハードルがひとつ下がった感覚がありました。\n\n## 続けるコツというほどでもないけれど\n\n続けるコツと言えるほどのものはないのですが、強いて挙げるなら**完璧に記録しようとしない**ことだったと思います。\n\n体調や気分まで毎日細かく入力しようとした時期もあったのですが、それは3日で挫折しました。今は、生理が来た日にボタンを押すだけ。それ以外の項目は、気が向いたときだけ埋める。それくらいのゆるさにしてから、逆に続いています。\n\nアプリによって使い勝手はかなり違うようです。私が調べた範囲では、機能の多さよりも「自分が続けられる操作の軽さ」を基準に選んでいる人が多い印象でした。開くハードルの低さのほうが、結局は続けやすさにつながる気がしています。\n\n通知をオンにするかどうかも、好みが分かれるところだと思います。私は最初、次の生理予測の通知をオンにしていたのですが、当たらない月も普通にあって、そのたびに一喜一憂するのが少し疲れてしまいました。今は通知をオフにして、自分から開いたときだけ見るようにしています。\n\n## まだ使っていない人へ\n\n生理管理アプリを使ったからといって、生理痛が軽くなったり、周期が整ったりするわけではありません。少なくとも私の場合は、そこは変わりませんでした。\n\n変わったのは、**自分のからだの情報に、自分がいちばん詳しくなれたこと**だと思っています。\n\n「最終月経日」に固まらなくていい。婦人科でもオンライン診療でも、記憶を頼りにせずに話せる。それだけのことですが、日常の中では地味に効いてくる変化でした。\n\nもしまだ使ったことがなければ、記録は完璧じゃなくて大丈夫です。生理が来た日にボタンを押すだけから、始めてみてもいいかもしれません。同じように悩んでいる人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"35","title":"ピルを飲み忘れた日、私がやったこと","category":"低用量ピル","isHub":false,"wordCount":2177,"pccCount":0,"hashtags":["#低用量ピル","#飲み忘れ","#体験談","#女性のからだ","#セルフケア","#エッセイ","#婦人科","#知らなかったを知る","#フェムケア","#からだのこと"],"body":"今このページを開いている人は、たぶん「あ、飲んでない」と気づいた直後か、その不安がまだ抜けきらないままだと思います。私も何度か、同じ夜を過ごしたことがあります。\n\n私は婦人科をかかりつけにして、低用量ピルを飲み始めました。今はオンライン診療で処方してもらうこともあります。毎日飲むタイプの薬なので、「もう慣れたし大丈夫」と思っていた時期もあったのですが、慣れた頃にこそ抜けるんだな、と思い知った日がありました。\n\nこれは、その日に私がやったことの記録です。**先に書いておくと、この記事には「飲み忘れたらこうすればいい」という具体的な対処法は書きません。** 理由は本文の中で説明します。\n\n## 「あ、飲んでない」と気づいた瞬間\n\nその日は、寝る前にシートを見て気づきました。前日の分の錠剤が、まだ押し出されずに残っていたんです。\n\n一瞬、頭が真っ白になりました。「いつから飲んでいなかったんだろう」「今日はもう飲んでいいのか」「これって危ない状態なんじゃないか」。考えが順番も脈絡もなくぐるぐる回って、正直しばらく布団の上で固まっていました。\n\nその日は課題やバイトでばたばたしていて、いつもの飲むタイミングがぽっかり抜けていたんだと思います。「また同じことを繰り返している」と自分を責めそうになったのですが、責めても何も解決しないというのは、それまでの経験でなんとなく学んでいたことでした。\n\n## まずやったこと：シートと添付文書を確認した\n\nパニックのまま検索するのではなく、まず手元にあるものを見ようと思いました。ピルのシートと、処方されたときに一緒にもらった説明書（添付文書）です。\n\nシートを見て、どの位置の錠剤を飲み忘れたのか、今どのくらいの周期の何日目なのかを確認しました。添付文書には、飲み忘れた場合の対応について書かれている箇所があったのですが、正直、状況によって場合分けがいくつもあって、自分がどのパターンに当てはまるのか、その場では判断しきれませんでした。\n\nここで私が思ったのは、「読んだから安心」ではなく「読んだからこそ、自己判断は危ないと分かった」ということでした。添付文書は情報源としてとても大事だと思いますが、それを自分なりに解釈して行動するのは、また別の話だと感じたんです。\n\n## 次にやったこと：処方元に連絡した\n\nそのあと私は、処方してもらっている診療先に連絡しました。オンライン診療のチャット相談の窓口だったので、状況をそのまま伝えて、指示を待ちました。\n\n正直、「こんな時間に、こんなことで連絡していいのかな」という迷いはありました。でも、下手に自己判断するより早く動いたほうがいいと思ったので、思い切って連絡しました。\n\n返信をもらうまでの数十分は、かなり長く感
