じました。届いた内容は、私がどのタイミングで飲み忘れたか、何日目だったか、直近の服用状況はどうだったかを踏まえた、私のケースに合わせた案内でした。それを読んで、ようやく肩の力が抜けたのを覚えています。\n\n## 具体的な対処法をここに書かない理由\n\nここまで読んで、「それで結局、飲み忘れたらどうすればいいの」と思った人もいるかもしれません。ですが、**私が受けた案内の中身を、ここにそのまま書くことはしません。**\n\n理由は単純で、飲み忘れへの対応は、ピルの種類、飲み忘れた日がシートの何日目か、飲み忘れてからどのくらい時間が経っているかによって変わるようだからです。私が調べた範囲でも、ケースによって書かれている対応が違っていて、ひとつの正解のように扱えるものではないと感じました。\n\n私の場合にちょうどよかった案内が、別の人にもそのまま当てはまるとは限りません。むしろ、状況の違うケースに私の体験談を当てはめて自己判断してしまうことのほうが、私は怖いと思います。\n\nなので、これだけは伝えたいです。**飲み忘れに気づいたときは、まず自分の処方された薬の添付文書を確認するか、処方してもらった医師・薬剤師に相談してください。** 自己判断で「たぶんこれで大丈夫」と決めてしまわないでほしいと思っています。\n\n## 同じ状況になったときのために、今やっていること\n\nあの日以来、私が変えたことをいくつか書きます。\n\n- **添付文書をすぐ出せる場所に置く**：パニックのときに探し回らなくていいように、シートと同じ場所に保管しています\n- **処方元の連絡先をスマホのメモに残す**：診察券やチャット窓口のURLなど、慌てたときにすぐ開けるようにしました\n- **飲み忘れた事実だけをまず確認する**：感情が先走る前に、シートを数える、という行動から始めるようにしています\n\nそれでも、飲み忘れそうになる日はまだあります。完璧に管理できるようになったわけではなくて、「忘れたときにどう動くか」を先に決めておいただけ、という感じです。\n\nもし今、飲み忘れに気づいて不安な気持ちでこの記事を読んでいるなら、まずは深呼吸をして、添付文書を確認するか、処方してもらった医師・薬剤師に連絡してみてほしいです。ひとりで抱え込んで自己判断するより、そのほうがずっと安心できると、私は思っています。ひとりじゃないよ、と伝えたいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"36","title":"修学旅行・大会の前に「生理をずらしたい」と初めて相談した話","category":"生理・PMS","isHub":false,"wordCount":2116,"pccCount":0,"hashtags":["#生理をずらす","#低用量ピル","#オンライン診療","#修学旅行","#体験談","#女性のからだ","#婦人科","#エッセイ","#学校生活","#からだのこと"],"body":"今このページを開いている人は、たぶんカレンダーとにらめっこしているところじゃないかと思います。楽しみにしていた修学旅行や、部活の大事な大会の日と、生理の予定日が重なりそうで、「ずらせるものなら、ずらしたい」と検索した人。少し前の私も、まったく同じことをしていました。\n\nそれまでの私は、大事な行事と生理が重なっても「生理だから仕方ない」と自分に言い聞かせて、諦める側にまわってきた気がします。プールの授業を見学したり、大会の日に痛み止めを握りしめて出かけたり。そういうのが当たり前だと思っていました。\n\n今日は、その私が初めて「生理をずらしたい」と大人に相談してみた話を書いておきます。効果ややり方を説明する記事ではなく、「相談してみた」という体験の記録として読んでもらえたらうれしいです。\n\n## 「ずらせるらしい」と知ったきっかけ\n\nきっかけは、友だちとの何気ない会話でした。修学旅行の日程の話をしていたときに、「生理の日って、病院でずらしてもらえるらしいよ」と言われたんです。\n\n正直、そのときは半信半疑でした。生理は勝手に来て勝手に終わるもので、自分でどうこうできるものだと思っていなかったからです。でも家に帰って調べてみると、行事や旅行に合わせて生理の時期を相談する人は、私が思っていたより珍しくないようでした。\n\nそれを知れただけでも、当時の私にはちょっとした発見でした。今まで何度も「仕方ない」で済ませてきた場面が、実は相談していい場面だったのかもしれない。そう思うと、少し悔しいような、拍子抜けするような気持ちになりました。\n\n## 相談する前に迷ったこと\n\n正直に書くと、相談する前はかなり迷いました。\n\n「行事のためだけに相談するなんて、大げさじゃないかな」「もっと大変な人のほうが優先されるべきなんじゃないか」。そんなふうに、自分の悩みを勝手に小さく見積もっていた気がします。それに、未成年の私が病院に行くのに、親に何も言わずに行っていいのかも分かりませんでした。\n\n結局、私はまず保健室の先生に話してみることにしました。**いきなり病院はハードルが高かったけれど、学校の中に相談できる大人がいたことは、当時の私にとって大きかった**です。先生は「行事に合わせて相談する子はいるよ」と普通に受け止めてくれて、婦人科やオンライン診療という選択肢があることも教えてくれました。\n\n## 実際に相談してみて\n\n保健室の先生と話したあと、私は親にも打ち明けて、一緒に婦人科に行くことにしました。生理をずらすには医師の処方が必要になることもあるようで、そこは自己判断ではどうにもならない部分だったからです。\n\n診察では、行事の日程と、これまでの生理の来かたを伝えました。医師からは、方法や必要な準備期間について説明があって、「絶対にこの通りになる」というような断定的な言い方ではなかったのが印象に残っています。\n\n具体的な服用の方法や日数は、実際に相談した医師の指示によるところが大きいので、ここで詳しく書くのは違うと思って控えます。ただ、**「そんなに珍しい相談じゃないよ」という雰囲気で受け止めてもらえたこと**が、身構えていた私には拍子抜けするくらい普通のことでした。\n\n## 対面でもオンラインでも相談できると知った\n\n私は親と一緒に対面の婦人科に行きましたが、調べていく中で、こうした相談はオンライン診療でも受け付けているところがあるようだと知りました。\n\n行事の予定が急に決まったときや、平日に通院の時間が取れないときは、オンラインという選択肢も現実的だなと感じました。ただ、未成年の場合は保護者の同意が必要になることもあるようなので、そこは親や信頼できる大人と一緒に確認したほうが安心だと思います。\n\n対面かオンラインか、どちらが正解ということではなく、そのときの自分の状況に合わせて、大人と一緒に選べばいいのだと、私は今のところ考えています。\n\n## 行事本番はどうだったか\n\n結論から言うと、その行事の日は、生理のタイミングをそこまで気にせず過ごすことができました。もちろんこれは私の場合の結果であって、同じようにいくとは限りません。\n\nそれでも、「相談すらしていなかったら、今回もいつも通り諦めていたんだろうな」と思うと、動いてみてよかったという気持ちが素直に残っています。**効果があったかどうかより、選択肢を知って、大人に相談してみたこと自体が、私にとっては収穫でした。**\n\n## 同じように悩んでいる人へ\n\n「生理をずらせるかもしれない」と知っていても、実際に相談するまでには、私もけっこう時間がかかりました。\n\n理由が修学旅行でも、大会でも、他の予定でも、相談する理由に優劣はないと思います。そして、これは自分ひとりで抱え込まずに、保健室の先生や親、婦人科の先生といった頼れる大人と一緒に考えていいことなんだと、今回感じました。\n\n同じようにカレンダーを見比べている人に、この記事が少しでも届いたらうれしいです。ひとりで抱え込まなくていいよ、と伝えたいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"37","title":"ピルで肌が変わった気がする、という話","category":"低用量ピル","isHub":false,"wordCount":2292,"pccCount":0,"hashtags":["#低用量ピル","#肌の変化","#体験談","#女性のからだ","#セルフケア","#エッセイ","#婦人科","#フェムケア","#個人差","#からだのこと"],"body":"低用量ピルを飲み始めてしばらく経ったころ、ふと鏡を見て「あれ、なんか肌の調子がいいかも」と思った日がありました。ニキビが少ないような、朝のメイクのノリがいいような。でもすぐに「これ、本当にピルのおかげなのかな」という疑問がわいてきました。\n\n気づけば夜、ベッドの中でスマホを片手に「ピル 肌 変化」で検索していたこともありました。同じように、ピルを飲みながら肌の変化を感じて、同じ言葉を検索窓に打ち込んだことがある人は、たぶん私だけではないと思います。この記事は、その疑問について私なりに考えたことの記録です。\n\n先に断っておくと、これは医療情報ではなく、私ひとりの体験と感想です。ピルと肌の関係を保証するものではありません。\n\n## 「なんとなく肌の調子がいい」と気づいた日\n\nきっかけは、はっきりしません。ある朝、いつものように洗顔をしていて、「そういえば最近、肌がざらつく感じが減った気がする」と思ったのが最初でした。\n\nはっきりと「これが変化です」と言えるほど劇的なものではなく、**「言われてみればそうかも」くらいの、ぼんやりした変化**でした。毎日記録をつけているわけでもないので、いつからそう感じ始めたのかも、正確には思い出せません。\n\n学校で友だちに「最近、肌きれいじゃない?」と言われたことも一度だけありました。自分で気づいていた変化を、他の人からも指摘されると、なんとなく本当だったんだ、と思えた瞬間でした。それでも、それがピルのおかげなのかどうかは、そのときの私にはまだ分かりませんでした。\n\n## 本当にピルのせいなのか、私が調べてみたこと\n\n気になったので、自分なりに調べてみました。私が調べた範囲では、ホルモンのバランスと肌の状態には関係があると言われているようです。ただ、それがそのまま「ピルを飲むと肌がきれいになる」という話に直結するわけではなさそうだ、というのが私なりの理解です。\n\nそもそも、その時期の私には他にも変わったことがたくさんありました。季節が変わっていたし、テスト期間が終わって睡眠時間が戻った時期でもありました。使っていた洗顔料を、少し前に変えたばかりでもありました。\n\n**肌の調子が良くなった理由を、ピルひとつに絞り込むことは、私にはできませんでした。** これは私の場合の話であって、他の人にも同じことが言えるとは限らないと思います。\n\nSNSで似たような体験談を見てみたこともあります。「肌がきれいになった」という声もあれば、「特に変わらなかった」「むしろ肌が荒れた」という声もあって、印象としてはかなりばらつきがありました。私が調べた時点では、こうした体験談を裏づけるような、はっきりした結論は見つけられませんでした。\n\n## 私の場合の変化\n\n具体的にどう変わったかというと、正直、細かいところまでは覚えていません。ただ感覚として残っているのは、生理前のあの独特な肌のゆらぎが、以前より穏やかになった気がする、ということでした。\n\n以前は生理前になると決まって調子が乱れていたのですが、その波が少し小さくなったような感じがありました。もっとも、これも「気がする」レベルの話で、写真を撮って比べたわけでもありません。曖昧なところは曖昧なまま、ここに書いておきたいと思います。\n\n## 医師に聞いてみた話\n\n気になったので、婦人科の診察のときに、担当してくれた医師に聞いてみたことがあります。\n\n返ってきたのは、「肌の変化を感じる人はいるけれど、個人差が大きくて、必ず良くなるというものではない」という説明でした。ホルモンの影響で変化を感じる人もいれば、逆に変化を感じない人、なかには肌が荒れたと感じる人もいるようだ、とも言われました。\n\n**効果を保証するものではないし、肌のために飲む薬でもない**、という説明は、当たり前のようでいて、私にはちゃんと聞いておいてよかったことでした。ネットの体験談だけで判断しなくてよかった、と思います。\n\n## 肌のために飲むものではないと思うようになった\n\nこの話を聞いてから、私はピルを「肌のための薬」として見るのをやめました。もともと私がピルを飲み始めた理由は、生理周期を安定させたかったことでした。肌の変化は、あくまでそのついでに私が感じた、おまけのような話だったんだと、今は思っています。\n\nもし肌の変化を期待してピルを検討している人がいたら、そこを主な目的にはしないほうがいいのかもしれない、と私は感じています。あくまで私個人の意見です。そして、飲むかどうかを決めるときは、必ず婦人科の先生に相談してほしいなと思います。\n\n## 同じように気になっている人へ\n\n「ピルを飲んだら肌が変わった気がする」という感覚は、私にとっては確かにありました。でもそれが医学的にピルのおかげだと言い切れるかというと、私には分かりません。\n\n季節や生活リズム、スキンケア、ストレスなど、肌に影響しそうな要素は他にもたくさんあります。**ピルを飲んでいる間に肌の調子が変わったとしても、それがピルによるものとは限らない**、ということは、心のどこかに置いておいてもいいのかなと思います。\n\nもし肌の変化が気になったり、逆に肌荒れがひどくなったように感じたりしたときは、ひとりで判断せず、処方してもらっている医師に相談してみてください。私もそうやって、少しずつ自分のからだとの付き合い方を確かめています。同じように気になっている人に、この話が少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"38","title":"生理痛で学校を休むと言えなかった私が、変えたこと","category":"生理・PMS","isHub":false,"wordCount":2168,"pccCount":0,"hashtags":["#生理痛","#学校生活","#学校","#体験談","#女性のからだ","#セルフケア","#エッセイ","#フェムケア","#ひとりで抱えない","#からだのこと"],"body":"毎月、生理2日目あたりになると、下腹部から腰にかけて重だるい痛みが出て、朝、起き上がるのもつらい日がありました。\n\nでも学校を休むとき、私が親に頼んで伝えてもらっていた理由は「風邪ぎみで」「頭が痛くて」でした。生理痛だとは、なぜか言えませんでした。\n\n同じように、本当の理由を言えないまま学校を休んだことがある人は、私だけではないと思います。今日は、その「言えなかった私」が、伝え方をひとつ変えてみた話です。\n\n## 「今日は頭が痛くて」と言い続けていた日々\n\n生理痛で動けない日は、月に1日か2日ありました。前の日の夜からうっすら気配があって、当日の朝、腰と下腹部の痛みで布団から出られなくなる、というパターンがほとんどでした。\n\n痛み止めを飲んでも効かない朝、私はいつも同じことを考えていました。「休みたい。でも生理痛でとは言いたくない」。\n\n結局、頭痛や体調不良という言葉でごまかして休んでいました。学校への欠席連絡は親がしてくれるので、担任の先生に直接「生理痛です」と言う場面は、そもそもありませんでした。詳しい理由を言わずに済んでしまう仕組みに、無意識に助けられていた気もします。\n\n## なぜ「生理で休みます」と言えなかったのか\n\n振り返ると、理由はいくつかありました。\n\n**言いにくい空気があると、勝手に思い込んでいた。** クラスで生理痛を理由に休んだという話を、あまり聞いたことがなかったので、なんとなく口に出しづらかったんです。\n\nもうひとつは、**「この程度で休むほどじゃないのでは」という気持ち**でした。動けないほど痛い日もあれば、我慢すれば行ける日もある。だから「生理痛です」と言い切る自信が、私にはありませんでした。\n\nあとは単純に、恥ずかしさもありました。生理という言葉を、担任の先生や周りに対して口にすることに、ためらいがあったんだと思います。当時の私は「体調不良」という言葉の裏に隠れることで、そのためらいから逃げていたんだと、今なら思います。\n\n## 伝え方を変えてみたきっかけ\n\nきっかけは、些細なことでした。保健体育の授業のあと、友だちが「私、生理痛ひどいときは保健室で少し休ませてもらってるよ」と、当たり前みたいに話してくれたんです。\n\n私は少し驚きました。同じようにつらい人が、すぐそばにいて、しかもちゃんと大人に頼れていたから。\n\nこのとき、自分がずっと「言えない」と思い込んでいただけで、実際に言ってみたらどうなるかを一度も試したことがない、と気づきました。\n\n一度、保健室の先生に生理痛のつらさを相談してみたことも、少し背中を押してくれた気がします。先生から「我慢しすぎなくていいよ。痛みが強い日が続くなら、婦人科で相談する方法もあるよ」と言われたことが、私の中で小さな許可になりました。これは私の場合の話で、言葉の受け取り方も人それぞれだと思います。\n\n## 実際に伝えてみて、変わったこと\n\n次に生理痛がひどかった日、私は保健室に行って「生理痛がつらくて」とだけ、先生に伝えてみました。\n\n理由を細かく説明する必要はないだろうと思って、それ以上は言いませんでした。\n\n返ってきたのは「じゃあ少し横になろうか」という、あっさりした一言でした。拍子抜けするくらい、何も特別なことは起きませんでした。\n\nもちろん、これは私の学校・私の場合の話です。学校や先生によって雰囲気はかなり違うと思います。ただ、**言えなかったのは、ルールのせいではなく、私自身の思い込みのせいだったのかもしれない**、と思うようになりました。\n\nそれ以来、私は毎回「生理痛で」と伝えているわけではありません。正直に言うと、伝えやすい日と伝えにくい日、伝える相手によっても気持ちは変わります。それでも「一度言えた」という経験は、次に言うときのハードルを、少しだけ下げてくれた気がします。\n\n## 痛みが強い日が続くなら、相談してみてもいい\n\n保健室の先生に言われて印象に残っているのが、「毎月ちゃんと動けなくなるくらい痛いなら、それは我慢だけで解決しなくていいかもしれない」という言葉でした。\n\n生理痛の感じ方は人それぞれで、私が調べた範囲でも、痛みの強さには個人差がかなりあるようです。ただ、日常生活に支障が出るくらいの痛みが毎月あるなら、婦人科などで相談してみる選択肢もあると知って、少し気が楽になりました。相談するときは、いきなり一人で行くのが不安なら、親や保健室の先生に間に入ってもらうのもありだと思います。\n\n## 言えなくても、責めなくていい\n\n今でも、生理で休むと伝えるのに、まったくためらいがなくなったわけではありません。伝えづらい相手のときは、今も曖昧な理由で済ませることがあります。\n\nそれでも、「言えない自分はおかしい」とは、もう思わなくなりました。**言えるときに言えばいい。言えない日があってもいい。** そのくらいの距離感でいいのだと、今は思っています。\n\nもし今、生理痛でつらいのに理由を言えずにいる人がいたら、まずは保健室の先生みたいに、話しやすい大人に一言だけ伝えてみるのもいいかもしれません。同じように言い出せずにいる人に、この話が少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"39","title":"彼と「これから何がしたいか」を話した夜","category":"避妊・恋愛","isHub":false,"wordCount":2116,"pccCount":0,"hashtags":["#カップル","#パートナーシップ","#進路","#将来のこと","#対話","#体験談","#エッセイ","#女性のからだ","#自分で決める","#高校生"],"body":"進路希望調査のプリントを前に、ペンが止まりました。\n\n第一志望の欄を埋めながら、頭の隅では別のことを考えていました。私たちは、これから何がしたいのか、お互いのことをまだちゃんと話したことがない。彼と将来の話をするタイミングって、一体いつなんだろう。そんなことを、以前から漠然と考えていました。\n\n今日は、その話をやっと切り出せた夜のことを書いておきます。答えが出た話ではありません。でも、話せてよかったと思っている話です。\n\n## 進路の話で、手が止まった\n\nその日は特別なことは何もない、いつも通りの平日でした。バイト終わりにスマホを見ていたら、彼から「志望校もう決めた?」というメッセージが来て、私はうまく返せませんでした。\n\n**私たちはまだ、その話をちゃんとしていない。**\n\n彼のことは好きですし、なんとなくこれからも一緒にいるつもりでいます。でも「なんとなく」の中身を、言葉にして確認したことは一度もありませんでした。どんな進路に進むのか、どんなことをやってみたいのか。そういう具体的な話は、なんとなく避けてきたように思います。\n\n## 「これから」を言い出せなかった理由\n\n言い出せなかった理由は、自分でもうっすら分かっていました。\n\n将来の話を切り出すことが、彼へのプレッシャーになる気がしていたからです。「これからどうするの」と聞いた瞬間に、私が二人の将来を重く考えすぎているように聞こえてしまうんじゃないか。逆に、私自身がまだ何も決めていないのに聞かれても困る、と思われるんじゃないか。そんな想像ばかりが先に立って、切り出すタイミングを何度も逃してきました。\n\n今振り返ると、私は「話す」ことと「決める」ことを、同じものだと思い込んでいた気がします。話したら最後、二人の関係の結論まで出さなきゃいけない。そう思うと、余計に口が重くなりました。\n\n## 実際に話した夜のこと\n\n結局その夜、話を切り出したのは私からでした。\n\n進路希望調査のことをぽつぽつ話しているうちに、「私たち、これから何がしたいのか、ちゃんと話したことないよね」と口にしていました。彼は少し驚いた顔をしていましたが、話をそらすことはありませんでした。\n\n彼から返ってきたのは、はっきりした答えではありませんでした。「正直、まだ何がしたいかよく分からない」「でも、なんとなくこういう方向かなとは思ってる」というような、曖昧な言葉が多かったのを覚えています。私も似たようなものでした。本当にやりたいことなんて、自分の中でもまだ言葉にできていません。\n\n**二人とも、はっきりした答えを持っていませんでした。**\n\nそれでも、その事実そのものにほっとした自分がいました。彼も同じように、まだ分からないまま揺れている。ひとりで抱えていた「これから」が、二人の間に置かれた感覚がありました。\n\n## 出た答えは、「まだ分からない」だった\n\nその夜、私たちが出した結論は、結論と呼べるようなものではありませんでした。\n\n「今すぐ決めなくていい」「でも、話さないままにもしない」。話し合いの終わりに残ったのは、そのくらいのことです。同じ進路に進むのか、別々の道を選ぶのか。そういう答えは、その夜は出ませんでしたし、今も出ていません。\n\nこれは私たちの場合の話であって、正解ではないと思っています。すぐに具体的な目標を語れるカップルもいるでしょうし、私たちのように、迷いながらゆっくり話していく形もあるはずです。大事なのは、どちらが早いか正しいかではなく、**二人が同じ話題を避けずにいられるかどうか**なのかもしれません。\n\n## 話しながら、自分のことも考えた\n\n面白かったのは、彼の話を聞いているうちに、自分が本当は何をしたいのかを、前より考えるようになったことです。\n\n相手に「どうしたいの?」と聞くと、自然と自分にも同じ問いが返ってきます。私はどんな高校生活を送りたいのか、どんな大人になりたいのか。恋愛のことだけじゃなくて、自分自身の「これから」を、久しぶりにちゃんと考えた夜でした。\n\n彼に合わせて自分の進路を決める、という話ではありません。むしろ逆で、**自分のことを自分で決められる人でいたい**、と思いました。それは、自分のからだのことも、進路のことも、誰かに預けっぱなしにしないでいたい、という気持ちに近い気がします。\n\n## 同じように迷っている二人へ\n\nもし今、彼と将来の話をまだできていなくて、モヤモヤしている人がいたら。\n\n焦って答えを出す必要はないと、私は思っています。話したからといって、その場で何かを決めなきゃいけないわけではありません。「まだ分からない」も、「今は考えられない」も、ちゃんとした答えのひとつだと思うからです。\n\n大事なのは、答えを出すことよりも、その話題を二人で持てているかどうかなのかもしれません。そして、進路のことで本当に迷ったときは、彼だけじゃなくて、親や先生みたいに頼れる大人にも相談していいんだと思います。同じように迷っている人に、この夜の話が少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"40","title":"彼にピルのことをどう説明したか","category":"避妊・恋愛","isHub":false,"wordCount":2231,"pccCount":0,"hashtags":["#低用量ピル","#カップル","#パートナーシップ","#対話","#体験談","#エッセイ","#女性のからだ","#伝え方","#恋愛","#フェムケア"],"body":"「ピルって、避妊のためのやつでしょ?」\n\n彼にそう言われたとき、私は一瞬うまく返せませんでした。間違ってはいない。でも、それだけでもない。**低用量ピルを飲んでいる理由を、同い年の彼にどう説明するか**で、私は思っていたより悩むことになりました。\n\nピルを飲んでいることを、いつ・どこまで彼に話すか。同じように迷っている人は、きっと少なくないと思います。今日はそのときの話と、今の私なりの説明の仕方について書きます。正解ではなく、一例として読んでもらえたらうれしいです。\n\n## 彼が戸惑った日のこと\n\n彼が私のピルシートを見つけたのは、付き合ってしばらく経ったころだったと思います。\n\n「これ何?」と聞かれて「ピル」と答えたら、彼は少し戸惑った顔をしました。「そんなに真剣に考えてたんだ」というようなことを言われて、今度は私が戸惑う番でした。\n\n彼の中では、ピル＝避妊のための薬、それも「私たちの関係のために」始めたもの、という理解だったんだと思います。悪気はまったくなくて、むしろ真剣に受け止めてくれたうえでの反応でした。ただ、その言葉の裏には「そんなに俺との将来を考えてたんだ」という、少し重たい受け取り方も混ざっている気がして、私は説明が足りていなかったことに気づきました。でも私が飲み始めた理由は、それだけではなかったんです。\n\n## ピルは避妊だけの薬じゃない、と知らない人は多い\n\n私が調べた範囲では、低用量ピルは避妊のためだけでなく、**生理不順やPMS(月経前症候群)のために処方されることもあるようです**。\n\n私自身、生理の周期がバラバラだったことと、生理前のイライラや落ち込みがしんどかったことがきっかけで、婦人科に相談するようになりました。そこで相談したのは避妊のことだけじゃなく、毎月の体調の波のことです。生理管理アプリの記録を見せながら話したのを覚えています。低用量ピルをすすめられたのも、そのときでした。\n\nだから私にとってピルは、「彼との関係のための薬」というより、「自分の体調と付き合っていくための道具」という感覚のほうが強かった。でも、そのニュアンスは、言わなければ伝わらないものだったんだと、彼の反応を見て気づきました。\n\n## 私がした、シンプルな説明\n\n誤解されたままにしておくのも変な感じがしたので、私は思っていることをそのまま話すことにしました。\n\n**「避妊のためだけじゃなくて、生理不順とPMSがしんどくて、婦人科で相談して飲み始めたんだよね」**\n\nそう伝えたら、彼は「そうなんだ、知らなかった」と素直に驚いていました。ピルという言葉から連想するイメージが、避妊にほぼ全振りされていたんだと思います。私も飲み始める前はそうだったので、彼を責める気持ちにはなりませんでした。\n\n説明するときに意識したのは、薬の詳しい効き方や成分まで説明しようとしないことでした。専門家でもないのに知ったかぶりで話すと、あとで違っていたときに気まずいと思ったからです。**「私が調べた範囲では」「病院でそう言われた」**という言い方に留めて、あとは「私のからだはこうだった」という自分の話だけを伝えるようにしました。\n\n## 説明したあとに変わったこと\n\n誤解がとけたあと、彼との関係で楽になったことがいくつかありました。\n\nまず、ピルを飲んでいることが「関係が変わったサイン」みたいに受け取られなくなったこと。次に、避妊の話も自然にできるようになったことです。私が調べた範囲では、低用量ピルに避妊の効果があるとされていても、性感染症までは防げないようなので、その点は変わらず二人で確認するようにしています。ここは、彼の側にも一緒に考えてほしかった部分でした。\n\n正直、ここまで話す必要があったのか、今でも分かりません。黙っていてもよかった気もします。それでも、誤解されたまま関係を続けるより、説明してよかったと私は思っています。あのとき言わずにいたら、彼は今も「避妊のためだけの薬」だと思ったままだったかもしれません。それは、私にとってはちょっと惜しいことだったなと感じています。\n\n## 全部話さなくても、いいと思う\n\n念のため書いておくと、私は「彼にすべてを打ち明けるべき」と言いたいわけではありません。\n\nからだのことは、本来とてもプライベートなことです。どこまで話すかは、その人と相手との関係によって違っていいと思います。私の場合はたまたまシートを見つけられたので話すことになりましたが、自分から言い出すかどうかは、無理に決めなくていいと今は思っています。\n\n## 迷っている人へ\n\n彼にピルのことをどう説明するか、迷っている人は多いと思います。私も、うまく言えた自信はいまだにありません。\n\n全部話す必要はないと思います。ただ、もし彼が「避妊のためだけ」と思い込んでいそうなら、そこだけは誤解のままにしなくてよかった、というのが私の実感です。伝え方に正解はなくて、**自分のからだのことを、自分の言葉で話せればそれでいい**、と今の私は思っています。\n\nそして、ピルのことでもからだのことでも、いちばん確かな情報は、ネットや彼氏ではなく、婦人科の先生から聞けるものだと感じています。迷ったときは、頼れる大人に相談してみてほしいです。同じように迷っている人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"41","title":"セックスのときの痛みを、初めて彼に伝えた話","category":"避妊・恋愛","isHub":false,"wordCount":1869,"pccCount":0,"hashtags":["#性交痛","#カップル","#パートナーシップ","#対話","#体験談","#エッセイ","#女性のからだ","#婦人科","#ひとりで抱えない","#勇気"],"body":"このページを開いている人の中には、今、ひとりで抱えている痛みがある人もいるかもしれません。誰にも言えなくて、平気なふりで笑ってやり過ごしている人もいるんじゃないかと思います。\n\n私も、しばらくそうでした。彼のことは好きだったのに、痛みのことだけがずっと引っかかって、素直な気持ちになれない時期がありました。\n\n今日は、その痛みを初めて彼に伝えた日のことを書きます。痛みの原因を説明する記事ではなくて、あくまで私が「言葉にする」までにかかった時間の話です。\n\n## 痛いのに、痛いと言えなかった\n\n好きな相手のときほど、痛みの話は切り出しにくいものでした。\n\nいちばん大きかったのは、**「せっかくのいい雰囲気を壊したくない」**という気持ちだったと思います。あとから思うと、私は自分のからだより、その場の空気のほうを優先していました。\n\nそれに、「これくらい普通なのかもしれない」という思い込みもありました。友達とこういう話をする機会なんてほとんどないので、自分の感覚が平均的なのかどうか、比べようがなかったんです。\n\nだから私は、痛くても顔に出さないようにして、ただ早く終わることだけを願っていました。今思えば、痛みそのものより、それを隠すことのほうに神経を使っていた気がします。\n\n## 我慢しながら、頭の中で考えていたこと\n\n我慢しているあいだ、頭の中はいつも同じことでいっぱいでした。\n\n「今言ったら、彼を傷つけるかもしれない」「私のからだのほうがおかしいのかもしれない」。この二つが交互に浮かんできて、結局どちらも、言わない理由になっていました。\n\n当時の私は、痛いと伝えることが彼を否定することだと思い込んでいたんだと思います。でも今振り返ると、それは彼のせいでも私のせいでもなくて、ただ「知らなかっただけ」だったのかもしれません。\n\nこっそり検索してみたこともありました。でも出てくるのは難しい言葉ばかりで、自分に当てはまるのかどうかも分からず、結局また我慢する日々に戻っていました。\n\n## 初めて伝えた日\n\n伝えたきっかけは、たいしたことではありませんでした。その日はたまたま、ふたりとも少し疲れていて、いつもより飾らない会話ができる空気だったんです。\n\n私は「実は、ちょっと痛いときがある」とだけ、短く伝えました。うまく説明はできませんでした。自分でもはっきり言葉にできる痛みではなかったからです。\n\n彼の反応は、私が想像していたのと違いました。**「え、それずっと我慢してたの」**と、驚いた顔をしていました。責められることも、機嫌が悪くなることもありませんでした。これは私の場合の話で、受け止め方は人によって違うと思います。\n\n## 伝えてから変わったこと\n\n伝えたからといって、すぐに何かが解決したわけではありません。\n\nそれでも、「痛かったら言っていい」という前提ができたことは、私にとって大きな変化でした。**我慢が「当たり前」から「言っていいこと」に変わった**んです。\n\n彼も、以前より加減や様子を気にかけてくれるようになりました。それが正解だったのかは分かりませんが、少なくとも私は、ひとりで抱えている感覚から少し抜け出せた気がしています。\n\nもっと早く言えばよかった、とも思いました。でも当時の私には、その一言を口に出す余裕もタイミングもなかったので、遅かったことを責める気にはなれません。言えたときが、私にとってのタイミングだったんだと思うことにしています。\n\n## 産婦人科でも相談してみた\n\n彼に伝えたあと、私はもう一歩だけ勇気を出して、産婦人科でもこの痛みについて相談してみました。\n\n原因は人によっていろいろあるようで、私の場合も「これが原因です」とはっきり言われたわけではありません。ただ、こういう相談をすること自体は珍しくないみたいで、思っていたよりずっと普通に話を聞いてもらえました。\n\n行くまでは正直こわかったです。でも、こういうことは自分ひとりで抱え込むより、頼れる大人に話したほうが気持ちが軽くなるんだな、と感じました。\n\n## 同じように我慢している人へ\n\nもし今、痛みを彼氏に伝えられずにいる人がいたら、伝え方に正解はないと私は思っています。\n\n短い一言でも、言葉にすることで前提が変わることはあります。そして、話せる相手はパートナーだけじゃなくて、産婦人科の先生や、学校の保健室の先生のような大人もいます。ひとりで抱え込まなくていいよ、と伝えたいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"42","title":"彼が「避妊は自分ごと」と言ってくれた日のこと","category":"避妊・恋愛","isHub":false,"wordCount":1708,"pccCount":0,"hashtags":["#避妊","#カップル","#パートナーシップ","#対話","#体験談","#エッセイ","#女性のからだ","#恋愛","#ふたりで決める","#フェムケア"],"body":"避妊のことを考えるのは、いつのまにか私ばかりでした。生理管理アプリで日にちを気にするのも、体調を心配するのも、なんとなく全部私の役目になっていました。\n\n今日は、その偏りに彼自身が気づいて、「これって自分ごとだよな」と言ってくれた日の話です。責めたい話ではなくて、ずっと引っかかっていた小さなモヤモヤが、少しだけ晴れた日の記録です。\n\n## 気づけば、私だけが抱えていた\n\n彼は、避妊に協力的な人でした。少なくとも、そう見えていました。\n\nその話をすると「ちゃんとしてくれてありがとう」と言ってくれる。茶化したり、面倒くさそうにしたりすることは一度もありませんでした。だから私は、これで十分なんだと思っていました。\n\nでも今振り返ると、あの「ありがとう」には小さな違和感がありました。**まるで避妊が、私が彼のためにやってあげている「作業」みたいに扱われている**気がしたんです。\n\n心配するのも、日にちを気にするのも、体調が揺れたときにしんどい思いをするのも、いつも私。彼はそれを、外側から見ているだけでした。悪気があったわけじゃないと思います。ただ、「やる係」と「感謝する係」に、いつのまにか分かれていたんです。\n\n## 見えていなかっただけだった\n\nある日、生理管理アプリの通知が鳴って、私が「あ、そろそろ気をつけなきゃ」とつぶやいたことがありました。\n\n彼は少し不思議そうに聞いてきました。「それって、毎回そんなに気にしてるの?」\n\n聞かれて、私も驚きました。私にとっては当たり前すぎて、わざわざ話したことがなかったんです。日にちのこと、体調のこと、頭のすみでずっと気にしていること。私の日常にひっそり組み込まれていたそれは、彼にはまったく見えていませんでした。\n\n**知らなかったのではなく、知る機会がなかっただけ**なんだと、そのとき思いました。誰かが隠していたわけじゃなくて、ただ私の生活の中にだけ存在していたことだったんです。\n\n## 「自分ごと」と言われた日\n\nその会話から少しして、私が体調のことで少し落ち込んでいた日のことです。彼はいつもより静かに、私の話を聞いていました。\n\nしばらくして、彼はぽつりと言いました。\n\n「これ、思ってたよりずっと、お前だけが気にしてくれてたことなんだな。避妊のこと、俺、自分ごとだと思ってなかったかもしれない」\n\nかっこいい宣言ではありませんでした。むしろ、少し戸惑ったような言い方でした。でも私には、その戸惑いのほうが本物に見えました。\n\nその一言を聞いたとき、私はホッとしたというより、ちょっと泣きそうになりました。責めたかったんじゃなくて、ただ気づいてほしかっただけなんだと、そのとき初めて自分でも分かった気がします。\n\n## 変わったこと\n\nその日を境に、小さなことがいくつか変わりました。\n\n彼のほうから「今日は大丈夫そう?」と聞いてくれるようになりました。私が体調のことでしんどそうにしていると、「今日は無理しないでいいよ」と言ってくれることも増えました。\n\n派手な変化ではありません。でも、**「気づいたときに、向こうから動いてくれる」**という感覚は、それまでとまったく違うものでした。任せていたつもりだったのに、実はずっと私だけが舵を取っていたんだな、と変わってはじめて気づいた気がします。\n\n## 同じように感じている人へ\n\n避妊のことを自分ばかりが抱えている、と感じているなら、それはあなたのわがままでも、細かすぎる不満でもないと私は思います。\n\n彼が変わったのは、私が強く責めたからではありませんでした。ただ、見えていなかったものが、たまたま見える機会があっただけです。責めても動かなかった気持ちが、知ることで動くこともあるんだと思いました。\n\nもちろん、同じきっかけがどのカップルにも訪れるとは限らないと思います。伝えても、すぐには変わらない相手もいるはずです。それでも、非対称に気づいてもらうこと自体には意味があると、私は今も感じています。同じように抱え込んでる人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"43","title":"子宮頸がん検診、初めて受けてみた話","category":"婦人科・検査","isHub":false,"wordCount":1656,"pccCount":0,"hashtags":["#子宮頸がん検診","#検診","#婦人科","#体験談","#女性のからだ","#セルフケア","#エッセイ","#フェムケア","#知らなかったを知る","#からだのこと"],"body":"大学生になってしばらくたったころ、家に一通の案内が届きました。子宮頸がん検診のお知らせでした。\n\n正直、最初は「私にはまだ関係ないかな」と思って、しばらく机の上に置きっぱなしにしていました。今日は、その案内をようやく行動に移した日の話です。結果の内容には触れず、私が「受けるまで」の気持ちの話として書きます。\n\n## 案内が来ても、しばらく放っておいた\n\n案内が届いたとき、正直ピンときませんでした。検診という言葉は知っていても、自分が受けるものだという実感がなかったんです。\n\n**「今、困ってる症状があるわけじゃないし」**という気持ちが、いちばん先に来ました。学校の課題やバイトで毎日それなりに忙しくて、わざわざ予約を取って出かけるのが、なんだか大ごとに感じられたんです。\n\nそれに、少しこわい気持ちもありました。何か見つかったらどうしよう、という漠然とした不安。初めての場所で、初めての検査を受けることへの緊張。その二つが混ざって、案内は机の上でどんどん存在感を薄くしていきました。\n\n## きっかけは、友達のひと言でした\n\nきっかけは些細なことでした。友達と話していて検診の話題になったとき、「うちにも来たよ、あれ。もう予約した?」と、なんでもないふうに言われたんです。\n\n責めるような言い方ではありませんでした。でもその一言で、「あ、私だけが放っておいてたわけじゃないんだ」と、なぜか少しホッとしました。同時に、「みんな同じように迷ってるなら、私も一回行ってみようかな」と思えたんです。\n\nそこから予約するまでは、思い切りが必要でした。電話をかける前に何度もためらったし、「今日はやめておこう」と先延ばしにしかけた日もありました。それでも、友達の言葉が頭のすみに残っていたおかげで、ようやく予約の電話をかけることができました。\n\n## 当日の様子\n\n当日は、待合室にいる間がいちばん緊張していました。\n\n「痛いのかな」「どれくらい時間がかかるんだろう」。想像ばかりがふくらんで、名前を呼ばれるまでの数分が、やけに長く感じられました。**知らないことって、こんなに不安をふくらませるんだな**、と思ったのを覚えています。\n\nでも、実際に始まってみると、思っていたよりずっとあっという間でした。先生が今何をしているか、ひとことずつ声をかけてくれたので、「次に何が起こるか分からない」こわさは、想像していたよりずっと小さかったです。\n\n終わって診察室を出るとき、からだの力がふっと抜けたのを覚えています。「もう終わったんだ」と、心の中で何度もつぶやいていました。あんなに身構えていたのが、少し拍子抜けするくらいでした。\n\n## 受けてみて思ったこと\n\n帰り道にいちばん強く思ったのは、**「こわかったのは検診そのものより、行くまでの想像のほうだった」**ということでした。\n\n行動に移すまでは、頭の中でいろんな最悪の場面を想像していました。でも実際に受けてみると、それは本当に短い時間で終わって、想像とはずいぶん違いました。\n\n結果を待つ間は、さすがに少し落ち着かない気持ちもありました。それでも「受けた」という事実だけで、机の上に案内を置きっぱなしにしていたころより、気持ちがずっと軽くなっていました。ずっと後回しにしていた宿題を、やっと出せたときの感覚に近かったです。\n\n## 案内が来て、迷っている人へ\n\n案内が来ても、なんとなく後回しにしてしまう気持ちは、痛いほど分かります。私もそうでした。\n\nでも、こわかったのは検診そのものより「行くまでの想像」のほうだった、というのが、受けてみた私の正直な感想です。検診の頻度や内容は、年齢や住んでいる場所によって違うようなので、案内に書いてあることや、産婦人科の先生など頼れる大人に確認してみるのがいちばんだと思います。\n\n同じように迷っている人に、この記事が少しだけ背中を押すきっかけになったらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"44","title":"健康診断で「婦人科系、大丈夫？」と聞かれてとまどった話","category":"婦人科・検査","isHub":false,"wordCount":1525,"pccCount":0,"hashtags":["#健康診断","#婦人科","#体験談","#女性のからだ","#セルフケア","#エッセイ","#フェムケア","#学校","#知らなかったを知る","#からだのこと"],"body":"学校の健康診断って、身長・体重を測って、視力を調べて、という流れがほとんどですよね。私もずっとそういうものだと思っていました。\n\nでもある年の健康診断で、問診のときにちょっとだけ違う質問をされて、うまく答えられずにとまどったことがありました。今日は、その日の話です。\n\n## 予想していなかった質問\n\nその日は、いつものように問診票を書いて、順番を待っていました。\n\n問診の担当の人に呼ばれて、ひととおり答え終わったころ、ふと聞かれたんです。「生理は順調ですか? 婦人科系で、何か気になることはない?」と。\n\n正直、**一瞬、頭が真っ白になりました**。学校の健康診断で、まさかそんなことを聞かれると思っていなかったんです。友達にも家族にも、あまり話したことのないことだったので、どう答えていいのか分かりませんでした。\n\n私は結局、「あ、はい、大丈夫です」とだけ答えて、その場を早く終わらせてしまいました。本当は、生理のことで少し気になっていることがあったのに、口に出せませんでした。\n\n## なぜ、とまどったんだろう\n\nあとから、どうしてあんなにとまどったんだろう、と考えました。\n\nたぶん私は、生理や婦人科系のことを「人に聞かれるもの」だと思っていなかったんです。**なんとなく、自分の中だけで処理するものだと思い込んでいた**のかもしれません。\n\n学校の授業でからだのことを習ってはいても、それを実際に「自分のこととして人に話す」練習は、ほとんどしてきませんでした。だからいざ聞かれると、言葉が出てこなかったんだと思います。\n\nそれに、「大丈夫です」と答えるのがいちばん無難で、その場が早く終わる気がしていました。気になることがあっても、それを言葉にして伝えるのは、思っていたよりずっとハードルが高いことだったんです。\n\n## 帰り道に考えたこと\n\nその日の帰り道、ずっとモヤモヤしていました。\n\nせっかく聞いてもらえたのに、なんで「大丈夫」で流しちゃったんだろう、と。あの質問は、私を困らせるためのものじゃなくて、たぶん「気になることがあれば言っていいよ」というサインだったんだと、あとから気づきました。\n\n同時に、こうも思いました。**気になることがあるなら、聞かれるのを待つんじゃなくて、自分から言ってもよかったんだ**、と。健康診断の問診は、それができる数少ない機会だったのかもしれません。\n\n## それから、少しずつ変えたこと\n\nその日をきっかけに、生理のことを一度ちゃんと調べてみることにしました。\n\n自分が気になっていたことが、よくあることなのか、それとも相談したほうがいいことなのか。調べてみても、はっきりした答えは出ませんでした。でも、「気になるなら、大人に相談していいことなんだ」と思えるようになっただけで、気持ちは少し軽くなりました。\n\nその後、体調のことで一度、産婦人科に行ってみたこともあります。行くまではこわかったけれど、あのとき健康診断で流してしまった気になりごとを、ようやく言葉にできた気がしました。\n\n## 同じようにとまどった人へ\n\nもし健康診断で婦人科系のことを聞かれて、うまく答えられなかった経験がある人がいたら、それはあなたが変なわけでも、答えが悪かったわけでもないと思います。\n\n慣れていないことを、その場でうまく言葉にするのは、誰にとっても難しいことです。もし今、気になっていることがあるなら、健康診断のときでも、保健室の先生でも、産婦人科でもいいので、頼れる大人に少しずつ話してみてもいいのかもしれません。ひとりで抱え込まなくていいよ、と伝えたいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"45","title":"生理用品を見直したら、悩みが減った話","category":"生理・PMS","isHub":false,"wordCount":1810,"pccCount":0,"hashtags":["#生理用品","#セルフケア","#体験談","#女性のからだ","#フェムケア","#エッセイ","#婦人科","#生理","#見直し","#からだのこと"],"body":"生理用品って、一度「これ」と決めたら、あとはずっと同じものを使い続けていませんか。\n\n私がまさにそうでした。初めて生理が来たころに買ったナプキンを、そのままずっと使い続けていたんです。悩みがなかったわけじゃないのに、「生理用品なんてどれも似たようなものだろう」と思い込んで、見直すという発想すらありませんでした。\n\n今日は、その思い込みを手放して生理用品を見直したら、学校生活の悩みが少し減った、という話です。特定の商品をおすすめする記事ではないので、そこは先にお断りしておきます。\n\n## ずっと同じものを、疑わずに使っていた\n\nきっかけは、たしか初めての生理のとき、お母さんが買ってきてくれたものだったと思います。\n\nそれから何年も、生理のたびに同じお店で同じものを買う。それだけでした。**「私に合っているかどうか」を考えたことすら、ほとんどなかった**んです。今思えば、シャンプーやリップは自分に合うものを選ぶのに、生理用品だけはなぜか、選ぶ対象にしていませんでした。\n\n## 悩みはあったのに、「そういうもの」だと思っていた\n\nもちろん、悩みがゼロだったわけではありません。\n\n体育の授業や部活のとき、動くと漏れないか気になって集中できないこと。長時間つけていると蒸れてかゆくなること。量が多い日は、休み時間ごとに替えることを考えるだけで気が重くなること。どれも小さな悩みでしたが、積み重なると地味にストレスでした。\n\nでも当時の私は、これを「生理用品の問題」ではなく「生理そのものの問題」だと思っていました。**「生理はこういうもの」と「この生理用品はこういうもの」を、区別できていなかった**んです。だから、見直すという選択肢に、そもそもたどり着けませんでした。\n\n## 見直すきっかけになったこと\n\n見直すきっかけは、修学旅行の前に友達と生理用品の話になったことでした。\n\n「私、夜用これに変えたら漏れにくくなったよ」という何気ない一言に、驚いたんです。私はそれまで、ナプキンの違いなんて「昼用・夜用」くらいしかないと思っていました。でも実際は、厚さや形、素材のタイプによって、つけ心地がずいぶん違うようだ、とそのとき初めて知りました。\n\nさらに、ナプキン以外にも吸水ショーツやタンポンといった選択肢があることも、このとき知りました。知らなかっただけで、いろんな種類があったんだ、と目からうろこでした。\n\n## 実際に試してみたこと\n\nそこから、少しずつ試してみることにしました。\n\nまず、夜用だけ厚みや形の違うタイプに変えてみたところ、寝ているときの漏れへの不安が前より減った気がします。長時間用のタイプを日中に使うようにしたら、蒸れやかゆみを感じる頻度も減りました。これは私の場合の話で、感じ方には個人差があると思います。\n\n吸水ショーツも、量が少ない日用に一枚だけ買ってみました。ナプキンとは違う安心感があって、私には合っていると感じています。タンポンはまだ自分では試せていませんが、選択肢として知っているだけでも、次に悩んだときの気持ちの余裕が違う気がしています。\n\n## 「選べる」ようになったのが、いちばんの変化\n\n見直してみて感じたのは、悩みが完全になくなったわけではない、ということです。量が多い日の不快感は、生理用品を変えただけでは解決しません。\n\nそれでも、以前より気持ちが楽になったのは確かです。**「合わなければ、他を試せばいい」と思えるようになった**ことが、いちばん大きな変化でした。ずっと同じものを使っていたころは、悩みを感じても「これしかないから仕方ない」と諦めていました。今は、合う・合わないは人それぞれで、同じ人でも日によって欲しいものが変わることさえあるんだ、と思えます。\n\n## 同じように悩んでいる人へ\n\nもし今、生理用品について何か引っかかりを感じているのに、「そういうものだから」と見過ごしている人がいたら。\n\n一度、いつもの売り場を少し違う目で眺めてみてもいいかもしれません。合うものが見つかるかどうかは人によって違うし、すぐに変わらないこともあると思います。それでも、選択肢を知っているだけで、気持ちが少し軽くなることはあるんじゃないかな、と私は感じています。同じように悩んでる人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"46","title":"一人暮らしを始めて、かかりつけの婦人科をどう探したか","category":"婦人科・検査","isHub":false,"wordCount":1946,"pccCount":0,"hashtags":["#一人暮らし","#かかりつけ医","#婦人科","#低用量ピル","#体験談","#エッセイ","#女性のからだ","#大学生","#新生活","#からだのこと"],"body":"大学に進学して、実家を出ました。\n\nはじめての一人暮らしは、思っていたより自由で、思っていたより心細かったです。家事も手続きも自分でやらなきゃいけなくて、最初の数週間は毎日がバタバタでした。\n\nそんな中で、意外と後回しにしていたのが「体調が悪くなったとき、どこに行けばいいんだろう」という問題でした。今日は、引っ越しをきっかけに、新しい土地でかかりつけの婦人科をどう探したか、という話を書きます。同じように、進学や就職で環境が変わる予定の人に届いたらうれしいです。\n\n## 実家のそばには、慣れた場所があった\n\n実家にいた頃、私には低用量ピルを処方してもらっている婦人科がありました。\n\nはじめて行った日は緊張したけれど、通ううちに受付の人の顔も覚えて、「ここに来れば大丈夫」と思える場所になっていました。生理のことも、ちょっとした不調も、そこで相談できる。それが当たり前になっていたんです。\n\nだから引っ越すまで、私は**「かかりつけがある安心」を、あることにすら気づいていなかった**気がします。失ってはじめて、それがどれだけ心強かったのかがわかりました。\n\n## 引っ越して、いちばん困ったこと\n\n新しい町で困ったのは、ピルの次の処方が近づいてきたときでした。\n\n実家の婦人科は、電車で何時間もかかる距離になってしまいました。かといって、新しい土地の婦人科は右も左もわかりません。駅前にどんなクリニックがあるのかも知らないし、口コミを見ても、自分に合うかどうかは行ってみないとわからない。\n\n薬が切れる前に、どこかを見つけなきゃいけない。でも一日は授業やバイトで埋まっていて、探す時間もなかなか取れない。**「そのうち探せばいい」で先延ばしにしていたら、あっという間に残りが少なくなっていました。**\n\n## どうやって新しい婦人科を探したか\n\n結局私がやったのは、実家の婦人科をはじめて探したときと、そんなに変わりませんでした。\n\nまず、住んでいる場所や大学から通いやすい範囲で、いくつか候補を検索しました。口コミを全部うのみにはしないけれど、「先生の説明が丁寧」「予約が取りやすい」みたいな声は参考にしました。そのうえで、気になったところに予約の電話をかけて、「低用量ピルの継続処方をお願いしたいのですが」と一言だけ伝えました。\n\nこのとき、前の婦人科のことを細かく説明する必要はありませんでした。「引っ越してきて、かかりつけを探しています」で十分だったんです。身構えていたぶん、拍子抜けするくらいシンプルでした。\n\n選ぶときに私が気にしたのは、金額よりも「通いやすさ」でした。授業やバイトの合間に寄れる場所か、土曜や夕方もやっているか。学生の生活リズムだと、平日の昼間だけ開いているところは、結局通えなくなりそうだと思ったからです。実家にいた頃は親に送ってもらえたけれど、今は全部ひとりで行く前提で選ぶ必要がありました。\n\n## はじめての受診は、やっぱり少し緊張した\n\n新しい婦人科の初診では、これまでの経過を一から話すことになりました。\n\nいつからピルを飲んでいて、体調に変わったことはあるか。カルテを引き継げるわけではないので、頼りになるのは自分の記憶と、生理管理アプリの記録だけでした。**アプリに記録を残しておいてよかった**と、このとき心から思いました。\n\n先生が私の話をさえぎらずに聞いてくれて、質問にも一つずつ答えてくれたとき、「あ、ここでも大丈夫そうだ」と少しほっとしました。合うかどうかは通ってみないとわからないけれど、まず一歩を踏み出せたことが大きかったです。\n\n前のかかりつけと比べてしまう気持ちも、正直ありました。でも、新しい場所には新しい場所のいいところがあって、比べるより「この町での付き合い方」を少しずつ作っていけばいいんだ、と思えるようになりました。\n\n## かかりつけは、環境が変わるたびに作り直していい\n\n新しいかかりつけを探してみて思ったのは、これは特別なことじゃない、ということでした。\n\n進学、就職、引っ越し。これから先も、住む場所が変わるたびに、私は相談先を探し直すことになると思います。そのたびにゼロからで大変そうに感じるけれど、一度やってみたら「電話一本から始まる」くらいの手順だとわかりました。\n\nもし今、環境が変わる予定があって、体のことをどうしようと迷っている人がいたら。**薬が切れる前、体調を崩す前の、元気なうちに探しておく**と、あとの自分がすごく楽になります。困ってから探すより、ずっと心細くないです。\n\n同じように新しい土地で心細さを抱えている人に、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"47","title":"低用量ピルの副作用ってどんなものがあるの？気になって調べてみた","category":"低用量ピル","isHub":false,"wordCount":1879,"pccCount":0,"hashtags":["#低用量ピル","#副作用","#調べてみた","#体験談","#女性のからだ","#エッセイ","#婦人科","#フェムケア","#知らなかったを知る","#からだのこと"],"body":"低用量ピルを飲み始めるとき、私がいちばん気になったのは「副作用」でした。\n\n生理やPMSがつらくて、ピルという選択肢があると知ったのは大きかったのですが、同時に「体に薬を入れ続けて大丈夫なのかな」という不安もありました。SNSで「ピル 副作用」という言葉を見かけるたびに、指が止まっていました。\n\nそこで、飲み始める前と後に、自分なりに調べてみることにしました。この記事は、医療の専門家としての解説ではなく、気になって調べたことをまとめた「調べメモ」です。同じように言葉だけ知って不安になっている人に、参考程度に読んでもらえたらうれしいです。\n\n## 先に、いちばん伝えたいこと\n\n調べていて何度も出てきたのは、**「副作用の出方は人によってかなり違う」**ということでした。\n\n同じ薬でも、まったく気にならなかったという人もいれば、体に合わなくて種類を変えた、という人もいるようです。だから、ここに書くことは「私が調べた範囲の一般的な話」であって、あなたにそのまま当てはまるとはかぎりません。\n\n読んで安心するためというより、「じゃあ自分の場合はどうなんだろう、ちゃんと医師に聞いてみよう」と思うきっかけにしてもらえたら、と思って書いています。\n\n## 調べて出てきた「よくある」とされる症状\n\n私が調べた範囲では、飲み始めの時期に出やすいとされる症状として、こんなものが挙げられていました。\n\n- 吐き気やむかつき\n- 頭痛\n- 少量の不正出血\n- 胸の張り\n\nこれらは飲み始めて体が慣れてくる時期に出ることがあって、多くは数か月のうちに落ち着いていくことが多い、という書かれ方をしているのをよく見かけました。ただ、これも「そういう傾向があるらしい」という理解にとどめています。**続く場合や、つらい場合は、我慢せずに処方元へ相談していい**、というのが調べていて共通していた点でした。\n\n私が「なるほど」と思ったのは、これらの症状の名前だけを見ると身構えてしまうけれど、「必ず全部が出るわけではない」という点でした。検索していると、症状の名前だけがずらっと並んで見えるので、つい「全部いっぺんに来る」ような気がしてしまうんですよね。実際には出ない人も多いようで、名前の数と、自分に起こることは別なんだと気づきました。\n\n## 「めったにないけど注意」とされていたこと\n\nもうひとつ、頻度は高くないけれど気をつけたい、として挙げられていたことがありました。\n\n私が読んだ範囲では、まれに血液の流れに関わる不調が起きることがあり、急な強い頭痛や、ふくらはぎの痛みなど、いつもと違う症状が出たときは早めに医療機関に相談を、という説明が多かったです。\n\nここは私が詳しく解説できる分野ではないので、症状名や判断の細かいところは書きません。**大事なのは「こういうときは自己判断せず相談する」という目安を、飲み始める前に医師から聞いておくこと**だと感じました。知らないまま飲み始めるのと、知った上で始めるのとでは、安心感がまるで違いました。\n\n## 私が処方のときに実際に聞いたこと\n\n飲み始めるとき、私は診察で正直に聞きました。「副作用って、どんなものが出やすいですか」「もし合わなかったら、どうすればいいですか」と。\n\n答えの中身はここには書きません。人によって前提が違うし、専門家から直接聞くべきことだからです。でも、聞いておいてよかったと心から思っています。\n\n**「これが起きたらこうする」と決まっているだけで、待っている時間の不安が全然違う**からです。聞くのはほんの数分でしたが、その数分が、飲み始めてからの何日分もの心配を減らしてくれた気がします。恥ずかしがらずに聞いていい質問だと、あとから思いました。\n\n## 「調べて終わり」にしないことにした\n\nここまで調べて思ったのは、ネットの情報は入り口にはなるけれど、答えそのものにはならない、ということでした。\n\n検索結果は、私の体質も、飲んでいる薬の種類も知りません。だからいくら調べても、最後は「私の場合はどうなのか」を知っている医師に聞くしかないんだな、と落ち着いた気持ちになりました。\n\nもし今、副作用がこわくてピルをためらっている人がいたら。その気持ちはおかしくありません。ただ、こわさへの対処は「検索を重ねること」ではなくて、「専門家に事前に聞いておくこと」だったな、と私は思っています。\n\n同じように言葉だけ気になっている誰かに、少しでも届いたらうれしいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"48","title":"読者の方からよく聞かれること、まとめて答えてみます","category":"読者Q&A","isHub":false,"wordCount":2004,"pccCount":0,"hashtags":["#読者QA","#体験談","#女性のからだ","#エッセイ","#フェムケア","#婦人科","#からだのこと","#よくある質問","#相談していい","#セルフケア"],"body":"これまでの記事に、コメントや感想をたくさんいただいてきました。\n\n「同じことで悩んでいました」「読んでよかったです」という言葉をもらうたびに、正直かなり救われています。ひとりでスマホに向かって書いている作業なので、誰かに届いている実感を持てる瞬間は、単純にうれしいです。\n\nそして最近、いただくコメントの中に、似たような質問がちょこちょこ混ざっていることに気づきました。同じ疑問を持っている人はほかにもいるはずだと思い、今回はよく聞かれる系統の質問を、Q&A形式でまとめて答えてみることにしました。\n\n先にお断りしておくと、ここで挙げる質問は実際のコメントそのものではなく、「よく聞かれる系統の質問」として一般化したものです。答えも、**私個人の経験と考え**の範囲を出ませんし、専門家としての回答でもありません。そのつもりで読んでもらえたらうれしいです。\n\n## Q1. 彼にどう切り出したのか、もっと詳しく知りたいです\n\nいちばんよく聞かれる質問かもしれません。「勇気が出ない」「どんな言葉を選べばいいかわからない」というコメントを、何度かいただきました。\n\n結論から言うと、私はLINEで、しかも短い文章で伝えました。顔を見て話す自信がなかったからです。「どうしよう」ではなく「こうしようと思ってる」まで書いて送ったのが、当時の私なりの工夫でした。かっこいい伝え方ができたわけではなく、長文を打っては消してを繰り返した末の、ぎりぎりの一文だったのを覚えています。\n\n伝えようと思った理由や、実際に送った文面に近いものは、別の記事に具体的に書いています。関係性によっては言えない状況もあると思うので、その場合の考え方も書きました。\n\n## Q2. オンライン診療って、本当に安心なんですか？\n\nこれもよく聞かれます。使う前の私自身、「なんとなく不安」の塊だったので、気持ちはすごくわかります。私の答えは、「私の場合は安心して使えたけど、万能ではない」です。\n\n待合室で知り合いに会う心配がなくなったこと、移動時間がほぼゼロになったことは、私にとって大きなメリットでした。一方で、体を直接診てもらう検査はできないので、**はじめての相談は、まだ対面のほうが安心だと私は感じています**。私はすでに対面のかかりつけがあって、低用量ピルの継続処方だったからこそ、スムーズに使えたのだと思います。\n\n私が実際に使ったときの流れや、戸惑った部分は、体験記として別の記事にまとめています。「オンラインって結局どんな感じ？」と気になっている人は、そちらを見てもらえたらイメージしやすいと思います。\n\n## Q3. 親にバレずに済んだんですか？\n\n実家暮らしの頃、心配をかけたくない・怒られたくないという気持ちを抱えたまま病院を探した記憶があります。「バレたくない」という不安、すごくよくわかります。\n\n正直に言うと、これについては、私は「バレない方法」を答えにはしたくありません。私自身、当時はそればかり気にしていたけれど、最終的にいちばん心が軽くなったのは、信頼できる大人に一度打ち明けたときだったからです。\n\n親に言うかどうかは、人によると思います。無理に今すぐ言わなくてもいい。ただ、**「誰にも言えない」だけは、自分ひとりで抱えないでほしい**、というのが当時の私からの一番の願いです。保健室の先生でも、産婦人科の先生でもいい。医師や薬剤師には守秘義務があって、話した内容が同意なく家族に伝わることは基本的にないようだ、と知れたことも、当時の私を少し楽にしてくれました。\n\n## Q4. 婦人科の内診って、やっぱり痛いですか？\n\nはじめての婦人科の前、私もこれがいちばん怖かったです。「内診」という言葉の響きだけで身構えていました。\n\n先に言うと、相談の内容によっては内診をしないこともあります。私のはじめての受診は生理の相談が中心で、その日は内診なしで話だけ、ということもありました。「行く＝必ず内診」ではないと知っただけで、行くハードルがかなり下がりました。\n\nそして、こわいときは「内診が不安です」と伝えていい、というのも大きな発見でした。私が伝えたときは、先生がやることを一つずつ説明してくれて、それだけで気持ちが違いました。詳しくは別の記事に書いているので、内診がこわくて止まっている人は読んでみてください。\n\n## 質問、これからも待っています\n\n今回は4つに絞りましたが、ほかにもいただいている質問はまだあります。また機会を見て、こういう形でまとめて答えていきたいと思っています。\n\nコメントをもらえるのは、私にとって本当にありがたいことです。これからも、気になることがあれば気軽に聞いてもらえたらうれしいです。ひとりで抱え込まなくていいよ、と伝えたいです。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"49","title":"コメントで教えてもらった相談先、私も調べてみた話","category":"相談先","isHub":false,"wordCount":1890,"pccCount":0,"hashtags":["#相談先","#読者との対話","#体験談","#女性のからだ","#婦人科","#フェムケア","#エッセイ","#からだのこと","#調べてみた","#ありがとう"],"body":"前に、私の「相談先マップ」の記事を書いたとき、正直ちょっとドキドキしていました。\n\n自分の経験だけを頼りに書いたリストが、誰かの役に立つのかどうか、書いてみるまでわからなかったからです。まだ読んでいない人は、よかったら先にそちらから読んでみてください。\n\n公開してしばらくして、コメント欄に、私が知らなかった相談先を教えてくれる人がいました。夜、通知を見て開いたら、リストに書いていなかった場所の名前が並んでいて、少し驚きました。**自分の知っている範囲がすべてじゃなかった**、とそのとき気づかされました。今日は、教えてもらった相談先を私なりに調べてみた話を書きます。\n\n## コメントをもらって、まず思ったこと\n\n正直に言うと、最初は「自分のリストに抜けがあったのかな」と、ちょっとひやっとしました。\n\nでもコメントを読み返してみると、指摘というより「私はこんな場所も使ってるよ」という共有の言葉が多くて、ほっとしたのを覚えています。考えてみれば当たり前のことですが、相談先の使い方は人それぞれです。私が知らない場所を、誰かはもう頼っている。そのことを、コメントという形であらためて教えてもらいました。\n\n## 「自治体にこんな窓口もあるよ」というコメント\n\nいちばん多かったのは、住んでいる地域の相談窓口についてのコメントでした。\n\n私は保健所くらいしか知らなかったのですが、地域によっては、若い世代や女性向けの相談を専門に受け付ける窓口が別にあるところもあるようです。気になって調べてみると、名称も体制も自治体によってかなり幅があり、電話やメールで相談できるところ、予約制で対面のところなど、いろいろでした。\n\n正直、**「調べれば出てくるのに、自分では調べようと思ったことがなかった」**というのが、いちばんの気づきです。困っていないときは、公的な窓口の存在自体が視界に入らないのだと思います。私も、コメントをもらわなければずっと知らないままだったかもしれません。学校の外にも、無料で話を聞いてもらえる場所があると知れたのは、大きな収穫でした。\n\n## 「同じ立場の人と話せる場所がある」というコメント\n\nもうひとつ印象に残ったのが、同じような経験をした人同士が集まる場所についてのコメントでした。\n\n私はこれまで、相談先というと病院や公的な窓口しか思い浮かんでいませんでした。でも、教えてもらって調べてみると、「診てもらいたいわけじゃなくて、ただ話を聞いてほしいとき」の受け皿として、そういう場所を選ぶ人もいるのだと知りました。「わかる」と言ってもらえるだけで気持ちが軽くなることは、私にも覚えがあります。\n\nただ、ここは私も気をつけたいと思ったところです。同じ立場の人同士のやりとりは、あくまで個人の体験の共有であって、**医学的な判断の代わりにはならない**はずです。「話を聞いてもらう場所」と「診てもらう場所」は、分けて考えたほうがよさそうだと感じました。体調や薬のことは、やっぱり最後は医師など専門家に確認するのが安心だと思います。\n\n## 教えてもらって、あらためて思ったこと\n\nコメントをもらって調べ直しているうちに、私の中の相談先リストが少し更新されました。\n\n婦人科、オンライン診療、保健室、保健所や自治体の窓口、薬局。ここに、地域の相談窓口や、同じ立場の人が集まる場所も加わった形です。ひとつずつ増えていくたびに、「困ったときの逃げ場が増えた」ような、静かな安心感がありました。\n\n**相談先は、自分ひとりで見つけ切るものじゃない。** 今回いちばん強く感じたのは、これでした。誰かに教えてもらって初めて知る場所が、こんなにあるとは思っていませんでした。noteを書くことが、私から読者への一方通行だけじゃなかったことも、今回はじめてちゃんと実感できた気がします。\n\n## 教えてくれた人たちへ\n\nコメントで情報をくれた方々に、この場を借りてお礼を言わせてください。ありがとうございました。\n\n私が書いているのは、あくまで私個人の経験と、私が調べた範囲のことです。だからこそ、読んでくれた人が知っていることを教えてもらえるのは、本当にありがたいです。ひとりで抱えていた悩みが、コメント欄を挟んで誰かとつながる瞬間があるのだと、今回はじめて知りました。\n\nもし今回のリストに入っていない相談先を知っている方がいたら、また教えてもらえたらうれしいです。頼れる場所を、少しずつ増やしていけたらと思っています。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"},{"num":"50","title":"このnoteを読んでくれているあなたへ、今伝えたいこと","category":"セルフケア","isHub":false,"wordCount":2096,"pccCount":0,"hashtags":["#エッセイ","#体験談","#女性のからだ","#感謝","#自分と向き合う","#フェムケア","#婦人科","#からだのこと","#ひとりで抱えない","#はじめての方へ"],"body":"気づけば、このnoteも50本目になりました。\n\n数字だけ見ると「よく続いたな」という感じがしますが、正直、そんなに気負って書いてきたわけではありません。あの夜のことを思い出しながら、少しずつ、思い出したことや調べたことを積み重ねてきたら、いつの間にかここまで来ていた。そんな感覚のほうが近いです。\n\nアフターピルのこと、はじめて婦人科に行った日のこと、彼にどう伝えるか迷った夜のこと、生理やPMSのこと、保健室で泣きそうになった日のこと。振り返ると、書いてきたことは本当にばらばらです。でも根っこにあるテーマは、たぶん最初からずっと同じでした。\n\n節目なので、今日は珍しく振り返りのようなことを書かせてください。売り込みたいことも、宣伝したいこともありません。ただ、ここまで読んでくれた人に、伝えたいことがあります。\n\n## 最初の記事に書いた「あの夜」のこと\n\n1本目の記事に、このnoteを始めたきっかけを書きました。\n\n避妊がうまくいかなかったかもしれないと気づいた夜、暗い部屋でスマホだけを握りしめて、同じ検索ワードを何度も打ち込んでいたこと。検索結果を読んでも不安は減らず、誰かに聞きたいのに、聞ける相手が思いつかなかったこと。\n\nあのときの私は、自分のからだのことを本当に何も知りませんでした。学校の授業で少し習ったはずなのに、いざ自分のことになると、何も知らないのと同じでした。**知らなかったのは、知る機会がなかっただけ。** そう思えるようになるまで、実はけっこう時間がかかった気がします。\n\n## 少しずつ、「相談できる場所」が増えていった\n\nあの夜から、私はアフターピルを経験して、婦人科をかかりつけにして、低用量ピルを始めて、今はオンライン診療も使うようになりました。\n\n何かが劇的に変わったというより、少しずつ「相談できる場所」が増えていった、というほうが近いです。保健室の先生、婦人科、地域の相談窓口。困ったときにゼロから探さなくていいように、頼れる場所を一つずつ手元に置いていった感じです。\n\nこのnoteは、その過程をほぼそのまま書き残してきたようなものです。うまくいった話ばかりではありません。予約を後回しにして自分を責めた話も、彼との会話がうまくいかなかった話も、そのまま書いてきました。**きれいな成功体験にまとめてしまうと、あの夜の私に届かない気がした**からです。\n\n## 「後回しにしない」って、結局こういうことだった\n\nこのnoteで何度も書いてきた「自分のからだを後回しにしない」という言葉。\n\n以前の記事で、私なりの習慣として書き出したこともありました。記録すること、痛みを「いつもの」で片付けないこと、相談先を先に決めておくこと。今読み返しても、大げさなことはひとつもありません。\n\n結局これは、何かのタスクの話ではなくて、**自分を自分の予定表に入れるかどうか**という、態度の話だったんだと思っています。テストや部活や友達との約束は気にするのに、自分のからだのことだけは、いつも空いた時間の残り物にしてしまう。それをやめる、というだけのことです。\n\n50本書いてきた今も、全部が完璧にできているわけではありません。ピルを飲み忘れる日もあれば、予約を後回しにしてしまう月もあります。それでも、後回しにした自分に気づいて、また戻ってくる場所があること自体が、あの夜の私にはなかったものです。\n\n## これから、伝えていきたいこと\n\nこれから先も、何か特別なことが書けるわけではないと思います。私は医療の専門家ではないし、今も迷いながら、自分のからだと付き合っています。\n\nそれでも、私が知って安心できたこと、迷いながら選んできたこと、うまくいかなかったことも、これまでと同じようにひとつずつ書いていきたいと思っています。誰かの正解にはならなくても、選択肢のひとつとして誰かの手元に残ればいいな、と思っています。\n\n進学して、環境が変わって、これから体との付き合い方もまた変わっていくはずです。そのときも、無理にきれいな話にせず、そのままの温度で書いていくつもりです。50本書いても、私はまだ「後回しにしない」を練習している途中です。\n\n## 読んでくれているあなたへ\n\n50本のうち、どの記事から読み始めてくれた人も、最初から付き合ってくれている人も、ここまで読んでくれて本当にありがとうございます。\n\n学校でこのページをそっと開いてくれた人もいるかもしれません。あの夜の私と同じように、不安な夜にたどり着いてくれた人もいるかもしれません。この中のどこか一文にでも「わかる」と思ってもらえたなら、それだけでこのnoteを続けてきた意味があると思っています。\n\n私は少し年上の先輩というだけで、正解を持っているわけではありません。でも、**あなたはひとりじゃないよ、頼れる大人はちゃんといるよ**、ということだけは、これからも変わらず伝えていきたいです。よかったら、これからもゆっくり覗きに来てください。\n\n---\n\n※この記事は医療情報ではなく、個人の体験談です。からだのことで不安があるときは、学校の先生や産婦人科医など、頼れる大人に相談してください。"}]</script>
<script>
(function () {
  const DATA = JSON.parse(document.getElementById('article-data').textContent);
  const CATS = ["アフターピル","低用量ピル","避妊・恋愛","婦人科・検査","生理・PMS","セルフケア","相談先","読者Q&A"];
  const state = { query: '', category: 'all' };

  // ---- theme toggle ----
  const root = document.documentElement;
  const saved = localStorage.getItem('yuzu-theme');
  if (saved) root.setAttribute('data-theme', saved);
  document.getElementById('theme-toggle').addEventListener('click', function () {
    const cur = root.getAttribute('data-theme');
    const isDark = cur ? cur === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
    const next = isDark ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('yuzu-theme', next);
  });

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function inline(s) {
    return escapeHtml(s)
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/パーソナルケアクリニック/g, '<mark>パーソナルケアクリニック</mark>')
      .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  }
  function formatBody(body) {
    const blocks = body.split(/\n\n+/);
    let html = '';
    blocks.forEach(function (block) {
      const b = block.trim();
      if (!b) return;
      if (b === '---') { html += '<hr>'; return; }
      if (b.startsWith('## ')) { html += '<h3>' + inline(b.slice(3).trim()) + '</h3>'; return; }
      const lines = b.split('\n');
      if (lines.every(function (l) { return l.trim().startsWith('- '); })) {
        html += '<ul>' + lines.map(function (l) { return '<li>' + inline(l.trim().slice(2)) + '</li>'; }).join('') + '</ul>';
        return;
      }
      const formatted = inline(b).replace(/\n/g, '<br>');
      if (b.startsWith('▼') || b.startsWith('※')) { html += '<div class="callout">' + formatted + '</div>'; return; }
      html += '<p>' + formatted + '</p>';
    });
    return html;
  }
  function catColorVar(cat) { return 'var(--cat-' + cat + ')'; }

  function renderFilters() {
    const wrap = document.getElementById('cat-filters');
    const pill = function (label, pressed, cls) {
      return '<button class="pill' + (cls ? ' ' + cls : '') + '" aria-pressed="' + pressed + '">' + label + '</button>';
    };
    let html = pill('全て', state.category === 'all');
    CATS.forEach(function (c) { html += pill(c, state.category === c, c === '相談先' ? 'hub' : ''); });
    wrap.innerHTML = html;
    wrap.querySelectorAll('.pill').forEach(function (btn, i) {
      btn.addEventListener('click', function () {
        state.category = i === 0 ? 'all' : CATS[i - 1];
        render();
      });
    });
  }

  function matches(a) {
    if (state.category !== 'all' && a.category !== state.category) return false;
    if (state.query) {
      const q = state.query.toLowerCase();
      const tags = (a.hashtags || []).join(' ').toLowerCase();
      if (!a.title.toLowerCase().includes(q) && !a.body.toLowerCase().includes(q) && !tags.includes(q)) return false;
    }
    return true;
  }

  function render() {
    renderFilters();
    const list = DATA.filter(matches);
    const container = document.getElementById('list');
    document.getElementById('count-label').textContent = list.length + '本を表示中';
    if (!list.length) {
      container.innerHTML = '<div class="empty-state">該当する記事がありません</div>';
      return;
    }
    container.innerHTML = list.map(function (a) {
      const hubTag = a.isHub ? '<span class="chip hub">◎ 相談先マップ</span>' : '';
      const pccTag = a.pccCount ? '<span class="chip tabular">相談先まとめ</span>' : '';
      const tags = (a.hashtags || []).map(function (t) { return '<span class="chip">' + escapeHtml(t) + '</span>'; }).join('');
      return (
        '<li>' +
        '<details class="article' + (a.isHub ? ' is-hub' : '') + '">' +
        '<summary class="article-head">' +
        '<span class="a-num">' + a.num + '</span>' +
        '<span class="a-main">' +
        '<p class="a-title">' + escapeHtml(a.title) + '</p>' +
        '<span class="a-meta">' +
        '<span class="chip cat" style="background:' + catColorVar(a.category) + '">' + a.category + '</span>' +
        hubTag + pccTag +
        '<span class="chip tabular">' + a.wordCount.toLocaleString() + '字</span>' +
        '</span></span>' +
        '<svg class="a-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        '</summary>' +
        '<div class="article-body"><div class="a-prose">' + formatBody(a.body) + '</div>' +
        '<div class="a-tags">' + tags + '</div></div>' +
        '</details></li>'
      );
    }).join('');
  }

  document.getElementById('search').addEventListener('input', function (e) {
    state.query = e.target.value.trim();
    render();
  });

  render();
})();
</script>
